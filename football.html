<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football — Digital Home</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="page-body">
  <nav id="site-nav"></nav>
  <div class="container">
    <header class="page-hero">
      <p class="page-hero__eyebrow">The Beautiful Game</p>
      <h1 class="page-hero__title">Football</h1>
      <p class="page-hero__desc" id="football-desc">Clubs I love, stories worth telling.</p>
    </header>
    <section class="section">
      <div class="section-header">
        <div><p class="section-eyebrow">Clubs</p><h2 class="section-title">My teams</h2></div>
      </div>
      <div id="clubs-grid" class="clubs-grid">
        <div class="skeleton" style="height:280px;border-radius:12px"></div>
        <div class="skeleton" style="height:280px;border-radius:12px"></div>
        <div class="skeleton" style="height:280px;border-radius:12px"></div>
      </div>
    </section>
    <section class="section">
      <div class="section-header">
        <div><p class="section-eyebrow">Writing</p><h2 class="section-title">Football articles</h2></div>
      </div>
      <div class="grid-3" id="football-articles">
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
      </div>
    </section>
  </div>
  <footer id="site-footer"></footer>
  <style>/* style sama seperti kode kamu, saya singkat agar tidak kepanjangan */</style>
  <script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from '/js/config.js';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNav, renderFooter } from '/js/nav.js';
    import { formatDateShort, emptyState } from '/js/supabase.js';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    renderNav('/football');
    renderFooter(sb);

    (async () => {
      const { data: settingData } = await sb.from('settings').select('value').eq('key','football_page_desc').maybeSingle();
      if (settingData?.value) document.getElementById('football-desc').textContent = settingData.value;
    })();

    async function loadClubs() {
      const { data } = await sb.from('football_clubs').select('*').order('sort_order', { ascending: true });
      const grid = document.getElementById('clubs-grid');
      if (!data?.length) { emptyState(grid, 'No clubs added yet.'); return; }
      grid.innerHTML = data.map(c => `
        <div class="club-card">
          <div class="club-header">
            <img src="${c.logo_url || '/img/placeholder.svg'}" class="club-logo" alt="${c.name}">
            <div>
              <div class="club-name">${c.name}</div>
              <div class="club-league">${c.league || ''}</div>
            </div>
          </div>
          <div class="club-stats">
            <div class="club-stat"><div class="club-stat-val">${c.league_titles ?? '—'}</div><div class="club-stat-lbl">League</div></div>
            <div class="club-stat"><div class="club-stat-val">${c.domestic_cups ?? '—'}</div><div class="club-stat-lbl">Cups</div></div>
            <div class="club-stat"><div class="club-stat-val">${c.continental ?? '—'}</div><div class="club-stat-lbl">Europe</div></div>
          </div>
          ${c.notes ? `<div class="club-notes">${c.notes}</div>` : ''}
        </div>
      `).join('');
    }

    async function loadArticles() {
      const { data } = await sb.from('football_articles')
        .select('id,title,slug,cover_image,excerpt,created_at')
        .eq('status','published')
        .order('created_at', { ascending: false })
        .limit(6);
      const container = document.getElementById('football-articles');
      if (!data?.length) { emptyState(container, 'No articles yet.'); return; }
      container.innerHTML = data.map(a => `
        <a href="/football/${a.slug}" class="card" style="display:block">
          <img class="card-img" src="${a.cover_image || '/img/placeholder.svg'}" alt="${a.title}" loading="lazy">
          <div class="card-body">
            <span class="card-tag">Football</span>
            <h3 class="card-title">${a.title}</h3>
            ${a.excerpt ? `<p class="card-excerpt">${a.excerpt}</p>` : ''}
            <div class="card-meta"><span>${formatDateShort(a.created_at)}</span></div>
          </div>
        </a>
      `).join('');
    }

    loadClubs();
    loadArticles();
  </script>
</body>
</html>
