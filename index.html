<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Home</title>
  <meta name="description" content="A personal space on the internet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="page-body">

  <nav id="site-nav"></nav>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <div class="hero-inner">
        <div class="hero-text">
          <div class="hero-eyebrow mono" id="hero-eyebrow">Welcome</div>
          <h1 class="hero-title" id="hero-title">This is my<br><em>digital home.</em></h1>
          <p class="hero-desc" id="hero-desc">A personal space where I share writing, photos, music, thoughts, and everything in between. Pull up a chair.</p>
          <div class="hero-cta">
            <a href="/about" class="btn btn--primary btn--lg">Meet me</a>
            <a href="/blog" class="btn btn--outline btn--lg">Read something</a>
          </div>
        </div>
        <div class="hero-ambient"></div>
      </div>
    </div>
  </section>

  <!-- ROOMS GRID -->
  <section class="section rooms-section">
    <div class="container">
      <div class="section-header">
        <div>
          <p class="section-eyebrow">Explore</p>
          <h2 class="section-title">The rooms</h2>
        </div>
      </div>
      <div class="rooms-grid" id="rooms-grid">
        <!-- generated by JS -->
      </div>
    </div>
  </section>

  <!-- RECENT POSTS -->
  <section class="section">
    <div class="container">
      <div class="section-header">
        <div>
          <p class="section-eyebrow">Writing</p>
          <h2 class="section-title">Recent posts</h2>
        </div>
        <a href="/blog" class="section-link">All posts →</a>
      </div>
      <div class="grid-3" id="recent-posts">
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
      </div>
    </div>
  </section>

  <!-- CURRENT INTERESTS + RECENT THOUGHTS side-by-side -->
  <section class="section">
    <div class="container">
      <div class="home-split">
        <!-- Current interests -->
        <div class="split-col">
          <div class="section-header" style="margin-bottom:1.5rem">
            <div>
              <p class="section-eyebrow">Now</p>
              <h2 class="section-title" style="font-size:1.6rem">What I'm into</h2>
            </div>
          </div>
          <div id="current-interests">
            <div class="skeleton" style="height:60px;border-radius:8px;margin-bottom:.75rem"></div>
            <div class="skeleton" style="height:60px;border-radius:8px;margin-bottom:.75rem"></div>
            <div class="skeleton" style="height:60px;border-radius:8px"></div>
          </div>
        </div>
        <!-- Recent thoughts -->
        <div class="split-col">
          <div class="section-header" style="margin-bottom:1.5rem">
            <div>
              <p class="section-eyebrow">Thoughts</p>
              <h2 class="section-title" style="font-size:1.6rem">Latest notes</h2>
            </div>
            <a href="/thoughts" class="section-link">All →</a>
          </div>
          <div id="recent-thoughts">
            <div class="skeleton" style="height:80px;border-radius:8px;margin-bottom:.75rem"></div>
            <div class="skeleton" style="height:80px;border-radius:8px;margin-bottom:.75rem"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- RANDOM HIGHLIGHT -->
  <section class="section">
    <div class="container container--narrow">
      <div class="random-highlight" id="random-highlight">
        <div class="skeleton" style="height:160px;border-radius:12px"></div>
      </div>
    </div>
  </section>

  <footer id="site-footer"></footer>

  <script type="module">
    // ========== TAMBAHKAN IMPORT CONFIG.JS ==========
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/config.js';
    // ================================================
    
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNav, renderFooter } from './js/nav.js';
    import { formatDateShort, emptyState } from './js/supabase.js';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    renderNav('/');
    renderFooter(sb);

    // Load hero settings
    async function loadHero() {
      const { data } = await sb.from('settings').select('key,value')
        .in('key', ['hero_title','hero_desc','hero_eyebrow']);
      if (!data) return;
      const map = Object.fromEntries(data.map(r => [r.key, r.value]));
      if (map.hero_title) document.getElementById('hero-title').innerHTML = map.hero_title;
      if (map.hero_desc)  document.getElementById('hero-desc').textContent = map.hero_desc;
      if (map.hero_eyebrow) document.getElementById('hero-eyebrow').textContent = map.hero_eyebrow;
    }

    // Rooms definition (labels and icons — admin manages the content in each room)
    function renderRooms() {
      const rooms = [
        { href:'/blog',      emoji:'✍️', label:'Blog',      desc:'Writing & articles' },
        { href:'/gallery',   emoji:'📷', label:'Gallery',   desc:'Photos & albums' },
        { href:'/music',     emoji:'🎵', label:'Music',     desc:'Artists & playlists' },
        { href:'/football',  emoji:'⚽', label:'Football',  desc:'Clubs & stories' },
        { href:'/f1',        emoji:'🏎️', label:'F1',        desc:'Drivers & stats' },
        { href:'/watchlist', emoji:'🎬', label:'Watchlist', desc:'Movies & shows' },
        { href:'/travel',    emoji:'✈️', label:'Travel',    desc:'Places & stories' },
        { href:'/thoughts',  emoji:'💭', label:'Thoughts',  desc:'Short notes' },
        { href:'/random',    emoji:'🎲', label:'Random',    desc:'Discoveries' },
        { href:'/about',     emoji:'👤', label:'About',     desc:'My story' },
      ];
      const grid = document.getElementById('rooms-grid');
      grid.innerHTML = rooms.map(r => `
        <a href="${r.href}" class="room-card">
          <span class="room-icon">${r.emoji}</span>
          <span class="room-label">${r.label}</span>
          <span class="room-desc">${r.desc}</span>
        </a>
      `).join('');
    }

    // Recent posts
    async function loadRecentPosts() {
      const { data } = await sb.from('posts')
        .select('id,title,slug,cover_image,category,created_at,excerpt')
        .eq('status','published')
        .order('created_at', { ascending: false })
        .limit(3);
      const container = document.getElementById('recent-posts');
      if (!data?.length) { emptyState(container, 'No posts yet.'); return; }
      container.innerHTML = data.map(p => `
        <a href="blog/${p.slug}" class="card" style="display:block">
          <img class="card-img" src="${p.cover_image || '/img/placeholder.svg'}" alt="${p.title}" loading="lazy">
          <div class="card-body">
            ${p.category ? `<span class="card-tag">${p.category}</span>` : ''}
            <h3 class="card-title">${p.title}</h3>
            ${p.excerpt ? `<p style="font-size:.85rem;margin-top:.4rem;color:var(--text-3)">${p.excerpt}</p>` : ''}
            <div class="card-meta"><span>${formatDateShort(p.created_at)}</span></div>
          </div>
        </a>
      `).join('');
    }

    // Current interests (from settings)
    async function loadInterests() {
      const { data } = await sb.from('settings').select('value').eq('key','current_interests').single();
      const container = document.getElementById('current-interests');
      if (!data?.value) { emptyState(container, 'Nothing set yet.'); return; }
      let items;
      try { items = JSON.parse(data.value); } catch { items = []; }
      if (!items.length) { emptyState(container, 'Nothing set yet.'); return; }
      container.innerHTML = items.map(item => `
        <div class="interest-item">
          <span class="interest-emoji">${item.emoji || '→'}</span>
          <div>
            <div class="interest-title">${item.title}</div>
            ${item.note ? `<div class="interest-note">${item.note}</div>` : ''}
          </div>
        </div>
      `).join('');
    }

    // Recent thoughts
    async function loadThoughts() {
      const { data } = await sb.from('thoughts')
        .select('id,content,tags,created_at')
        .order('created_at', { ascending: false })
        .limit(3);
      const container = document.getElementById('recent-thoughts');
      if (!data?.length) { emptyState(container, 'No thoughts yet.'); return; }
      container.innerHTML = data.map(t => `
        <a href="thoughts" class="thought-preview">
          <p>${t.content.length > 140 ? t.content.slice(0,140)+'…' : t.content}</p>
          <div class="thought-meta">
            <span>${formatDateShort(t.created_at)}</span>
            ${t.tags?.length ? `<span>· ${t.tags.slice(0,2).join(', ')}</span>` : ''}
          </div>
        </a>
      `).join('');
    }

    // Random highlight (random item from various tables)
    async function loadRandomHighlight() {
      const sources = [
        { table: 'posts',    label: 'Post',    fields: 'title,slug,excerpt', link: r => `blog/${r.slug}` },
        { table: 'thoughts', label: 'Thought', fields: 'content,created_at', link: () => 'thoughts' },
      ];
      const src = sources[Math.floor(Math.random() * sources.length)];
      const { data, count } = await sb.from(src.table).select(src.fields, { count: 'exact' })
        .eq(src.table === 'posts' ? 'status' : 'id', src.table === 'posts' ? 'published' : '0', { nullsFirst: false })
        .limit(1)
        .order('created_at', { ascending: false });

      const container = document.getElementById('random-highlight');
      if (!data?.length) { container.innerHTML = ''; return; }
      const item = data[0];
      const text = item.title || item.content || '';

      container.innerHTML = `
        <div class="random-card">
          <div class="random-label mono">✦ Random pick · ${src.label}</div>
          <p class="random-text">${text.length > 200 ? text.slice(0,200)+'…' : text}</p>
          <a href="${src.link(item)}" class="random-link">Read more →</a>
        </div>
      `;
    }

    // Init all
    Promise.all([
      loadHero(),
      loadRecentPosts(),
      loadInterests(),
      loadThoughts(),
      loadRandomHighlight(),
    ]);
    renderRooms();
  </script>
</body>
</html>
