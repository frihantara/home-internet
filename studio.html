                <div id="thoughtListWrap">
                    <div class="table-container">
                        ${data?.length ? `
                        <table class="data-table">
                            <thead><tr><th>Content</th><th>Tags</th><th>Date</th><th style="width:130px">Actions</th></tr></thead>
                            <tbody>
                                ${data.map(t => `
                                    <tr>
                                        <td style="max-width:400px;">${escapeHtml(t.content?.substring(0,90))}${(t.content?.length||0)>90?'…':''}</td>
                                        <td>${(t.tags||[]).map(tag=>`<span class="badge badge-draft">${escapeHtml(tag)}</span>`).join(' ')}</td>
                                        <td>${formatDateShort(t.created_at)}</td>
                                        <td><div class="td-actions">
                                            <button class="btn btn-secondary btn-sm editThoughtBtn" data-id="${t.id}">Edit</button>
                                            <button class="btn btn-danger btn-sm delThoughtBtn" data-id="${t.id}">Delete</button>
                                        </div></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>` : `<div class="empty-state"><div class="empty-state-icon">💭</div><div class="empty-state-title">No thoughts yet</div></div>`}
                    </div>
                </div>
                <div id="thoughtFormWrap" style="display:none; margin-top:1.5rem;">
                    <div class="panel">
                        <div class="panel-header"><h2 id="thoughtFormTitle">New Thought</h2></div>
                        <div class="panel-body">
                            <input type="hidden" id="thoughtId">
                            <div class="field" style="margin-bottom:.85rem;">
                                <label>Content</label>
                                <textarea id="thoughtContent" rows="5" placeholder="What's on your mind?"></textarea>
                            </div>
                            <div class="field">
                                <label>Tags <span style="color:var(--text-3); font-weight:400;">(comma separated)</span></label>
                                <input id="thoughtTags" placeholder="football, life, tech">
                            </div>
                            <div class="form-actions">
                                <button class="btn btn-secondary" id="cancelThoughtBtn">Cancel</button>
                                <button class="btn btn-primary" id="saveThoughtBtn">Save</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            const showThoughtForm = (t) => {
                document.getElementById('thoughtListWrap').style.display = 'none';
                document.getElementById('thoughtFormWrap').style.display = 'block';
                document.getElementById('thoughtFormTitle').textContent = t ? 'Edit Thought' : 'New Thought';
                document.getElementById('thoughtId').value = t?.id || '';
                document.getElementById('thoughtContent').value = t?.content || '';
                document.getElementById('thoughtTags').value = (t?.tags||[]).join(', ');
            };
            document.getElementById('newThoughtBtn').onclick = () => showThoughtForm(null);
            document.getElementById('cancelThoughtBtn').onclick = () => {
                document.getElementById('thoughtFormWrap').style.display = 'none';
                document.getElementById('thoughtListWrap').style.display = 'block';
            };
            document.querySelectorAll('.editThoughtBtn').forEach(b => b.onclick = async () => {
                const { data: t } = await supabase.from('thoughts').select('*').eq('id', b.dataset.id).single();
                if (t) showThoughtForm(t);
            });
            document.querySelectorAll('.delThoughtBtn').forEach(b => b.onclick = async () => {
                if (!confirm('Delete?')) return;
                await supabase.from('thoughts').delete().eq('id', b.dataset.id);
                toast('Deleted'); renderThoughts();
            });
            document.getElementById('saveThoughtBtn').onclick = async () => {
                const id = document.getElementById('thoughtId').value;
                const thought = {
                    content: document.getElementById('thoughtContent').value,
                    tags: document.getElementById('thoughtTags').value.split(',').map(s=>s.trim()).filter(Boolean)
                };
                if (id) await supabase.from('thoughts').update(thought).eq('id', id);
                else await supabase.from('thoughts').insert(thought);
                toast('Saved ✓'); renderThoughts();
            };
        }

        // ─── Initial load ────────────────────────────────────
        await loadSection(getHashSection());

    </script>
