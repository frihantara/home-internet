<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio — Digital Home</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        /* ============================================================
           DIGITAL HOME — Admin Panel Styles (full)
           ============================================================ */
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 50;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .admin-sidebar-logo {
            padding: 1.5rem 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .admin-sidebar-logo-text {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--text);
        }
        .admin-sidebar-logo-text span {
            color: var(--gold);
        }
        .admin-sidebar-badge {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            background: var(--surface-2);
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
        }

        .admin-nav {
            flex: 1;
            padding: 1rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .admin-nav-group {
            margin-bottom: 0.25rem;
        }
        .admin-nav-group-label {
            font-family: var(--font-mono);
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
            padding: 0.6rem 0.75rem 0.3rem;
        }

        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-2);
            transition: background var(--transition), color var(--transition);
            text-decoration: none;
            cursor: pointer;
        }
        .admin-nav-link:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        .admin-nav-link.active {
            background: var(--gold-glow);
            color: var(--gold);
        }

        .admin-sidebar-foot {
            padding: 1rem 0.75rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .admin-sidebar-foot a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            color: var(--text-3);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius);
            transition: all var(--transition);
            text-decoration: none;
        }
        .admin-sidebar-foot a:hover {
            background: var(--surface-2);
            color: var(--text);
        }

        .admin-main {
            flex: 1;
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .admin-topbar {
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 11, .9);
            backdrop-filter: blur(10px);
            z-index: 40;
        }

        .admin-topbar-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .admin-topbar-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-content {
            flex: 1;
            padding: 2rem 1.5rem;
        }

        .admin-sidebar-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: var(--radius);
            color: var(--text-2);
            transition: background var(--transition);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .admin-sidebar-toggle:hover {
            background: var(--surface-2);
        }

        @media (max-width: 860px) {
            .admin-main {
                margin-left: 0;
            }
            .admin-sidebar {
                transform: translateX(-100%);
            }
            .admin-sidebar.open {
                transform: translateX(0);
            }
            .admin-sidebar-toggle {
                display: flex;
            }
            .admin-sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .5);
                z-index: 49;
            }
            .admin-sidebar-overlay.open {
                display: block;
            }
        }

        /* Dashboard cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
        }
        .stat-card-val {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--text);
            line-height: 1;
            margin-bottom: 0.4rem;
        }
        .stat-card-label {
            font-size: 0.78rem;
            color: var(--text-3);
        }

        /* Data table */
        .data-table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            text-align: left;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            background: var(--surface-2);
        }
        .data-table td {
            padding: 0.85rem 1rem;
            font-size: 0.85rem;
            color: var(--text-2);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }
        .data-table tbody tr {
            transition: background var(--transition);
        }
        .data-table tbody tr:hover {
            background: var(--surface-2);
        }

        .table-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        /* Admin form */
        .admin-form {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
        }
        .admin-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }
        .admin-form-grid .field--full {
            grid-column: 1 / -1;
        }
        @media (max-width: 640px) {
            .admin-form-grid {
                grid-template-columns: 1fr;
            }
        }

        .admin-form-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        /* Image upload */
        .img-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color var(--transition);
        }
        .img-upload-area:hover {
            border-color: var(--gold-dim);
        }
        .img-upload-area.dragover {
            border-color: var(--gold);
            background: var(--gold-glow);
        }
        .img-preview-wrap {
            display: none;
            position: relative;
            margin-top: 0.75rem;
        }
        .img-preview-wrap.show {
            display: block;
        }
        .img-preview {
            width: 100%;
            max-height: 240px;
            object-fit: contain;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface-2);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .modal-title {
            font-family: var(--font-display);
            font-size: 1.4rem;
            color: var(--text);
        }
        .modal-close {
            color: var(--text-3);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            transition: background var(--transition);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .modal-close:hover {
            background: var(--surface-2);
            color: var(--text);
        }

        /* Editor toolbar & content */
        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            padding: 0.6rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: var(--radius) var(--radius) 0 0;
            flex-wrap: wrap;
        }
        .editor-toolbar-btn {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            color: var(--text-2);
            font-size: 0.8rem;
            font-weight: 600;
            font-family: var(--font-body);
            transition: background var(--transition), color var(--transition);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .editor-toolbar-btn:hover {
            background: var(--border);
            color: var(--text);
        }
        .editor-toolbar-btn.active {
            background: var(--gold-glow);
            color: var(--gold);
        }
        .editor-toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 0.2rem;
        }
        .editor-content {
            border: 1px solid var(--border);
            border-radius: 0 0 var(--radius) var(--radius);
            padding: 1rem 1.25rem;
            min-height: 320px;
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.75;
            outline: none;
            background: var(--bg);
        }
        .editor-content:focus {
            border-color: var(--gold-dim);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        .editor-content h1,
        .editor-content h2,
        .editor-content h3 {
            font-family: var(--font-display);
            color: var(--text);
            margin: 1em 0 0.4em;
        }
        .editor-content blockquote {
            border-left: 3px solid var(--gold);
            padding: 0.5rem 1rem;
            background: var(--surface);
            border-radius: 0 var(--radius) var(--radius) 0;
            margin: 1em 0;
            font-style: italic;
        }
        .editor-content ul,
        .editor-content ol {
            padding-left: 1.5em;
        }
        .editor-content ul {
            list-style: disc;
        }
        .editor-content ol {
            list-style: decimal;
        }
        .editor-content a {
            color: var(--gold);
            text-decoration: underline;
        }

        /* Page title */
        .page-title-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .page-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 400;
        }

        button {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        button.btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-2);
        }
        button.btn-outline:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        input,
        textarea,
        select {
            width: 100%;
            padding: 0.6rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 600;
            color: var(--text-2);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar-logo">
                <span class="admin-sidebar-logo-text">Digital <span>Home</span></span>
                <span class="admin-sidebar-badge">studio</span>
            </div>
            <nav class="admin-nav">
                <div class="admin-nav-group">
                    <div class="admin-nav-group-label">Main</div>
                    <a class="admin-nav-link active" data-section="dashboard">📊 Dashboard</a>
                </div>
                <div class="admin-nav-group">
                    <div class="admin-nav-group-label">Content</div>
                    <a class="admin-nav-link" data-section="blog">📝 Blog</a>
                    <a class="admin-nav-link" data-section="gallery">🖼️ Gallery</a>
                    <a class="admin-nav-link" data-section="football">⚽ Football</a>
                    <a class="admin-nav-link" data-section="f1">🏎️ F1 Drivers</a>
                    <a class="admin-nav-link" data-section="watchlist">🎬 Watchlist</a>
                    <a class="admin-nav-link" data-section="thoughts">💭 Thoughts</a>
                </div>
            </nav>
            <div class="admin-sidebar-foot">
                <a href="#" id="logout">🚪 Sign out</a>
            </div>
        </aside>
        <div class="admin-sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main -->
        <main class="admin-main">
            <div class="admin-topbar">
                <button class="admin-sidebar-toggle" id="sidebarToggle">☰</button>
                <span class="admin-topbar-title" id="topbarTitle">Dashboard</span>
                <div class="admin-topbar-actions"></div>
            </div>
            <div class="admin-content" id="content">
                <!-- Dynamic content rendered here -->
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase, formatDateShort } from '/js/supabase.js';

        // ── Auth ──────────────────────────────────────────────
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) location.href = '/studio/login';

        // ── State ─────────────────────────────────────────────
        let currentSection = 'dashboard';
        const sectionTitles = {
            dashboard: 'Dashboard',
            blog: 'Blog',
            gallery: 'Gallery',
            football: 'Football Clubs',
            f1: 'F1 Drivers',
            watchlist: 'Watchlist',
            thoughts: 'Thoughts'
        };

        // ── Helpers ──────────────────────────────────────────
        function escapeHtml(str) {
            return str?.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]) || '';
        }

        function slugify(text) {
            return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }

        function getExcerpt(html, wordLimit = 50) {
            const div = document.createElement('div');
            div.innerHTML = html;
            const text = div.textContent || div.innerText || '';
            const words = text.trim().split(/\s+/).filter(Boolean);
            return words.slice(0, wordLimit).join(' ') + (words.length > wordLimit ? '...' : '');
        }

        // ── Navigation with hash ────────────────────────────
        function navigateTo(section) {
            window.location.hash = section;
        }

        function getSectionFromHash() {
            const hash = window.location.hash.replace('#', '');
            return sectionTitles[hash] ? hash : 'dashboard';
        }

        async function loadSection(section) {
            currentSection = section;
            // Update active nav
            document.querySelectorAll('.admin-nav-link[data-section]').forEach(a => a.classList.remove('active'));
            const activeLink = document.querySelector(`.admin-nav-link[data-section="${section}"]`);
            if (activeLink) activeLink.classList.add('active');
            document.getElementById('topbarTitle').textContent = sectionTitles[section] || section;

            // Render content
            const renderers = {
                dashboard: renderDashboard,
                blog: renderBlog,
                gallery: renderGallery,
                football: renderFootball,
                f1: renderF1,
                watchlist: renderWatchlist,
                thoughts: renderThoughts
            };
            if (renderers[section]) await renderers[section]();
        }

        window.addEventListener('hashchange', () => {
            loadSection(getSectionFromHash());
        });

        // ── Mobile sidebar toggle ───────────────────────────
        const sidebar = document.getElementById('adminSidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('sidebarToggle');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        });
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        });

        // Close sidebar on nav link click (mobile)
        document.querySelectorAll('.admin-nav-link[data-section]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.dataset.section;
                navigateTo(section);
                if (window.innerWidth <= 860) {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('open');
                }
            });
        });

        // Logout
        document.getElementById('logout').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            location.href = '/studio/login';
        });

        // ── Dashboard ────────────────────────────────────────
        async function renderDashboard() {
            const tables = ['posts', 'gallery', 'football_clubs', 'f1_drivers', 'watchlist', 'thoughts'];
            const stats = {};
            for (const t of tables) {
                const { count } = await supabase.from(t).select('*', { count: 'exact', head: true });
                stats[t] = count ?? 0;
            }
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="page-title-wrap">
                    <h2 class="page-title">Dashboard</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-card-val">${stats.posts}</div><div class="stat-card-label">Blog Posts</div></div>
                    <div class="stat-card"><div class="stat-card-val">${stats.gallery}</div><div class="stat-card-label">Gallery Images</div></div>
                    <div class="stat-card"><div class="stat-card-val">${stats.football_clubs}</div><div class="stat-card-label">Football Clubs</div></div>
                    <div class="stat-card"><div class="stat-card-val">${stats.f1_drivers}</div><div class="stat-card-label">F1 Drivers</div></div>
                    <div class="stat-card"><div class="stat-card-val">${stats.watchlist}</div><div class="stat-card-label">Watchlist Items</div></div>
                    <div class="stat-card"><div class="stat-card-val">${stats.thoughts}</div><div class="stat-card-label">Thoughts</div></div>
                </div>
            `;
        }

        // ── Blog with Rich Editor ────────────────────────────
        async function renderBlog() {
            const { data } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="page-title-wrap">
                    <h2 class="page-title">Blog Posts</h2>
                    <button id="newPostBtn">+ New Post</button>
                </div>
                <div class="data-table-wrap">
                    <table class="data-table">
                        <thead><tr><th>Title</th><th>Status</th><th>Date</th><th style="width:140px">Actions</th></tr></thead>
                        <tbody id="blogList"></tbody>
                    </table>
                </div>
                <div id="blogForm" style="display:none; margin-top:2rem;">
                    <div class="admin-form">
                        <h3 id="formTitle" style="margin-bottom:1.5rem">New Post</h3>
                        <input type="hidden" id="editId">
                        <div class="admin-form-grid">
                            <div class="field--full"><label>Title</label><input id="title" placeholder="Post title"></div>
                            <div><label>Slug</label><input id="slug" placeholder="auto-generated"></div>
                            <div><label>Category</label><input id="category"></div>
                            <div class="field--full"><label>Excerpt (auto from content, 50 words)</label><textarea id="excerpt" rows="2" readonly></textarea></div>
                            <div class="field--full"><label>Content</label>
                                <div class="editor-toolbar" id="editorToolbar">
                                    <button class="editor-toolbar-btn" data-cmd="bold" title="Bold"><b>B</b></button>
                                    <button class="editor-toolbar-btn" data-cmd="italic" title="Italic"><i>I</i></button>
                                    <button class="editor-toolbar-btn" data-cmd="underline" title="Underline"><u>U</u></button>
                                    <button class="editor-toolbar-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
                                    <span class="editor-toolbar-divider"></span>
                                    <button class="editor-toolbar-btn" data-cmd="formatBlock" data-arg="h2" title="Heading 2">H2</button>
                                    <button class="editor-toolbar-btn" data-cmd="formatBlock" data-arg="h3" title="Heading 3">H3</button>
                                    <button class="editor-toolbar-btn" data-cmd="formatBlock" data-arg="blockquote" title="Quote">“</button>
                                    <span class="editor-toolbar-divider"></span>
                                    <button class="editor-toolbar-btn" data-cmd="insertUnorderedList" title="Bullet List">•</button>
                                    <button class="editor-toolbar-btn" data-cmd="insertOrderedList" title="Numbered List">1.</button>
                                    <span class="editor-toolbar-divider"></span>
                                    <button class="editor-toolbar-btn" id="insertLinkBtn" title="Insert Link">🔗</button>
                                    <button class="editor-toolbar-btn" id="insertImageBtn" title="Insert Image">🖼️</button>
                                    <button class="editor-toolbar-btn" id="insertVideoBtn" title="Insert Video">🎬</button>
                                    <button class="editor-toolbar-btn" id="insertTableBtn" title="Insert Table">📊</button>
                                    <span class="editor-toolbar-divider"></span>
                                    <button class="editor-toolbar-btn" id="insertYoutubeBtn" title="Embed YouTube">▶️</button>
                                    <button class="editor-toolbar-btn" id="insertInstagramBtn" title="Embed Instagram">📷</button>
                                    <span class="editor-toolbar-divider"></span>

            // Populate table

                <tr>
                    <td><strong>${escapeHtml(p.title)}</strong></td>
                    <td>${p.status}</td>
                    <td>${formatDateShort(p.created_at)}</td>
                    <td>
                        <button class="editPost btn-outline" data-id="${p.id}" style="padding:0.25rem 0.5rem; font-size:0.8rem;">Edit</button>

            // Delete handlers

                    }
                };
            });

            // Edit handlers
            document.querySelectorAll('.editPost').forEach(btn => {
                btn.onclick = async () => {
                    const { data: post } = await supabase.from('posts').select('*').eq('id', btn.dataset.id).single();
                    if (post) showPostForm(post);
                };
            });

            // New post
            document.getElementById('newPostBtn').onclick = () => showPostForm(null);
            document.getElementById('cancelFormBtn').onclick = () => {
                document.getElementById('blogForm').style.display = 'none';
            };

            // Slug auto
            const titleInput = document.getElementById('title');
            const slugInput = document.getElementById('slug');
            titleInput.addEventListener('input', () => {
                if (!document.getElementById('editId').value) { // only auto if new
                    slugInput.value = slugify(titleInput.value);
                }
            });

            // Excerpt auto-update
            const editor = document.getElementById('postEditor');
            const excerptField = document.getElementById('excerpt');
            let excerptTimer;
            editor.addEventListener('input', () => {
                clearTimeout(excerptTimer);
                excerptTimer = setTimeout(() => {
                    excerptField.value = getExcerpt(editor.innerHTML, 50);
                }, 600);
            });

            // Toolbar commands
            document.querySelectorAll('.editor-toolbar-btn[data-cmd]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const cmd = btn.dataset.cmd;
                    const arg = btn.dataset.arg || null;
                    document.execCommand(cmd, false, arg);
                    editor.focus();
                });
            });

            // Forecolor / backcolor
            document.getElementById('foreColorPicker').addEventListener('input', (e) => {
                document.execCommand('foreColor', false, e.target.value);
                editor.focus();
            });
            document.getElementById('bgColorPicker').addEventListener('input', (e) => {
                document.execCommand('backColor', false, e.target.value);
                editor.focus();
            });

            // Insert link
            document.getElementById('insertLinkBtn').addEventListener('click', () => {
                const url = prompt('Enter URL:', 'https://');
                if (url) {
                    const text = prompt('Link text:', url);
                    if (text !== null) {
                        document.execCommand('createLink', false, url);
                        // If there's a selection, execCommand creates link; if no selection, insert text with link manually
                        if (!window.getSelection().toString()) {
                            const linkHtml = `<a href="${url}" target="_blank">${text || url}</a>`;
                            insertHtmlAtCursor(linkHtml);
                        }
                    }
                }
                editor.focus();
            });

            // Insert image (from URL or upload)
            document.getElementById('insertImageBtn').addEventListener('click', async () => {
                const choice = confirm('Click OK to upload from device, Cancel to enter URL');
                if (choice) {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const url = await uploadFile(file, 'media');
                        if (url) {
                            insertHtmlAtCursor(`<img src="${url}" alt="${file.name}" style="max-width:100%">`);
                        }
                    };
                    input.click();
                } else {
                    const url = prompt('Enter image URL:', 'https://');
                    if (url) {
                        insertHtmlAtCursor(`<img src="${url}" alt="image" style="max-width:100%">`);
                    }
                }
                editor.focus();
            });

            // Insert video
            document.getElementById('insertVideoBtn').addEventListener('click', async () => {
                const choice = confirm('Click OK to upload video from device, Cancel to enter URL');
                if (choice) {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'video/*';
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const url = await uploadFile(file, 'media');
                        if (url) {
                            insertHtmlAtCursor(`<video controls src="${url}" style="max-width:100%"></video>`);
                        }
                    };
                    input.click();
                } else {
                    const url = prompt('Enter video URL (MP4, etc):', 'https://');
                    if (url) {
                        insertHtmlAtCursor(`<video controls src="${url}" style="max-width:100%"></video>`);
                    }
                }
                editor.focus();
            });

            // Insert table with color
            document.getElementById('insertTableBtn').addEventListener('click', () => {
                const rows = prompt('Number of rows:', '3');
                const cols = prompt('Number of columns:', '3');
                const bgColor = prompt('Background color (hex, e.g., #1a1a1a or leave empty):', '');
                if (rows && cols) {
                    let table = '<table style="width:100%; border-collapse:collapse; margin:1em 0;">';
                    for (let i = 0; i < parseInt(rows); i++) {
                        table += '<tr>';
                        for (let j = 0; j < parseInt(cols); j++) {
                            const style = bgColor ? ` style="background:${bgColor}; border:1px solid var(--border); padding:0.5rem;"` : ' style="border:1px solid var(--border); padding:0.5rem;"';
                            table += `<td${style}>Cell</td>`;
                        }
                        table += '</tr>';
                    }
                    table += '</table>';
                    insertHtmlAtCursor(table);
                }
                editor.focus();
            });

            // Embed YouTube
            document.getElementById('insertYoutubeBtn').addEventListener('click', () => {
                const url = prompt('Enter YouTube video URL:', 'https://www.youtube.com/watch?v=');
                if (url) {
                    const videoId = url.match(/(?:watch\?v=|\/embed\/|\.be\/)([a-zA-Z0-9_-]{11})/);
                    if (videoId && videoId[1]) {
                        const embed = `<iframe width="560" height="315" src="https://www.youtube.com/embed/${videoId[1]}" frameborder="0" allowfullscreen style="max-width:100%"></iframe>`;
                        insertHtmlAtCursor(embed);
                    } else {
                        alert('Invalid YouTube URL');
                    }
                }
                editor.focus();
            });

            // Embed Instagram
            document.getElementById('insertInstagramBtn').addEventListener('click', () => {
                const url = prompt('Enter Instagram post URL:', 'https://www.instagram.com/p/');
                if (url) {
                    const embed = `<blockquote class="instagram-media" data-instgrm-permalink="${url}" data-instgrm-version="14" style="max-width:540px; margin:1em auto;"></blockquote>`;
                    insertHtmlAtCursor(embed);
                    // Load Instagram embed script once
                    if (!document.getElementById('instagram-script')) {
                        const script = document.createElement('script');
                        script.id = 'instagram-script';
                        script.src = '//www.instagram.com/embed.js';
                        script.async = true;
                        document.body.appendChild(script);
                    }
                }
                editor.focus();
            });

            // Save post
            document.getElementById('savePostBtn').onclick = async () => {
                const id = document.getElementById('editId').value;
                const title = document.getElementById('title').value.trim();
                if (!title) return alert('Title required');
                const post = {
                    title,
                    slug: document.getElementById('slug').value || slugify(title),
                    excerpt: document.getElementById('excerpt').value || getExcerpt(editor.innerHTML, 50),
                    content: editor.innerHTML,
                    cover_image: document.getElementById('cover_image').value,
                    category: document.getElementById('category').value,
                    tags: document.getElementById('tags').value.split(',').map(s => s.trim()).filter(Boolean),
                    status: document.getElementById('status').value,
                    featured: document.getElementById('featured').checked
                };
                if (id) {
                    await supabase.from('posts').update(post).eq('id', id);
                } else {
                    await supabase.from('posts').insert(post);
                }
                renderBlog();
            };

            function showPostForm(post) {
                document.getElementById('blogForm').style.display = 'block';
                document.getElementById('formTitle').textContent = post ? 'Edit Post' : 'New Post';
                document.getElementById('editId').value = post?.id || '';
                document.getElementById('title').value = post?.title || '';
                document.getElementById('slug').value = post?.slug || '';
                document.getElementById('excerpt').value = post?.excerpt || '';
                editor.innerHTML = post?.content || '';
                document.getElementById('cover_image').value = post?.cover_image || '';
                document.getElementById('category').value = post?.category || '';
                document.getElementById('tags').value = (post?.tags || []).join(', ');
                document.getElementById('status').value = post?.status || 'draft';
                document.getElementById('featured').checked = post?.featured || false;
                if (!post) {
                    // Auto slug generation on title input
                    slugInput.value = slugify(titleInput.value);
                }
                // Trigger excerpt update once
                excerptField.value = getExcerpt(editor.innerHTML, 50);
            }

            // Helper: insert HTML at cursor
            function insertHtmlAtCursor(html) {
                const selection = window.getSelection();
                if (selection.rangeCount) {
                    const range = selection.getRangeAt(0);
                    range.deleteContents();
                    const fragment = range.createContextualFragment(html);
                    range.insertNode(fragment);
                    range.collapse(false);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
            }

            // Upload helper
            async function uploadFile(file, bucket) {
                const fileName = Date.now() + '_' + file.name.replace(/\s+/g, '_');
                const { error } = await supabase.storage.from(bucket).upload(fileName, file);
                if (error) {
                    alert('Upload error: ' + error.message);
                    return null;
                }
                const { data: { publicUrl } } = supabase.storage.from(bucket).getPublicUrl(fileName);
                return publicUrl;
            }
        }

                    poster_url: document.getElementById('watchPoster').value
                };
                if (id) await supabase.from('watchlist').update(item).eq('id', id);
                else await supabase.from('watchlist').insert(item);
                renderWatchlist();
            };
            function showWatchForm(w) {
                document.getElementById('watchForm').style.display = 'block';
                document.getElementById('watchId').value = w?.id || '';
                document.getElementById('watchTitle').value = w?.title || '';
                document.getElementById('watchType').value = w?.type || 'movie';
                document.getElementById('watchStatus').value = w?.status || 'want_to_watch';
                document.getElementById('watchYear').value = w?.year || '';
                document.getElementById('watchRating').value = w?.rating || '';
                document.getElementById('watchNotes').value = w?.notes || '';
                document.getElementById('watchPoster').value = w?.poster_url || '';
            }
        }

        // ── Thoughts ─────────────────────────────────────────
        async function renderThoughts() {
            const { data } = await supabase.from('thoughts').select('*').order('created_at', { ascending: false });
            document.getElementById('content').innerHTML = `
                <div class="page-title-wrap"><h2 class="page-title">Thoughts</h2><button id="newThoughtBtn">+ New Thought</button></div>
                <div class="data-table-wrap"><table class="data-table"><thead><tr><th>Content</th><th>Tags</th><th>Date</th><th style="width:120px">Actions</th></tr></thead><tbody id="thoughtList"></tbody></table></div>
                <div id="thoughtForm" style="display:none; margin-top:2rem;">
                    <div class="admin-form">
                        <h3>Thought Form</h3>
                        <input type="hidden" id="thoughtId">
                        <div class="admin-form-grid">
                            <div class="field--full"><label>Content</label><textarea id="thoughtContent" rows="4"></textarea></div>
                            <div class="field--full"><label>Tags (comma separated)</label><input id="thoughtTags"></div>
                        </div>
                        <div class="admin-form-actions">
                            <button class="btn-outline" id="cancelThoughtBtn">Cancel</button>
                            <button id="saveThoughtBtn">Save</button>
                        </div>
                    </div>
                </div>
            `;
            const tbody = document.getElementById('thoughtList');
            tbody.innerHTML = (data || []).map(t => `
                <tr><td>${escapeHtml(t.content?.substring(0, 80))}${t.content?.length > 80 ? '...' : ''}</td>
                <td>${(t.tags || []).join(', ')}</td><td>${formatDateShort(t.created_at)}</td>
                <td><button class="editThought btn-outline" data-id="${t.id}" style="padding:0.2rem 0.4rem;">Edit</button>
                <button class="delThought btn-outline" data-id="${t.id}" style="padding:0.2rem 0.4rem; color:var(--red);">Delete</button></td></tr>
            `).join('');
            document.querySelectorAll('.delThought').forEach(btn => btn.onclick = async () => {
                if (confirm('Delete?')) { await supabase.from('thoughts').delete().eq('id', btn.dataset.id); renderThoughts(); }
            });
            document.querySelectorAll('.editThought').forEach(btn => btn.onclick = async () => {
                const { data: thought } = await supabase.from('thoughts').select('*').eq('id', btn.dataset.id).single();
                if (thought) showThoughtForm(thought);
            });
            document.getElementById('newThoughtBtn').onclick = () => showThoughtForm(null);
            document.getElementById('cancelThoughtBtn').onclick = () => document.getElementById('thoughtForm').style.display = 'none';
            document.getElementById('saveThoughtBtn').onclick = async () => {
                const id = document.getElementById('thoughtId').value;
                const thought = {
                    content: document.getElementById('thoughtContent').value,
                    tags: document.getElementById('thoughtTags').value.split(',').map(s => s.trim()).filter(Boolean)
                };
                if (id) await supabase.from('thoughts').update(thought).eq('id', id);
                else await supabase.from('thoughts').insert(thought);
                renderThoughts();
            };
            function showThoughtForm(t) {
                document.getElementById('thoughtForm').style.display = 'block';
                document.getElementById('thoughtId').value = t?.id || '';
                document.getElementById('thoughtContent').value = t?.content || '';
                document.getElementById('thoughtTags').value = (t?.tags || []).join(', ');
            }
        }

        // ── Initial load ────────────────────────────────────
        const initialSection = getSectionFromHash();
        await loadSection(initialSection);
    </script>
</body>
</html>
