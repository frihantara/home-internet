<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio — Frihantara</title>
    <link rel="stylesheet" href="/css/global.css">
    <!-- Editor.js core + plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.30.2/dist/editorjs.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.7/dist/header.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@2.11.6/dist/paragraph.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2.0.2/dist/list.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@2.7.4/dist/quote.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@2.4.3/dist/table.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@2.10.1/dist/image.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/embed@2.7.6/dist/embed.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1.4.2/dist/delimiter.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@2.9.3/dist/code.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@1.4.0/dist/marker.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/inline-code@1.5.0/dist/inline-code.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/warning@1.4.0/dist/warning.umd.min.js"></script>
    <style>
        /* ============================================================
           FRIHANTARA STUDIO — Admin Panel
           Dark professional theme, WordPress-inspired
           ============================================================ */

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sidebar-w: 256px;
            --topbar-h: 56px;
            --bg: #0d0d0f;
            --surface: #161618;
            --surface-2: #1e1e22;
            --surface-3: #26262c;
            --border: rgba(255,255,255,.07);
            --border-2: rgba(255,255,255,.12);
            --text: #f0f0f2;
            --text-2: #a0a0b0;
            --text-3: #5a5a70;
            --gold: #f0c040;
            --gold-dim: rgba(240,192,64,.4);
            --gold-glow: rgba(240,192,64,.08);
            --red: #f06060;
            --green: #50e090;
            --blue: #60b0f0;
            --radius: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow: 0 4px 24px rgba(0,0,0,.4);
            --transition: .15s ease;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ── Layout ──────────────────────────────────── */
        .studio-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ──────────────────────────────────── */
        .studio-sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform .25s cubic-bezier(.4,0,.2,1);
        }

        .sidebar-brand {
            padding: 1.25rem 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .75rem;
        }
        .sidebar-brand-logo {
            width: 32px; height: 32px;
            background: var(--gold);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            color: #000;
            font-weight: 700;
            flex-shrink: 0;
        }
        .sidebar-brand-name {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -.01em;
        }
        .sidebar-brand-name span {
            color: var(--gold);
        }
        .sidebar-brand-badge {
            font-size: .6rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-3);
            background: var(--surface-2);
            padding: .15rem .4rem;
            border-radius: 99px;
            margin-left: auto;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem .75rem;
            display: flex;
            flex-direction: column;
            gap: .15rem;
        }

        .sidebar-group {
            margin-bottom: .5rem;
        }
        .sidebar-group-label {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--text-3);
            padding: .6rem .75rem .25rem;
            font-weight: 600;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .55rem .75rem;
            border-radius: var(--radius-md);
            font-size: .85rem;
            font-weight: 500;
            color: var(--text-2);
            transition: background var(--transition), color var(--transition);
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .sidebar-link:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        .sidebar-link.active {
            background: var(--gold-glow);
            color: var(--gold);
        }
        .sidebar-link .nav-icon {
            font-size: 1rem;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .sidebar-link .nav-badge {
            margin-left: auto;
            font-size: .65rem;
            background: var(--surface-3);
            color: var(--text-3);
            padding: .1rem .4rem;
            border-radius: 99px;
        }
        .sidebar-link.active .nav-badge {
            background: var(--gold-glow);
            color: var(--gold);
        }

        .sidebar-footer {
            padding: 1rem .75rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: .15rem;
        }
        .sidebar-footer .sidebar-link {
            font-size: .82rem;
        }

        /* ── Overlay (mobile) ──────────────────────────── */
        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 99;
            backdrop-filter: blur(2px);
        }
        .sidebar-overlay.open { display: block; }

        /* ── Main content ──────────────────────────────── */
        .studio-main {
            flex: 1;
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Topbar ──────────────────────────────────── */
        .studio-topbar {
            height: var(--topbar-h);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            background: rgba(13,13,15,.85);
            backdrop-filter: blur(12px);
            z-index: 50;
            gap: 1rem;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .topbar-menu-btn {
            display: none;
            align-items: center; justify-content: center;
            width: 34px; height: 34px;
            border-radius: var(--radius);
            border: none;
            background: transparent;
            color: var(--text-2);
            cursor: pointer;
            transition: background var(--transition);
        }
        .topbar-menu-btn:hover { background: var(--surface-2); }

        .topbar-breadcrumb {
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: .85rem;
        }
        .topbar-breadcrumb-root {
            color: var(--text-3);
        }
        .topbar-breadcrumb-sep {
            color: var(--text-3);
        }
        .topbar-breadcrumb-current {
            color: var(--text);
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .topbar-btn {
            display: flex;
            align-items: center; justify-content: center;
            gap: .4rem;
            height: 32px;
            padding: 0 .75rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-2);
            background: var(--surface-2);
            color: var(--text-2);
            font-size: .8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
        }
        .topbar-btn:hover {
            background: var(--surface-3);
            color: var(--text);
        }
        .topbar-btn.primary {
            background: var(--gold);
            color: #000;
            border-color: transparent;
            font-weight: 600;
        }
        .topbar-btn.primary:hover {
            background: #f7d060;
        }

        /* ── Content area ──────────────────────────────── */
        .studio-content {
            flex: 1;
            padding: 2rem 1.75rem;
            max-width: 1400px;
            width: 100%;
        }

        /* ── Page header ──────────────────────────────── */
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }
        .page-header-left h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -.02em;
            color: var(--text);
            line-height: 1.1;
        }
        .page-header-left p {
            font-size: .83rem;
            color: var(--text-3);
            margin-top: .3rem;
        }
        .page-header-actions {
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-wrap: wrap;
        }

        /* ── Buttons ──────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center; justify-content: center;
            gap: .4rem;
            padding: .5rem 1rem;
            border-radius: var(--radius);
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--gold);
            color: #000;
        }
        .btn-primary:hover { background: #f7d060; }
        .btn-secondary {
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            color: var(--text-2);
        }
        .btn-secondary:hover { background: var(--surface-3); color: var(--text); }
        .btn-danger {
            background: transparent;
            border: 1px solid rgba(240,96,96,.3);
            color: var(--red);
        }
        .btn-danger:hover { background: rgba(240,96,96,.1); }
        .btn-sm {
            padding: .3rem .65rem;
            font-size: .78rem;
        }
        .btn-ghost {
            background: transparent;
            border: none;
            color: var(--text-3);
        }
        .btn-ghost:hover { color: var(--text); background: var(--surface-2); }

        /* ── Stats grid ──────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gold);
            opacity: .3;
        }
        .stat-card:hover::before { opacity: 1; }
        .stat-card-icon {
            font-size: 1.4rem;
            margin-bottom: .6rem;
            opacity: .8;
        }
        .stat-card-val {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -.03em;
            line-height: 1;
            margin-bottom: .3rem;
        }
        .stat-card-label {
            font-size: .76rem;
            color: var(--text-3);
            font-weight: 500;
        }

        /* ── Data table ──────────────────────────────── */
        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .table-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .table-search {
            display: flex;
            align-items: center;
            gap: .5rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: .35rem .75rem;
            flex: 1; max-width: 280px;
        }
        .table-search input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: .83rem;
            width: 100%;
            outline: none;
            padding: 0;
        }
        .table-search input::placeholder { color: var(--text-3); }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            text-align: left;
            font-size: .68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-3);
            padding: .75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-2);
            white-space: nowrap;
        }
        .data-table td {
            padding: .85rem 1.25rem;
            font-size: .85rem;
            color: var(--text-2);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr { transition: background var(--transition); }
        .data-table tbody tr:hover { background: var(--surface-2); }
        .data-table td strong { color: var(--text); font-weight: 600; }
        .td-actions { display: flex; gap: .4rem; align-items: center; }

        /* Status badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .2rem .55rem;
            border-radius: 99px;
            font-size: .72rem;
            font-weight: 600;
        }
        .badge-published { background: rgba(80,224,144,.1); color: var(--green); }
        .badge-draft { background: var(--surface-3); color: var(--text-3); }
        .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

        /* ── Panel (form wrapper) ──────────────────────── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }
        .panel-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .panel-header h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }
        .panel-body {
            padding: 1.5rem;
        }

        /* ── Form fields ──────────────────────────────── */
        .field-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }
        .field-group .field-full { grid-column: 1 / -1; }
        @media (max-width: 640px) {
            .field-group { grid-template-columns: 1fr; }
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: .35rem;
        }
        .field label {
            font-size: .78rem;
            font-weight: 600;
            color: var(--text-2);
        }
        .field input,
        .field textarea,
        .field select {
            width: 100%;
            padding: .55rem .75rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: .85rem;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }
        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            border-color: var(--gold-dim);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        .field textarea { resize: vertical; min-height: 80px; }
        .field-help {
            font-size: .73rem;
            color: var(--text-3);
        }
        .field-row {
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .field-row input[type=checkbox] {
            width: 15px; height: 15px;
            accent-color: var(--gold);
        }
        .field-row label { margin: 0; font-size: .85rem; cursor: pointer; }

        .form-actions {
            display: flex;
            align-items: center;
            gap: .75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        /* ── Blog editor layout ──────────────────────── */
        .post-editor-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 960px) {
            .post-editor-layout { grid-template-columns: 1fr; }
        }

        .post-editor-main { display: flex; flex-direction: column; gap: 1.25rem; }
        .post-editor-sidebar { display: flex; flex-direction: column; gap: 1.25rem; }

        /* ── Editor.js wrapper ──────────────────────── */
        .editorjs-wrap {
            min-height: 460px;
            overflow: hidden;
        }
        .editorjs-wrap .codex-editor {
            padding: .75rem 0;
        }
        .editorjs-wrap .ce-block__content,
        .editorjs-wrap .ce-toolbar__content {
            max-width: none !important;
            padding: 0 1.25rem;
        }
        .editorjs-wrap .codex-editor__redactor {
            padding-bottom: 60px !important;
        }
        /* Override Editor.js dark mode colors */
        .editorjs-wrap .ce-paragraph,
        .editorjs-wrap .ce-header,
        .editorjs-wrap .cdx-input {
            color: var(--text) !important;
        }
        .editorjs-wrap .ce-toolbar__plus,
        .editorjs-wrap .ce-toolbar__settings-btn {
            color: var(--text-2) !important;
            background: var(--surface-2) !important;
        }
        .editorjs-wrap .ce-popover {
            background: var(--surface-2) !important;
            border: 1px solid var(--border-2) !important;
            box-shadow: var(--shadow) !important;
        }
        .editorjs-wrap .ce-popover-item:hover,
        .editorjs-wrap .ce-popover-item--focused {
            background: var(--surface-3) !important;
        }
        .editorjs-wrap .ce-popover-item__title {
            color: var(--text) !important;
        }
        .editorjs-wrap .ce-popover-item__secondary-title {
            color: var(--text-3) !important;
        }
        .editorjs-wrap .cdx-block {
            color: var(--text);
        }
        .editorjs-wrap .cdx-quote__text,
        .editorjs-wrap .cdx-quote__caption {
            color: var(--text) !important;
        }
        .editorjs-wrap .cdx-quote__text {
            border-left: 3px solid var(--gold) !important;
        }
        .editorjs-wrap table td,
        .editorjs-wrap table th {
            border: 1px solid var(--border-2) !important;
            color: var(--text) !important;
        }
        .editorjs-wrap .tc-table {
            border-color: var(--border-2) !important;
        }
        .editorjs-wrap .image-tool__caption {
            color: var(--text-3) !important;
        }
        .editorjs-wrap .cdx-warning {
            background: rgba(240,192,64,.06) !important;
            border-color: var(--gold-dim) !important;
        }
        .editorjs-wrap .cdx-warning__title,
        .editorjs-wrap .cdx-warning__message {
            color: var(--text) !important;
        }
        .editorjs-wrap .ce-code__textarea {
            background: var(--surface-3) !important;
            color: #a8ff78 !important;
            border-color: var(--border) !important;
        }
        .editorjs-wrap [contenteditable=true]:empty:before {
            color: var(--text-3) !important;
        }

        /* ── Editor.js mobile fixes ──────────────────── */
        @media (max-width: 700px) {
            .editorjs-wrap {
                overflow-x: hidden;
            }
            .editorjs-wrap .codex-editor {
                padding: .5rem 0;
            }
            .editorjs-wrap .ce-block__content,
            .editorjs-wrap .ce-toolbar__content {
                padding: 0 .75rem;
                max-width: calc(100% - 40px) !important;
                margin-left: 40px !important;
            }
            /* Plus / settings buttons sit in the freed-up left gutter
               instead of being pushed off-screen by negative margins */
            .editorjs-wrap .ce-toolbar__plus {
                left: 0 !important;
                transform: none !important;
            }
            .editorjs-wrap .ce-toolbar__actions {
                right: auto !important;
                left: 0 !important;
                transform: translateX(0) !important;
                margin-left: 0 !important;
            }
            .editorjs-wrap .ce-toolbar__plus,
            .editorjs-wrap .ce-toolbar__settings-btn {
                width: 28px; height: 28px;
            }
            .editorjs-wrap .ce-popover,
            .editorjs-wrap .ce-popover--inline {
                max-width: calc(100vw - 2rem) !important;
            }
        }

        /* Toolbar for embed quick-insert */
        .embed-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            padding: .75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-2);
        }
        .embed-btn {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .3rem .65rem;
            border-radius: var(--radius);
            font-size: .75rem;
            font-weight: 500;
            background: var(--surface-3);
            border: 1px solid var(--border);
            color: var(--text-2);
            cursor: pointer;
            transition: all var(--transition);
        }
        .embed-btn:hover {
            background: var(--border-2);
            color: var(--text);
        }
        @media (max-width: 700px) {
            .embed-toolbar {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding: .6rem .75rem;
            }
            .embed-btn { flex-shrink: 0; }
        }

        /* ── Gallery grid ──────────────────────────── */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .gallery-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: border-color var(--transition);
            position: relative;
        }
        .gallery-card:hover { border-color: var(--border-2); }
        .gallery-card-img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
            background: var(--surface-2);
        }
        .gallery-card-body {
            padding: .65rem .75rem;
        }
        .gallery-card-caption {
            font-size: .8rem;
            color: var(--text-2);
            line-height: 1.4;
        }
        .gallery-card-caption:empty::before {
            content: 'No caption';
            color: var(--text-3);
        }
        .gallery-card-actions {
            display: flex;
            gap: .3rem;
            margin-top: .5rem;
        }
        .gallery-card-overlay {
            position: absolute;
            top: .5rem; right: .5rem;
            display: flex;
            gap: .3rem;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .gallery-card:hover .gallery-card-overlay { opacity: 1; }
        .gallery-overlay-btn {
            width: 28px; height: 28px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: .8rem;
            background: rgba(13,13,15,.8);
            backdrop-filter: blur(4px);
            color: var(--text);
            transition: background var(--transition);
        }
        .gallery-overlay-btn:hover { background: rgba(240,96,96,.7); }

        /* ── Add from URL panel ──────────────────────── */
        .add-url-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 1.25rem;
        }
        .add-url-panel-header {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-2);
        }
        .add-url-panel-header span {
            font-size: .85rem;
            font-weight: 600;
            color: var(--text);
        }
        .add-url-panel-body {
            padding: 1rem 1.25rem;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: .75rem;
            align-items: end;
        }
        @media (max-width: 640px) {
            .add-url-panel-body {
                grid-template-columns: 1fr;
            }
        }

        /* ── Upload dropzone ──────────────────────── */
        .dropzone {
            border: 2px dashed var(--border-2);
            border-radius: var(--radius-md);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--surface-2);
        }
        .dropzone:hover,
        .dropzone.dragover {
            border-color: var(--gold-dim);
            background: var(--gold-glow);
        }
        .dropzone-icon { font-size: 2rem; margin-bottom: .5rem; opacity: .5; }
        .dropzone-text { font-size: .85rem; color: var(--text-3); }
        .dropzone-text strong { color: var(--text-2); }

        /* ── Modal ────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 200;
            align-items: center; justify-content: center;
            padding: 1rem;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border-2);
            border-radius: var(--radius-lg);
            width: 100%; max-width: 520px;
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
        }
        .modal-close {
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius); border: none;
            background: transparent; color: var(--text-3);
            cursor: pointer; font-size: 1.1rem;
            transition: all var(--transition);
        }
        .modal-close:hover { background: var(--surface-2); color: var(--text); }
        .modal-body { padding: 1.5rem; }
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: .5rem;
            justify-content: flex-end;
        }

        /* ── Toast ────────────────────────────────── */
        .toast-wrap {
            position: fixed;
            bottom: 1.5rem; right: 1.5rem;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }
        .toast {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .75rem 1rem;
            border-radius: var(--radius-md);
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            box-shadow: var(--shadow);
            font-size: .85rem;
            color: var(--text);
            animation: toastIn .2s ease;
            min-width: 200px;
        }
        .toast-success { border-left: 3px solid var(--green); }
        .toast-error { border-left: 3px solid var(--red); }
        .toast-info { border-left: 3px solid var(--blue); }
        @keyframes toastIn {
            from { opacity:0; transform: translateX(16px); }
            to { opacity:1; transform: none; }
        }

        /* ── Mobile ─────────────────────────────────── */
        @media (max-width: 860px) {
            .studio-main { margin-left: 0; }
            .studio-sidebar { transform: translateX(-100%); }
            .studio-sidebar.open { transform: none; }
            .topbar-menu-btn { display: flex; }
            .studio-content { padding: 1.25rem 1rem; }
        }

        /* ── Empty state ─────────────────────────────── */
        .empty-state {
            padding: 3rem 2rem;
            text-align: center;
            color: var(--text-3);
        }
        .empty-state-icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .4; }
        .empty-state-title { font-size: 1rem; font-weight: 600; color: var(--text-2); margin-bottom: .3rem; }
        .empty-state-desc { font-size: .82rem; }

        /* ── Inline editable caption ─────────────── */
        .editable-caption {
            outline: none;
            border-radius: 3px;
            transition: background var(--transition);
        }
        .editable-caption:focus { background: var(--surface-3); }

        /* ── Nav counter ──────────────────────────── */
        #navCount-blog,
        #navCount-gallery {
            font-variant-numeric: tabular-nums;
        }

        /* ── Dashboard recent table ─────────────── */
        .recent-posts {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .recent-posts-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        .recent-posts-header h3 {
            font-size: .9rem;
            font-weight: 700;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="studio-layout">

        <!-- ═══ SIDEBAR ═══ -->
        <aside class="studio-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-logo">F</div>
                <div>
                    <div class="sidebar-brand-name">Frihan<span>tara</span></div>
                </div>
                <span class="sidebar-brand-badge">Studio</span>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-group">
                    <div class="sidebar-group-label">Overview</div>
                    <button class="sidebar-link active" data-section="dashboard">
                        <span class="nav-icon">📊</span> Dashboard
                    </button>
                </div>
                <div class="sidebar-group">
                    <div class="sidebar-group-label">Content</div>
                    <button class="sidebar-link" data-section="blog">
                        <span class="nav-icon">📝</span> Blog
                        <span class="nav-badge" id="navCount-blog">—</span>
                    </button>
                    <button class="sidebar-link" data-section="gallery">
                        <span class="nav-icon">🖼️</span> Gallery
                        <span class="nav-badge" id="navCount-gallery">—</span>
                    </button>
                    <button class="sidebar-link" data-section="football">
                        <span class="nav-icon">⚽</span> Football Clubs
                    </button>
                    <button class="sidebar-link" data-section="f1">
                        <span class="nav-icon">🏎️</span> F1 Drivers
                    </button>
                    <button class="sidebar-link" data-section="watchlist">
                        <span class="nav-icon">🎬</span> Watchlist
                    </button>
                    <button class="sidebar-link" data-section="thoughts">
                        <span class="nav-icon">💭</span> Thoughts
                    </button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <a class="sidebar-link" href="/" target="_blank">
                    <span class="nav-icon">🌐</span> View Site
                </a>
                <button class="sidebar-link" id="logoutBtn">
                    <span class="nav-icon">🚪</span> Sign out
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- ═══ MAIN ═══ -->
        <main class="studio-main">

            <!-- Topbar -->
            <div class="studio-topbar">
                <div class="topbar-left">
                    <button class="topbar-menu-btn" id="menuBtn">☰</button>
                    <div class="topbar-breadcrumb">
                        <span class="topbar-breadcrumb-root">Studio</span>
                        <span class="topbar-breadcrumb-sep">/</span>
                        <span class="topbar-breadcrumb-current" id="pageTitle">Dashboard</span>
                    </div>
                </div>
                <div class="topbar-right" id="topbarActions"></div>
            </div>

            <!-- Content -->
            <div class="studio-content" id="content"></div>
        </main>
    </div>

    <!-- Toast container -->
    <div class="toast-wrap" id="toastWrap"></div>

    <script type="module">
        import { supabase, formatDateShort } from '/js/supabase.js';

        // ─── Auth ───────────────────────────────────────────
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) { location.href = '/studio/login'; }

        // ─── Helpers ────────────────────────────────────────
        function escapeHtml(str) {
            return str?.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]) || '';
        }
        function slugify(t) {
            return t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }
        function toast(msg, type = 'success') {
            const w = document.getElementById('toastWrap');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = (type === 'success' ? '✓ ' : type === 'error' ? '✕ ' : 'ℹ ') + msg;
            w.appendChild(el);
            setTimeout(() => el.remove(), 3200);
        }

        // ─── Navigation ─────────────────────────────────────
        const sectionTitles = {
            dashboard: 'Dashboard', blog: 'Blog', gallery: 'Gallery',
            football: 'Football Clubs', f1: 'F1 Drivers',
            watchlist: 'Watchlist', thoughts: 'Thoughts'
        };

        function getHashSection() {
            const h = window.location.hash.replace('#', '');
            return sectionTitles[h] ? h : 'dashboard';
        }

        async function navigate(section) {
            window.location.hash = section;
        }

        async function loadSection(section) {
            document.querySelectorAll('.sidebar-link[data-section]').forEach(l => l.classList.remove('active'));
            const active = document.querySelector(`.sidebar-link[data-section="${section}"]`);
            if (active) active.classList.add('active');
            document.getElementById('pageTitle').textContent = sectionTitles[section] || section;
            document.getElementById('topbarActions').innerHTML = '';

            const map = { dashboard: renderDashboard, blog: renderBlog, gallery: renderGallery,
                football: renderFootball, f1: renderF1, watchlist: renderWatchlist, thoughts: renderThoughts };
            if (map[section]) await map[section]();
        }

        window.addEventListener('hashchange', () => loadSection(getHashSection()));

        // Mobile sidebar
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        document.getElementById('menuBtn').addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        });
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        });
        document.querySelectorAll('.sidebar-link[data-section]').forEach(l => {
            l.addEventListener('click', () => {
                navigate(l.dataset.section);
                if (window.innerWidth <= 860) {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('open');
                }
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            location.href = '/studio/login';
        });

        // ─── Dashboard ───────────────────────────────────────
        async function renderDashboard() {
            const tables = ['posts','gallery','football_clubs','f1_drivers','watchlist','thoughts'];
            const labels = { posts: 'Blog Posts', gallery: 'Gallery Images', football_clubs: 'Football Clubs',
                f1_drivers: 'F1 Drivers', watchlist: 'Watchlist Items', thoughts: 'Thoughts' };
            const icons = { posts: '📝', gallery: '🖼️', football_clubs: '⚽', f1_drivers: '🏎️', watchlist: '🎬', thoughts: '💭' };
            const stats = {};
            for (const t of tables) {
                const { count } = await supabase.from(t).select('*', { count: 'exact', head: true });
                stats[t] = count ?? 0;
            }
            // Update sidebar badges
            document.getElementById('navCount-blog').textContent = stats.posts;
            document.getElementById('navCount-gallery').textContent = stats.gallery;

            const { data: recentPosts } = await supabase.from('posts').select('title,status,created_at').order('created_at', { ascending: false }).limit(5);

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="page-header">
                    <div class="page-header-left">
                        <h1>Dashboard</h1>
                        <p>Welcome back! Here's an overview of your content.</p>
                    </div>
                </div>
                <div class="stats-grid">
                    ${tables.map(t => `
                        <div class="stat-card">
                            <div class="stat-card-icon">${icons[t]}</div>
                            <div class="stat-card-val">${stats[t]}</div>
                            <div class="stat-card-label">${labels[t]}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="recent-posts">
                    <div class="recent-posts-header">
                        <h3>Recent Posts</h3>
                        <button class="btn btn-secondary btn-sm" onclick="navigate('blog')">View all</button>
                    </div>
                    ${recentPosts?.length ? `
                    <table class="data-table">
                        <thead><tr><th>Title</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody>
                            ${recentPosts.map(p => `
                                <tr>
                                    <td><strong>${escapeHtml(p.title)}</strong></td>
                                    <td><span class="badge badge-${p.status}">${p.status === 'published' ? '<span class="badge-dot"></span>' : ''}${p.status}</span></td>
                                    <td>${formatDateShort(p.created_at)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>` : `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div class="empty-state-title">No posts yet</div>
                        <div class="empty-state-desc">Create your first post to get started.</div>
                    </div>`}
                </div>
            `;
        }

        // ─── Blog ────────────────────────────────────────────
        let editorInstance = null;

        async function renderBlog() {
            const { data } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            document.getElementById('navCount-blog').textContent = data?.length || 0;

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="page-header">
                    <div class="page-header-left">
                        <h1>Blog Posts</h1>
                        <p>${data?.length || 0} posts total</p>
                    </div>
                    <div class="page-header-actions">
                        <button class="btn btn-primary" id="newPostBtn">+ New Post</button>
                    </div>
                </div>

                <!-- Post list -->
                <div id="blogListWrap">
                    <div class="table-container">
                        <div class="table-toolbar">
                            <div class="table-search">
                                <span>🔍</span>
                                <input id="blogSearch" placeholder="Search posts…" oninput="filterTable(this.value,'blogTbody')">
                            </div>
                            <span style="font-size:.8rem; color:var(--text-3)">${data?.length || 0} posts</span>
                        </div>
                        ${data?.length ? `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th style="width:130px">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="blogTbody">
                                ${data.map(p => `
                                    <tr data-search="${escapeHtml(p.title.toLowerCase())}">
                                        <td>
                                            <strong>${escapeHtml(p.title)}</strong>
                                            ${p.featured ? '<span style="font-size:.7rem; background:var(--gold-glow); color:var(--gold); padding:.1rem .35rem; border-radius:4px; margin-left:.4rem;">Featured</span>' : ''}
                                        </td>
                                        <td>${escapeHtml(p.category || '—')}</td>
                                        <td>
                                            <span class="badge badge-${p.status}">
                                                ${p.status === 'published' ? '<span class="badge-dot"></span>' : ''}
                                                ${p.status}
                                            </span>
                                        </td>
                                        <td>${formatDateShort(p.created_at)}</td>
                                        <td>
                                            <div class="td-actions">
                                                <button class="btn btn-secondary btn-sm editPostBtn" data-id="${p.id}">Edit</button>
                                                <button class="btn btn-danger btn-sm deletePostBtn" data-id="${p.id}">Delete</button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>` : `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <div class="empty-state-title">No posts yet</div>
                            <div class="empty-state-desc">Click "+ New Post" to create your first post.</div>
                        </div>`}
                    </div>
                </div>

                <!-- Post editor -->
                <div id="blogFormWrap" style="display:none; margin-top:1.5rem;">
                    <div class="page-header" style="margin-bottom:1.25rem;">
                        <div class="page-header-left">
                            <h1 id="formHeading">New Post</h1>
                        </div>
                        <div class="page-header-actions">
                            <button class="btn btn-secondary" id="cancelPostBtn">← Back to list</button>
                            <button class="btn btn-primary" id="savePostBtn">Save Post</button>
                        </div>
                    </div>
                    <input type="hidden" id="editPostId">

                    <div class="post-editor-layout">
                        <!-- Main column -->
                        <div class="post-editor-main">
                            <!-- Title -->
                            <div class="panel">
                                <div class="panel-body" style="padding:.75rem 1.25rem;">
                                    <input id="postTitle" placeholder="Post title…"
                                        style="width:100%; background:transparent; border:none; color:var(--text);
                                               font-size:1.5rem; font-weight:700; outline:none; padding:.25rem 0;"
                                        oninput="autoSlug(this.value)">
                                    <div style="display:flex; align-items:center; gap:.4rem; margin-top:.35rem;">
                                        <span style="font-size:.75rem; color:var(--text-3);">Slug:</span>
                                        <input id="postSlug" placeholder="auto-generated"
                                            style="flex:1; background:transparent; border:none; color:var(--text-3);
                                                   font-size:.78rem; outline:none; font-family:monospace;">
                                    </div>
                                </div>
                            </div>

                            <!-- Canvas editor -->
                            <div class="panel" style="overflow:hidden;">
                                <div class="embed-toolbar">
                                    <span style="font-size:.72rem; color:var(--text-3); margin-right:.25rem; align-self:center;">Quick embed:</span>
                                    <button class="embed-btn" id="embedYT">▶️ YouTube</button>
                                    <button class="embed-btn" id="embedIG">📷 Instagram</button>
                                    <button class="embed-btn" id="embedTT">🎵 TikTok</button>
                                    <button class="embed-btn" id="embedImg">🖼️ Image (URL)</button>
                                    <button class="embed-btn" id="embedGallery">📂 Gallery</button>
                                </div>
                                <div id="editorjs" class="editorjs-wrap" style="padding:.5rem 0;"></div>
                            </div>
                        </div>

                        <!-- Sidebar column -->
                        <div class="post-editor-sidebar">
                            <!-- Publish settings -->
                            <div class="panel">
                                <div class="panel-header"><h2>Publish</h2></div>
                                <div class="panel-body" style="display:flex; flex-direction:column; gap:.85rem;">
                                    <div class="field">
                                        <label>Status</label>
                                        <select id="postStatus">
                                            <option value="draft">Draft</option>
                                            <option value="published">Published</option>
                                        </select>
                                    </div>
                                    <div class="field-row">
                                        <input type="checkbox" id="postFeatured">
                                        <label for="postFeatured">Mark as featured</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Metadata -->
                            <div class="panel">
                                <div class="panel-header"><h2>Details</h2></div>
                                <div class="panel-body" style="display:flex; flex-direction:column; gap:.85rem;">
                                    <div class="field">
                                        <label>Category</label>
                                        <input id="postCategory" placeholder="e.g. Football, Tech">
                                    </div>
                                    <div class="field">
                                        <label>Tags <span style="color:var(--text-3);font-weight:400;">(comma separated)</span></label>
                                        <input id="postTags" placeholder="tag1, tag2">
                                    </div>
                                    <div class="field">
                                        <label>Cover Image</label>
                                        <input id="postCover" placeholder="https://…" oninput="previewCover(this.value)">
                                        <div style="display:flex; gap:.4rem; margin-top:.4rem;">
                                            <button type="button" class="btn btn-secondary btn-sm" id="coverUploadBtn" style="flex:1;">📤 Upload from device</button>
                                            <button type="button" class="btn btn-secondary btn-sm" id="coverGalleryBtn" style="flex:1;">📂 From gallery</button>
                                        </div>
                                        <input type="file" id="coverFileInput" accept="image/*" style="display:none;">
                                        <img id="coverPreview" style="width:100%; border-radius:6px; margin-top:.4rem; display:none; max-height:120px; object-fit:cover;">
                                    </div>
                                    <div class="field">
                                        <label>Excerpt <span style="color:var(--text-3);font-weight:400;">(auto-generated)</span></label>
                                        <textarea id="postExcerpt" rows="3" placeholder="Leave blank to auto-generate…"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // ── Event handlers ──
            document.getElementById('newPostBtn').onclick = () => showPostForm(null);
            document.getElementById('cancelPostBtn').onclick = () => {
                document.getElementById('blogFormWrap').style.display = 'none';
                document.getElementById('blogListWrap').style.display = 'block';
                if (editorInstance) { editorInstance.destroy(); editorInstance = null; }
            };
            document.getElementById('savePostBtn').onclick = savePost;
            document.querySelectorAll('.editPostBtn').forEach(b => b.onclick = async () => {
                const { data: p } = await supabase.from('posts').select('*').eq('id', b.dataset.id).single();
                if (p) showPostForm(p);
            });

        function showPostForm(post) {
            document.getElementById('blogListWrap').style.display = 'none';
            document.getElementById('blogFormWrap').style.display = 'block';
            document.getElementById('formHeading').textContent = post ? 'Edit Post' : 'New Post';
            document.getElementById('editPostId').value = post?.id || '';
            document.getElementById('postTitle').value = post?.title || '';
            document.getElementById('postSlug').value = post?.slug || '';
            document.getElementById('postCategory').value = post?.category || '';
            document.getElementById('postTags').value = (post?.tags || []).join(', ');
            document.getElementById('postCover').value = post?.cover_image || '';
            document.getElementById('postExcerpt').value = post?.excerpt || '';
            document.getElementById('postStatus').value = post?.status || 'draft';
            document.getElementById('postFeatured').checked = post?.featured || false;

            if (post?.cover_image) {
                document.getElementById('coverPreview').src = post.cover_image;
                document.getElementById('coverPreview').style.display = 'block';
            } else {
                document.getElementById('coverPreview').style.display = 'none';
            }

            // Parse saved EditorJS data or convert old HTML
            let editorData = null;
            if (post?.content) {
                try { editorData = JSON.parse(post.content); } catch(e) {
                    // Legacy HTML — wrap as paragraph blocks
                    editorData = {
                        blocks: [{ type: 'paragraph', data: { text: post.content } }]
                    };
                }
            }

            // Destroy existing instance
            if (editorInstance) { editorInstance.destroy(); editorInstance = null; }

            // Init Editor.js
            setTimeout(() => {
                editorInstance = new EditorJS({
                    holder: 'editorjs',
                    data: editorData || {},
                    placeholder: 'Start writing your post…',
                    tools: {
                        header: { class: Header, inlineToolbar: true, config: { levels: [1,2,3,4], defaultLevel: 2 } },
                        paragraph: { class: Paragraph, inlineToolbar: true },
                        list: { class: List, inlineToolbar: true, config: { defaultStyle: 'unordered' } },
                        quote: { class: Quote, inlineToolbar: true },
                        table: { class: Table, inlineToolbar: true },
                        image: {
                            class: ImageTool,
                            config: {
                                uploader: {
                                    async uploadByFile(file) {
                                        const name = Date.now() + '_' + file.name.replace(/\s+/g,'_');
                                        const { error } = await supabase.storage.from('media').upload(name, file);
                                        if (error) return { success:0 };
                                        const { data: { publicUrl } } = supabase.storage.from('media').getPublicUrl(name);
                                        return { success:1, file: { url: publicUrl } };
                                    },
                                    async uploadByUrl(url) {
                                        return { success:1, file: { url } };
                                    }
                                }
                            }
                        },
                        embed: {
                            class: Embed,
                            config: {
                                services: {
                                    youtube: true,
                                    instagram: {
                                        regex: /https?:\/\/(?:www\.)?instagram\.com\/(?:p|reel|tv)\/([^/?#&]+)/,
                                        embedUrl: 'https://www.instagram.com/p/<%= remote_id %>/embed',
                                        html: '<blockquote class="instagram-media" data-instgrm-permalink="<%= url %>" data-instgrm-version="14" style="margin:0 auto; max-width:540px; width:100%;"></blockquote><script async src="https://www.instagram.com/embed.js"><\/script>',
                                        height: 680,
                                        width: 400,
                                        id: (groups) => groups[1]
                                    },
                                    twitter: true,
                                    tiktok: {
                                        regex: /https?:\/\/(www\.)?tiktok\.com\/@[^/]+\/video\/(\d+)/,
                                        embedUrl: 'https://www.tiktok.com/embed/v2/<%= remote_id %>',
                                        html: '<blockquote class="tiktok-embed" cite="<%= url %>" data-video-id="<%= remote_id %>" style="max-width:605px;min-width:325px;"><section></section></blockquote><script async src="https://www.tiktok.com/embed.js"><\/script>',
                                        height: 740,
                                        width: 340,
                                        id: (groups) => groups[2]
                                    },
                                    vimeo: true,
                                    codepen: true,
                                    imgur: true,
                                    gfycat: true,
                                    miro: true
                                }
                            }
                        },
                        delimiter: Delimiter,
                        code: CodeTool,
                        marker: Marker,
                        inlineCode: InlineCode,
                        warning: Warning
                    },
                    onChange: async () => {
                        // Re-trigger Instagram/TikTok embed scripts for dynamically inserted blocks
                        if (window.instgrm?.Embeds?.process) window.instgrm.Embeds.process();
                        if (window.tiktokEmbed?.lib?.render) window.tiktokEmbed.lib.render();
                        // Auto-update excerpt from first paragraph
                        try {
                            const saved = await editorInstance.save();
                            const firstPara = saved.blocks?.find(b => b.type === 'paragraph');
                            if (firstPara && !document.getElementById('postExcerpt').dataset.manual) {
                                const text = firstPara.data.text.replace(/<[^>]+>/g,'');
                                const words = text.trim().split(/\s+/).slice(0, 50).join(' ');
                                document.getElementById('postExcerpt').value = words + (text.split(/\s+/).length > 50 ? '…' : '');
                            }
                        } catch(e) {}
                    }
                });
                document.getElementById('postExcerpt').addEventListener('input', function() {
                    this.dataset.manual = 'true';
                });
            }, 0);
        }

        async function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            if (!title) { toast('Title is required', 'error'); return; }

            let contentJson = '{}';
            if (editorInstance) {
                try {
                    const saved = await editorInstance.save();
                    contentJson = JSON.stringify(saved);
                } catch(e) {}
            }

            const id = document.getElementById('editPostId').value;
            const post = {
                title,
                slug: document.getElementById('postSlug').value || slugify(title),
                category: document.getElementById('postCategory').value,
                tags: document.getElementById('postTags').value.split(',').map(s=>s.trim()).filter(Boolean),
                cover_image: document.getElementById('postCover').value,
                excerpt: document.getElementById('postExcerpt').value,
                content: contentJson,
                status: document.getElementById('postStatus').value,
                featured: document.getElementById('postFeatured').checked
            };

            if (id) {
                const { error } = await supabase.from('posts').update(post).eq('id', id);
                if (error) { toast('Error: ' + error.message, 'error'); return; }
                toast('Post updated ✓');
            } else {
                const { error } = await supabase.from('posts').insert(post);
                if (error) { toast('Error: ' + error.message, 'error'); return; }
                toast('Post created ✓');
            }
            if (editorInstance) { editorInstance.destroy(); editorInstance = null; }
            renderBlog();
        }

        // Insert embed via Editor.js API
        async function insertEmbed(type) {
            if (!editorInstance) return;
            let url = '';
            if (type === 'youtube') url = prompt('YouTube URL:', 'https://www.youtube.com/watch?v=');
            else if (type === 'instagram') url = prompt('Instagram post URL:', 'https://www.instagram.com/p/');
            else if (type === 'tiktok') url = prompt('TikTok video URL:', 'https://www.tiktok.com/@user/video/');
            if (!url) return;
            try {
                await editorInstance.blocks.insert('embed', { service: type, source: url, embed: url, width: 560, height: 315, caption: '' });
                toast(`${type} embedded`);
            } catch(e) {
                toast('Could not embed. Try pasting the URL directly in the editor.', 'info');
            }
        }

                        ${data?.length ? `

            bindEntityForm('club', 'football_clubs', renderFootball, {
                clubName: 'name', clubLeague: 'league',
                clubLeagueTitles: ['league_titles','int'],
                clubDomestic: ['domestic_cups','int'],
                clubContinental: ['continental','int'],
                clubLogo: 'logo_url', clubNotes: 'notes'

        function clubForm() {
            return `
                <div class="panel">
                    <div class="panel-header"><h2 id="clubFormTitle">New Club</h2></div>
                    <div class="panel-body">
                        <input type="hidden" id="clubId">
                        <div class="field-group">
                            <div class="field"><label>Club Name</label><input id="clubName"></div>
                            <div class="field"><label>League</label><input id="clubLeague"></div>
                            <div class="field"><label>League Titles</label><input id="clubLeagueTitles" type="number"></div>
                            <div class="field"><label>Domestic Cups</label><input id="clubDomestic" type="number"></div>
                            <div class="field"><label>Continental Titles</label><input id="clubContinental" type="number"></div>
                            <div class="field"><label>Logo URL</label><input id="clubLogo" placeholder="https://…"></div>
                            <div class="field field-full"><label>Notes</label><textarea id="clubNotes"></textarea></div>
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-secondary" id="cancelClubBtn">Cancel</button>
                            <button class="btn btn-primary" id="saveClubBtn">Save Club</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function bindEntityForm(prefix, table, rerender, fieldMap) {
            const idField = document.getElementById(prefix + 'Id');
            const formWrap = document.getElementById(prefix + 'FormWrap');
            const listWrap = document.getElementById(prefix + 'ListWrap');

            document.getElementById('new' + prefix.charAt(0).toUpperCase() + prefix.slice(1) + 'Btn').onclick = () => showEntityForm(null);
            document.getElementById('cancel' + prefix.charAt(0).toUpperCase() + prefix.slice(1) + 'Btn').onclick = () => {
                formWrap.style.display = 'none'; listWrap.style.display = 'block';
            };
            document.querySelectorAll('.edit' + prefix.charAt(0).toUpperCase() + prefix.slice(1) + 'Btn').forEach(b => {
                b.onclick = async () => {
                    const { data } = await supabase.from(table).select('*').eq('id', b.dataset.id).single();
                    if (data) showEntityForm(data);
                };
            });
            document.querySelectorAll('.del' + prefix.charAt(0).toUpperCase() + prefix.slice(1) + 'Btn').forEach(b => {
                b.onclick = async () => {
                    if (!confirm('Delete?')) return;
                    await supabase.from(table).delete().eq('id', b.dataset.id);
                    toast('Deleted'); rerender();
                };
            });
            document.getElementById('save' + prefix.charAt(0).toUpperCase() + prefix.slice(1) + 'Btn').onclick = async () => {
                const id = idField.value;
                const obj = {};
                for (const [elId, colSpec] of Object.entries(fieldMap)) {
                    const col = Array.isArray(colSpec) ? colSpec[0] : colSpec;
                    const type = Array.isArray(colSpec) ? colSpec[1] : 'str';
                    const val = document.getElementById(elId)?.value || '';
                    obj[col] = type === 'int' ? (parseInt(val) || 0) : type === 'float' ? (parseFloat(val) || null) : val;
                }
                if (id) await supabase.from(table).update(obj).eq('id', id);
                else await supabase.from(table).insert(obj);
                toast('Saved ✓'); rerender();
            };

            function showEntityForm(entity) {
                listWrap.style.display = 'none'; formWrap.style.display = 'block';
                const titleEl = document.getElementById(prefix + 'FormTitle');
                if (titleEl) titleEl.textContent = entity ? 'Edit ' + prefix.charAt(0).toUpperCase() + prefix.slice(1) : 'New ' + prefix.charAt(0).toUpperCase() + prefix.slice(1);
                idField.value = entity?.id || '';
                for (const [elId, colSpec] of Object.entries(fieldMap)) {
                    const col = Array.isArray(colSpec) ? colSpec[0] : colSpec;
                    const el = document.getElementById(elId);
                    if (el) el.value = entity?.[col] ?? '';
                }
            }
        }

                            <div class="form-actions">

                                <button class="btn btn-primary" id="saveDriverBtn">Save Driver</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            bindEntityForm('driver', 'f1_drivers', renderF1, {
                driverName: 'name', driverNumber: ['number','int'], driverTeam: 'team',
                driverNation: 'nationality', driverChamp: ['championships','int'],

        // ─── Watchlist ───────────────────────────────────────
        async function renderWatchlist() {
            const { data } = await supabase.from('watchlist').select('*').order('created_at', { ascending: false });
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="page-header">
                    <div class="page-header-left"><h1>Watchlist</h1><p>${data?.length||0} items</p></div>
                    <div class="page-header-actions">
                        <button class="btn btn-primary" id="newWatchBtn">+ Add Item</button>
                    </div>
                </div>
                <div id="watchListWrap">
                    <div class="table-container">
                        ${data?.length ? `
                        <table class="data-table">
                            <thead><tr><th>Title</th><th>Type</th><th>Status</th><th>Rating</th><th>Year</th><th style="width:130px">Actions</th></tr></thead>
                            <tbody>
                                ${data.map(w => `
                                    <tr>
                                        <td><strong>${escapeHtml(w.title)}</strong></td>
                                        <td><span class="badge badge-draft">${w.type||'—'}</span></td>
                                        <td>${escapeHtml(w.status?.replace(/_/g,' ')||'—')}</td>
                                        <td>${w.rating ? '⭐ ' + w.rating : '—'}</td>
                                        <td>${w.year||'—'}</td>
                                        <td><div class="td-actions">
                                            <button class="btn btn-secondary btn-sm editWatchBtn" data-id="${w.id}">Edit</button>
                                            <button class="btn btn-danger btn-sm delWatchBtn" data-id="${w.id}">Delete</button>
                                        </div></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>` : `<div class="empty-state"><div class="empty-state-icon">🎬</div><div class="empty-state-title">No items yet</div></div>`}
                    </div>
                </div>
                <div id="watchFormWrap" style="display:none; margin-top:1.5rem;">
                    <div class="panel">
                        <div class="panel-header"><h2 id="watchFormTitle">New Item</h2></div>
                        <div class="panel-body">
                            <input type="hidden" id="watchId">
                            <div class="field-group">
                                <div class="field"><label>Title</label><input id="watchTitle"></div>
                                <div class="field"><label>Type</label>
                                    <select id="watchType"><option value="movie">Movie</option><option value="tv">TV Series</option><option value="anime">Anime</option></select>
                                </div>
                                <div class="field"><label>Status</label>
                                    <select id="watchStatus"><option value="want_to_watch">Want to Watch</option><option value="watching">Watching</option><option value="watched">Watched</option></select>
                                </div>
                                <div class="field"><label>Year</label><input id="watchYear" type="number"></div>
                                <div class="field"><label>Rating (0–10)</label><input id="watchRating" type="number" step="0.1" min="0" max="10"></div>
                                <div class="field"><label>Poster URL</label><input id="watchPoster" placeholder="https://…"></div>
                                <div class="field field-full"><label>Notes</label><textarea id="watchNotes"></textarea></div>
                            </div>
                            <div class="form-actions">
                                <button class="btn btn-secondary" id="cancelWatchBtn">Cancel</button>
                                <button class="btn btn-primary" id="saveWatchBtn">Save</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            // manual bind for watchlist (has float + special select)
            const bindWatch = () => {
                document.getElementById('newWatchBtn').onclick = () => showWatchForm(null);
                document.getElementById('cancelWatchBtn').onclick = () => {
                    document.getElementById('watchFormWrap').style.display = 'none';
                    document.getElementById('watchListWrap').style.display = 'block';
                };
                document.querySelectorAll('.editWatchBtn').forEach(b => b.onclick = async () => {
                    const { data: item } = await supabase.from('watchlist').select('*').eq('id', b.dataset.id).single();
                    if (item) showWatchForm(item);
                });
                document.querySelectorAll('.delWatchBtn').forEach(b => b.onclick = async () => {
                    if (!confirm('Delete?')) return;
                    await supabase.from('watchlist').delete().eq('id', b.dataset.id);
                    toast('Deleted'); renderWatchlist();
                });
                document.getElementById('saveWatchBtn').onclick = async () => {
                    const id = document.getElementById('watchId').value;
                    const item = {
                        title: document.getElementById('watchTitle').value,
                        type: document.getElementById('watchType').value,
                        status: document.getElementById('watchStatus').value,
                        year: document.getElementById('watchYear').value,
                        rating: parseFloat(document.getElementById('watchRating').value) || null,
                        notes: document.getElementById('watchNotes').value,
                        poster_url: document.getElementById('watchPoster').value
                    };
                    if (id) await supabase.from('watchlist').update(item).eq('id', id);
                    else await supabase.from('watchlist').insert(item);
                    toast('Saved ✓'); renderWatchlist();
                };
            };
            bindWatch();

            function showWatchForm(w) {
                document.getElementById('watchListWrap').style.display = 'none';
                document.getElementById('watchFormWrap').style.display = 'block';
                document.getElementById('watchFormTitle').textContent = w ? 'Edit Item' : 'New Item';
                document.getElementById('watchId').value = w?.id || '';
                document.getElementById('watchTitle').value = w?.title || '';
                document.getElementById('watchType').value = w?.type || 'movie';
                document.getElementById('watchStatus').value = w?.status || 'want_to_watch';
                document.getElementById('watchYear').value = w?.year || '';
                document.getElementById('watchRating').value = w?.rating || '';
                document.getElementById('watchNotes').value = w?.notes || '';
                document.getElementById('watchPoster').value = w?.poster_url || '';
            }
        }

        // ─── Thoughts ────────────────────────────────────────
        async function renderThoughts() {
            const { data } = await supabase.from('thoughts').select('*').order('created_at', { ascending: false });

                <div class="page-header">
