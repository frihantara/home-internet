<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Studio — Frihantara</title>
    <link rel="stylesheet" href="/css/global.css">
    <!-- Editor.js core + plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.30.2/dist/editorjs.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.7/dist/header.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@2.11.6/dist/paragraph.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2.0.2/dist/list.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@2.7.4/dist/quote.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@2.4.3/dist/table.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@2.10.1/dist/image.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/embed@2.7.6/dist/embed.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1.4.2/dist/delimiter.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@2.9.3/dist/code.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@1.4.0/dist/marker.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/inline-code@1.5.0/dist/inline-code.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/warning@1.4.0/dist/warning.umd.min.js"></script>

    <style>
        /* ============================================================
           FRIHANTARA STUDIO — DARK THEME + MOBILE OPTIMIZED EDITOR
           ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sidebar-w: 256px;
            --topbar-h: 56px;
            --bg: #0d0d0f;
            --surface: #161618;
            --surface-2: #1e1e22;
            --surface-3: #26262c;
            --border: rgba(255,255,255,.07);
            --border-2: rgba(255,255,255,.12);
            --text: #f0f0f2;
            --text-2: #a0a0b0;
            --text-3: #5a5a70;
            --gold: #f0c040;
            --gold-dim: rgba(240,192,64,.4);
            --gold-glow: rgba(240,192,64,.08);
            --red: #f06060;
            --green: #50e090;
            --blue: #60b0f0;
            --radius: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow: 0 4px 24px rgba(0,0,0,.4);
            --transition: .15s ease;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ── Layout ──────────────────────────────────── */
        .studio-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ──────────────────────────────────── */
        .studio-sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform .25s cubic-bezier(.4,0,.2,1);
        }

        .sidebar-brand {
            padding: 1.25rem 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .75rem;
        }
        .sidebar-brand-logo {
            width: 32px; height: 32px;
            background: var(--gold);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            color: #000;
            font-weight: 700;
        }
        .sidebar-brand-name {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text);
        }
        .sidebar-brand-name span { color: var(--gold); }
        .sidebar-brand-badge {
            font-size: .6rem;
            text-transform: uppercase;
            background: var(--surface-2);
            padding: .15rem .4rem;
            border-radius: 99px;
            margin-left: auto;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem .75rem;
            display: flex;
            flex-direction: column;
            gap: .15rem;
        }
        .sidebar-group-label {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--text-3);
            padding: .6rem .75rem .25rem;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .55rem .75rem;
            border-radius: var(--radius-md);
            font-size: .85rem;
            font-weight: 500;
            color: var(--text-2);
            transition: background var(--transition);
            cursor: pointer;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
        }
        .sidebar-link:hover { background: var(--surface-2); color: var(--text); }
        .sidebar-link.active { background: var(--gold-glow); color: var(--gold); }
        .sidebar-link .nav-badge {
            margin-left: auto;
            font-size: .65rem;
            background: var(--surface-3);
            padding: .1rem .4rem;
            border-radius: 99px;
        }

        .sidebar-footer {
            padding: 1rem .75rem;
            border-top: 1px solid var(--border);
        }
        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 99;
        }
        .sidebar-overlay.open { display: block; }

        /* ── Main content ──────────────────────────────── */
        .studio-main {
            flex: 1;
            margin-left: var(--sidebar-w);
            min-height: 100vh;
        }

        /* ── Topbar ──────────────────────────────────── */
        .studio-topbar {
            height: var(--topbar-h);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            background: rgba(13,13,15,.85);
            backdrop-filter: blur(12px);
            z-index: 50;
        }
        .topbar-left { display: flex; align-items: center; gap: .75rem; }
        .topbar-menu-btn {
            display: none;
            width: 34px; height: 34px;
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-2);
            border: none;
            cursor: pointer;
        }
        .topbar-menu-btn:hover { background: var(--surface-2); }
        .topbar-breadcrumb { display: flex; gap: .4rem; font-size: .85rem; }
        .topbar-breadcrumb-current { color: var(--text); font-weight: 600; }
        .topbar-right { display: flex; gap: .5rem; }

        /* ── Content area ──────────────────────────────── */
        .studio-content {
            padding: 2rem 1.75rem;
            max-width: 1400px;
            width: 100%;
        }

        /* ── Common styles ──────────────────────────────── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 1rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }
        .page-header-left h1 { font-size: 1.6rem; font-weight: 700; }
        .page-header-left p { font-size: .83rem; color: var(--text-3); }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .5rem 1rem;
            border-radius: var(--radius);
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: var(--gold); color: #000; }
        .btn-primary:hover { background: #f7d060; }
        .btn-secondary { background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-2); }
        .btn-secondary:hover { background: var(--surface-3); color: var(--text); }
        .btn-danger { background: transparent; border: 1px solid rgba(240,96,96,.3); color: var(--red); }
        .btn-danger:hover { background: rgba(240,96,96,.1); }
        .btn-sm { padding: .3rem .65rem; font-size: .78rem; }

        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        .data-table th, .data-table td {
            padding: .75rem 1.25rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th {
            font-size: .68rem;
            text-transform: uppercase;
            color: var(--text-3);
            background: var(--surface-2);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .2rem .55rem;
            border-radius: 99px;
            font-size: .72rem;
        }
        .badge-published { background: rgba(80,224,144,.1); color: var(--green); }
        .badge-draft { background: var(--surface-3); color: var(--text-3); }

        /* ========== POST EDITOR ========== */
        .post-editor-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1.5rem;
            align-items: start;
        }
        .post-editor-main { display: flex; flex-direction: column; gap: 1.25rem; }
        .post-editor-sidebar { display: flex; flex-direction: column; gap: 1.25rem; }

        .editorjs-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            min-height: 460px;
            overflow: auto;
            position: relative;
        }
        .embed-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-2);
            position: sticky;
            top: 56px;
            z-index: 30;
        }
        .embed-btn {
            padding: 0.4rem 0.7rem;
            border-radius: var(--radius);
            font-size: .75rem;
            background: var(--surface-3);
            border: 1px solid var(--border);
            color: var(--text-2);
            cursor: pointer;
        }
        .embed-btn:hover { background: var(--border-2); color: var(--text); }

        /* Editor.js dark overrides */
        .editorjs-wrap .codex-editor { padding: .75rem 0; }
        .editorjs-wrap .ce-block__content,
        .editorjs-wrap .ce-toolbar__content { max-width: none !important; padding: 0 1.25rem; }
        .editorjs-wrap .ce-paragraph,
        .editorjs-wrap .ce-header,
        .editorjs-wrap .cdx-input { color: var(--text) !important; }
        .editorjs-wrap .ce-toolbar__plus,
        .editorjs-wrap .ce-toolbar__settings-btn { color: var(--text-2) !important; background: var(--surface-2) !important; }
        .editorjs-wrap .ce-popover { background: var(--surface-2) !important; border: 1px solid var(--border-2) !important; }
        .editorjs-wrap .cdx-quote__text { border-left: 3px solid var(--gold) !important; }

        /* Mobile specific */
        @media (max-width: 960px) {
            .studio-main { margin-left: 0; }
            .studio-sidebar { transform: translateX(-100%); }
            .studio-sidebar.open { transform: none; }
            .topbar-menu-btn { display: flex; }
            .studio-content { padding: 1.25rem 1rem; }
            .post-editor-layout { grid-template-columns: 1fr !important; gap: 1rem; }
            .post-editor-sidebar { order: 2; }
            .editorjs-wrap { min-height: 55vh; max-height: 70vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
            .embed-toolbar { top: 56px; }
            input, textarea, select { font-size: 16px !important; }
            #postTitle { font-size: 1.3rem !important; }
            .page-header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="studio-layout">
        <aside class="studio-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-logo">F</div>
                <div class="sidebar-brand-name">Frihan<span>tara</span></div>
                <span class="sidebar-brand-badge">Studio</span>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-group-label">Overview</div>
                <button class="sidebar-link active" data-section="dashboard"><span>📊</span> Dashboard</button>
                <div class="sidebar-group-label">Content</div>
                <button class="sidebar-link" data-section="blog"><span>📝</span> Blog <span class="nav-badge" id="navCount-blog">—</span></button>
                <button class="sidebar-link" data-section="gallery"><span>🖼️</span> Gallery <span class="nav-badge" id="navCount-gallery">—</span></button>
                <button class="sidebar-link" data-section="football"><span>⚽</span> Football Clubs</button>
                <button class="sidebar-link" data-section="f1"><span>🏎️</span> F1 Drivers</button>
                <button class="sidebar-link" data-section="watchlist"><span>🎬</span> Watchlist</button>
                <button class="sidebar-link" data-section="thoughts"><span>💭</span> Thoughts</button>
            </nav>
            <div class="sidebar-footer">
                <button class="sidebar-link" id="logoutBtn"><span>🚪</span> Sign out</button>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="studio-main">
            <div class="studio-topbar">
                <div class="topbar-left">
                    <button class="topbar-menu-btn" id="menuBtn">☰</button>
                    <div class="topbar-breadcrumb">
                        <span>Studio</span><span>/</span><span id="pageTitle">Dashboard</span>
                    </div>
                </div>
                <div class="topbar-right" id="topbarActions"></div>
            </div>
            <div class="studio-content" id="content"></div>
        </main>
    </div>

    <script type="module">
        import { supabase, formatDateShort } from '/js/supabase.js';

        // Auth check
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) location.href = '/studio/login';

        // Helper
        function escapeHtml(str) {
            return str?.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]) || '';
        }
        function slugify(t) {
            return t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }
        function toast(msg, type = 'success') {
            const existing = document.querySelector('.toast-wrap');
            if (!existing) {
                const wrap = document.createElement('div');
                wrap.className = 'toast-wrap';
                wrap.style.position = 'fixed';
                wrap.style.bottom = '1rem';
                wrap.style.right = '1rem';
                wrap.style.zIndex = '999';
                wrap.style.display = 'flex';
                wrap.style.flexDirection = 'column';
                wrap.style.gap = '.5rem';
                document.body.appendChild(wrap);
            }
            const wrap = document.querySelector('.toast-wrap');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.style.background = 'var(--surface-2)';
            el.style.borderLeft = `3px solid ${type === 'success' ? 'var(--green)' : 'var(--red)'}`;
            el.style.padding = '.6rem 1rem';
            el.style.borderRadius = 'var(--radius)';
            el.style.fontSize = '.85rem';
            el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // Navigation
        const sections = ['dashboard', 'blog', 'gallery', 'football', 'f1', 'watchlist', 'thoughts'];
        let currentSection = 'dashboard';
        function setActiveSection(section) {
            currentSection = section;
            document.querySelectorAll('.sidebar-link[data-section]').forEach(btn => {
                if (btn.dataset.section === section) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            document.getElementById('pageTitle').innerText = section.charAt(0).toUpperCase() + section.slice(1);
        }

        // Dashboard
        async function renderDashboard() {
            const tables = ['posts', 'gallery', 'football_clubs', 'f1_drivers', 'watchlist', 'thoughts'];
            const labels = { posts: 'Blog Posts', gallery: 'Gallery', football_clubs: 'Football', f1_drivers: 'F1 Drivers', watchlist: 'Watchlist', thoughts: 'Thoughts' };
            const icons = { posts: '📝', gallery: '🖼️', football_clubs: '⚽', f1_drivers: '🏎️', watchlist: '🎬', thoughts: '💭' };
            const stats = {};
            for (let t of tables) {
                const { count } = await supabase.from(t).select('*', { count: 'exact', head: true });
                stats[t] = count ?? 0;
            }
            document.getElementById('navCount-blog').innerText = stats.posts;
            document.getElementById('navCount-gallery').innerText = stats.gallery;

            const { data: recent } = await supabase.from('posts').select('title,status,created_at').order('created_at', { ascending: false }).limit(5);
            const html = `
                <div class="page-header"><div><h1>Dashboard</h1><p>Welcome back, ${session.user.email}</p></div></div>
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; margin-bottom:2rem;">
                    ${tables.map(t => `<div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem;"><div style="font-size:2rem;">${icons[t]}</div><div style="font-size:1.8rem; font-weight:700;">${stats[t]}</div><div style="font-size:.8rem; color:var(--text-3);">${labels[t]}</div></div>`).join('')}
                </div>
                <div class="table-container"><div style="padding:1rem; border-bottom:1px solid var(--border);"><strong>Recent Posts</strong></div>
                ${recent?.length ? `<table class="data-table"><thead><tr><th>Title</th><th>Status</th><th>Date</th></tr></thead><tbody>${recent.map(p => `<tr><td><strong>${escapeHtml(p.title)}</strong></td><td><span class="badge badge-${p.status}">${p.status}</span></td><td>${formatDateShort(p.created_at)}</td></tr>`).join('')}</tbody></table>` : '<div style="padding:2rem; text-align:center;">No posts yet</div>'}
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        // Global editor instance
        let editorInstance = null;

        // Blog
        async function renderBlog() {
            const { data: posts } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            const listHtml = posts?.length ? `
                <table class="data-table">
                    <thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Date</th><th style="width:120px">Actions</th></tr></thead>
                    <tbody id="blogTbody">
                        ${posts.map(p => `<tr data-title="${escapeHtml(p.title).toLowerCase()}">
                            <td><strong>${escapeHtml(p.title)}</strong>${p.featured ? ' <span style="color:var(--gold);">★</span>' : ''}</td>
                            <td>${escapeHtml(p.category || '—')}</td>
                            <td><span class="badge badge-${p.status}">${p.status}</span></td>
                            <td>${formatDateShort(p.created_at)}</td>
                            <td><button class="editPostBtn btn btn-secondary btn-sm" data-id="${p.id}">Edit</button> <button class="deletePostBtn btn btn-danger btn-sm" data-id="${p.id}">Delete</button></td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            ` : '<div class="empty-state" style="padding:3rem; text-align:center;">No posts yet. Click + New Post.</div>';

            const formHtml = `
                <div id="blogFormWrap" style="display:none; margin-top:1.5rem;">
                    <div class="page-header"><div><h1 id="formHeading">New Post</h1></div><div><button class="btn btn-secondary" id="cancelPostBtn">← Back</button><button class="btn btn-primary" id="savePostBtn">Save Post</button></div></div>
                    <input type="hidden" id="editPostId">
                    <div class="post-editor-layout">
                        <div class="post-editor-main">
                            <div style="background:var(--surface); border-radius:var(--radius-lg); padding:.75rem 1.25rem;">
                                <input id="postTitle" placeholder="Post title…" style="width:100%; background:transparent; border:none; font-size:1.5rem; font-weight:700; outline:none; margin-bottom:.3rem;">
                                <div style="display:flex; gap:.4rem;"><span style="font-size:.75rem; color:var(--text-3);">Slug:</span><input id="postSlug" style="flex:1; background:transparent; border:none; color:var(--text-3); font-size:.78rem; outline:none;"></div>
                            </div>
                            <div class="editorjs-wrap">
                                <div class="embed-toolbar">
                                    <span style="font-size:.72rem;">Quick embed:</span>
                                    <button class="embed-btn" id="embedYT">▶️ YouTube</button>
                                    <button class="embed-btn" id="embedIG">📷 Instagram</button>
                                    <button class="embed-btn" id="embedTT">🎵 TikTok</button>
                                    <button class="embed-btn" id="embedImg">🖼️ Image URL</button>
                                    <button class="embed-btn" id="embedGallery">📂 Gallery</button>
                                </div>
                                <div id="editorjs" style="padding:.5rem 0;"></div>
                            </div>
                        </div>
                        <div class="post-editor-sidebar">
                            <div style="background:var(--surface); border-radius:var(--radius-lg); padding:1rem;">
                                <div style="margin-bottom:1rem;"><select id="postStatus" style="width:100%; background:var(--surface-2); border:1px solid var(--border); padding:.5rem; border-radius:var(--radius); color:var(--text);"><option value="draft">Draft</option><option value="published">Published</option></select></div>
                                <div style="display:flex; gap:.5rem;"><input type="checkbox" id="postFeatured"> <label>Mark as featured</label></div>
                            </div>
                            <div style="background:var(--surface); border-radius:var(--radius-lg); padding:1rem; display:flex; flex-direction:column; gap:.75rem;">
                                <input id="postCategory" placeholder="Category" style="background:var(--surface-2); border:1px solid var(--border); padding:.5rem; border-radius:var(--radius);">
                                <input id="postTags" placeholder="Tags (comma separated)" style="background:var(--surface-2); border:1px solid var(--border); padding:.5rem; border-radius:var(--radius);">
                                <input id="postCover" placeholder="Cover image URL" style="background:var(--surface-2); border:1px solid var(--border); padding:.5rem; border-radius:var(--radius);">
                                <textarea id="postExcerpt" rows="3" placeholder="Excerpt (auto-generated)" style="background:var(--surface-2); border:1px solid var(--border); padding:.5rem; border-radius:var(--radius);"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const mainHtml = `
                <div class="page-header"><div><h1>Blog Posts</h1><p>${posts?.length || 0} total</p></div><div><button class="btn btn-primary" id="newPostBtn">+ New Post</button></div></div>
                <div id="blogListWrap"><div class="table-container"><div style="padding:.75rem 1.25rem;"><input id="blogSearch" placeholder="Search posts..." style="background:var(--surface-2); border:1px solid var(--border); padding:.4rem .7rem; border-radius:var(--radius); width:100%; max-width:260px;"></div>${listHtml}</div></div>
                ${formHtml}
            `;
            document.getElementById('content').innerHTML = mainHtml;

            // Search filter
            const searchInput = document.getElementById('blogSearch');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const q = e.target.value.toLowerCase();
                    document.querySelectorAll('#blogTbody tr').forEach(row => {
                        const title = row.getAttribute('data-title') || '';
                        row.style.display = title.includes(q) ? '' : 'none';
                    });
                });
            }

            // New / Edit / Delete
            document.getElementById('newPostBtn').onclick = () => showPostForm(null);
            document.getElementById('cancelPostBtn').onclick = () => {
                document.getElementById('blogFormWrap').style.display = 'none';
                document.getElementById('blogListWrap').style.display = 'block';
                if (editorInstance) { editorInstance.destroy(); editorInstance = null; }
            };
            document.getElementById('savePostBtn').onclick = savePost;
            document.querySelectorAll('.editPostBtn').forEach(btn => {
                btn.onclick = async () => {
                    const { data: post } = await supabase.from('posts').select('*').eq('id', btn.dataset.id).single();
                    if (post) showPostForm(post);
                };
            });
            document.querySelectorAll('.deletePostBtn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete this post?')) {
                        await supabase.from('posts').delete().eq('id', btn.dataset.id);
                        toast('Post deleted');
                        renderBlog();
                    }
                };
            });

            function showPostForm(post) {
                document.getElementById('blogListWrap').style.display = 'none';
                document.getElementById('blogFormWrap').style.display = 'block';
                document.getElementById('formHeading').innerText = post ? 'Edit Post' : 'New Post';
                document.getElementById('editPostId').value = post?.id || '';
                document.getElementById('postTitle').value = post?.title || '';
                document.getElementById('postSlug').value = post?.slug || '';
                document.getElementById('postCategory').value = post?.category || '';
                document.getElementById('postTags').value = (post?.tags || []).join(', ');
                document.getElementById('postCover').value = post?.cover_image || '';
                document.getElementById('postExcerpt').value = post?.excerpt || '';
                document.getElementById('postStatus').value = post?.status || 'draft';
                document.getElementById('postFeatured').checked = post?.featured || false;

                let editorData = null;
                if (post?.content) {
                    try { editorData = JSON.parse(post.content); } catch (e) { editorData = { blocks: [{ type: 'paragraph', data: { text: post.content } }] }; }
                }

                if (editorInstance) { editorInstance.destroy(); editorInstance = null; }
                setTimeout(() => {
                    editorInstance = new EditorJS({
                        holder: 'editorjs',
                        data: editorData || {},
                        placeholder: 'Start writing your post...',
                        tools: {
                            header: { class: Header, inlineToolbar: true, config: { levels: [1,2,3,4], defaultLevel: 2 } },
                            paragraph: { class: Paragraph, inlineToolbar: true },
                            list: { class: List, inlineToolbar: true },
                            quote: { class: Quote, inlineToolbar: true },
                            table: { class: Table, inlineToolbar: true },
                            image: {
                                class: ImageTool,
                                config: {
                                    uploader: {
                                        async uploadByFile(file) {
                                            const name = Date.now() + '_' + file.name.replace(/\s+/g, '_');
                                            const { error } = await supabase.storage.from('media').upload(name, file);
                                            if (error) return { success: 0 };
                                            const { data: { publicUrl } } = supabase.storage.from('media').getPublicUrl(name);
                                            return { success: 1, file: { url: publicUrl } };
                                        },
                                        async uploadByUrl(url) { return { success: 1, file: { url } }; }
                                    }
                                }
                            },
                            embed: {
                                class: Embed,
                                config: {
                                    services: {
                                        youtube: true,
                                        instagram: true,
                                        tiktok: {
                                            regex: /https?:\/\/(www\.)?tiktok\.com\/@[^/]+\/video\/(\d+)/,
                                            embedUrl: 'https://www.tiktok.com/embed/v2/<%= remote_id %>',
                                            html: '<blockquote class="tiktok-embed" cite="<%= url %>" data-video-id="<%= remote_id %>"><section></section></blockquote><script async src="https://www.tiktok.com/embed.js"><\/script>',
                                            height: 740, width: 340, id: (groups) => groups[2]
                                        }
                                    }
                                }
                            },
                            delimiter: Delimiter,
                            code: CodeTool,
                            marker: Marker,
                            inlineCode: InlineCode,
                            warning: Warning
                        },
                        onChange: async () => {
                            const saved = await editorInstance.save();
                            const firstPara = saved.blocks?.find(b => b.type === 'paragraph');
                            if (firstPara && !document.getElementById('postExcerpt').dataset.manual) {
                                const text = firstPara.data.text.replace(/<[^>]+>/g, '');
                                document.getElementById('postExcerpt').value = text.split(/\s+/).slice(0, 50).join(' ') + (text.split(/\s+/).length > 50 ? '…' : '');
                            }
                        }
                    });
                    document.getElementById('postExcerpt').addEventListener('input', function() { this.dataset.manual = 'true'; });
                }, 100);
            }

            async function savePost() {
                const title = document.getElementById('postTitle').value.trim();
                if (!title) { toast('Title is required', 'error'); return; }
                let contentJson = '{}';
                if (editorInstance) {
                    try { const saved = await editorInstance.save(); contentJson = JSON.stringify(saved); } catch(e) {}
                }
                const id = document.getElementById('editPostId').value;
                const post = {
                    title,
                    slug: document.getElementById('postSlug').value || slugify(title),
                    category: document.getElementById('postCategory').value,
                    tags: document.getElementById('postTags').value.split(',').map(s => s.trim()).filter(Boolean),
                    cover_image: document.getElementById('postCover').value,
                    excerpt: document.getElementById('postExcerpt').value,
                    content: contentJson,
                    status: document.getElementById('postStatus').value,
                    featured: document.getElementById('postFeatured').checked
                };
                if (id) {
                    const { error } = await supabase.from('posts').update(post).eq('id', id);
                    if (error) { toast('Error: ' + error.message, 'error'); return; }
                    toast('Post updated');
                } else {
                    const { error } = await supabase.from('posts').insert(post);
                    if (error) { toast('Error: ' + error.message, 'error'); return; }
                    toast('Post created');
                }
                if (editorInstance) { editorInstance.destroy(); editorInstance = null; }
                renderBlog();
            }

            // Embed actions
            async function insertEmbed(service, url) {
                if (!editorInstance) return;
                try {
                    await editorInstance.blocks.insert('embed', { service, source: url, embed: url, width: 560, height: 315, caption: '' });
                    toast(`${service} embedded`);
                } catch (e) { toast('Embed failed', 'error'); }
            }
            document.getElementById('embedYT')?.addEventListener('click', () => { const u = prompt('YouTube URL:'); if (u) insertEmbed('youtube', u); });
            document.getElementById('embedIG')?.addEventListener('click', () => { const u = prompt('Instagram post URL:'); if (u) insertEmbed('instagram', u); });
            document.getElementById('embedTT')?.addEventListener('click', () => { const u = prompt('TikTok video URL:'); if (u) insertEmbed('tiktok', u); });
            document.getElementById('embedImg')?.addEventListener('click', async () => {
                const url = prompt('Image URL:');
                if (url && editorInstance) await editorInstance.blocks.insert('image', { file: { url }, caption: '', withBorder: false, withBackground: false, stretched: false });
            });
            document.getElementById('embedGallery')?.addEventListener('click', async () => {
                const { data: imgs } = await supabase.from('gallery').select('*').limit(40);
                const modal = document.createElement('div');
                modal.style.position = 'fixed'; modal.style.inset = '0'; modal.style.background = 'rgba(0,0,0,.8)'; modal.style.display = 'flex'; modal.style.alignItems = 'center'; modal.style.justifyContent = 'center'; modal.style.zIndex = '200';
                modal.innerHTML = `<div style="background:var(--surface); border-radius:var(--radius-lg); max-width:640px; width:90%; max-height:80vh; overflow:auto;"><div style="padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;"><span>Select from Gallery</span><button id="closeModal" style="background:none; border:none; color:var(--text); font-size:1.2rem;">✕</button></div><div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:.75rem; padding:1rem;">${(imgs || []).map(img => `<div data-url="${escapeHtml(img.image_url)}" data-caption="${escapeHtml(img.caption || '')}" style="cursor:pointer;"><img src="${escapeHtml(img.image_url)}" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px;"><div style="font-size:.7rem; padding-top:.2rem;">${escapeHtml(img.caption || '')}</div></div>`).join('') || '<div style="padding:2rem;">No images in gallery</div>'}</div></div>`;
                document.body.appendChild(modal);
                document.getElementById('closeModal').onclick = () => modal.remove();
                modal.querySelectorAll('[data-url]').forEach(el => {
                    el.onclick = async () => {
                        if (editorInstance) {
                            await editorInstance.blocks.insert('image', { file: { url: el.dataset.url }, caption: el.dataset.caption });
                            toast('Image inserted');
                        }
                        modal.remove();
                    };
                });
            });
        }

        // Simple render for other sections (to keep functional)
        async function renderGallery() {
            const { data } = await supabase.from('gallery').select('*').order('created_at', { ascending: false });
            document.getElementById('content').innerHTML = `<div class="page-header"><div><h1>Gallery</h1><p>${data?.length || 0} images</p></div><div><button class="btn btn-primary" id="addImageBtn">+ Add Image</button></div></div><div id="galleryGrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:1rem;"></div>`;
            const grid = document.getElementById('galleryGrid');
            if (data?.length) {
                grid.innerHTML = data.map(img => `<div style="background:var(--surface); border-radius:var(--radius-md); overflow:hidden;"><img src="${escapeHtml(img.image_url)}" style="width:100%; aspect-ratio:4/3; object-fit:cover;"><div style="padding:.5rem;"><div contenteditable="true" data-id="${img.id}" class="captionEdit" style="font-size:.8rem;">${escapeHtml(img.caption || '')}</div><button class="delGalBtn btn btn-danger btn-sm" data-id="${img.id}" style="margin-top:.4rem;">Delete</button></div></div>`).join('');
                document.querySelectorAll('.captionEdit').forEach(el => el.addEventListener('blur', async () => {
                    await supabase.from('gallery').update({ caption: el.textContent.trim() }).eq('id', el.dataset.id);
                }));
                document.querySelectorAll('.delGalBtn').forEach(btn => btn.onclick = async () => { if (confirm('Delete?')) { await supabase.from('gallery').delete().eq('id', btn.dataset.id); renderGallery(); } });
            } else grid.innerHTML = '<div class="empty-state">Empty gallery</div>';
            document.getElementById('addImageBtn').onclick = () => { const url = prompt('Image URL:'); if (url) supabase.from('gallery').insert({ image_url: url, caption: '' }).then(() => { toast('Added'); renderGallery(); }); };
        }
        async function renderFootball() { document.getElementById('content').innerHTML = '<div class="page-header"><div><h1>Football Clubs</h1></div></div><div>Coming soon – admin panel ready</div>'; }
        async function renderF1() { document.getElementById('content').innerHTML = '<div class="page-header"><div><h1>F1 Drivers</h1></div></div><div>Coming soon</div>'; }
        async function renderWatchlist() { document.getElementById('content').innerHTML = '<div class="page-header"><div><h1>Watchlist</h1></div></div><div>Coming soon</div>'; }
        async function renderThoughts() { document.getElementById('content').innerHTML = '<div class="page-header"><div><h1>Thoughts</h1></div></div><div>Coming soon</div>'; }

        // Navigation handler
        async function loadSection(section) {
            setActiveSection(section);
            if (section === 'dashboard') await renderDashboard();
            else if (section === 'blog') await renderBlog();
            else if (section === 'gallery') await renderGallery();
            else if (section === 'football') await renderFootball();
            else if (section === 'f1') await renderF1();
            else if (section === 'watchlist') await renderWatchlist();
            else if (section === 'thoughts') await renderThoughts();
        }

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (sections.includes(hash)) loadSection(hash);
            else loadSection('dashboard');
        });
        document.querySelectorAll('.sidebar-link[data-section]').forEach(btn => {
            btn.addEventListener('click', () => {
                const section = btn.dataset.section;
                window.location.hash = section;
                loadSection(section);
                if (window.innerWidth <= 860) {
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('sidebarOverlay').classList.remove('open');
                }
            });
        });
        document.getElementById('menuBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        });
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            location.href = '/studio/login';
        });

        // Initial load
        const initial = window.location.hash.slice(1);
        if (sections.includes(initial)) await loadSection(initial);
        else await loadSection('dashboard');
    </script>
</body>
</html>
