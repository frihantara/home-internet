<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio — Frihantara (Fixed)</title>
    <link rel="stylesheet" href="/css/global.css">
    <!-- Quill rich text editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ============================================================
           FRIHANTARA STUDIO — Admin Panel (FIXED)
           Dark professional theme
           ============================================================ */

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sidebar-w: 256px;
            --topbar-h: 56px;
            --bg: #0d0d0f;
            --surface: #161618;
            --surface-2: #1e1e22;
            --surface-3: #26262c;
            --border: rgba(255,255,255,.07);
            --border-2: rgba(255,255,255,.12);
            --text: #f0f0f2;
            --text-2: #a0a0b0;
            --text-3: #5a5a70;
            --gold: #f0c040;
            --gold-dim: rgba(240,192,64,.4);
            --gold-glow: rgba(240,192,64,.08);
            --red: #f06060;
            --green: #50e090;
            --blue: #60b0f0;
            --radius: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow: 0 4px 24px rgba(0,0,0,.4);
            --transition: .15s ease;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* Layout */
        .studio-layout { display: flex; min-height: 100vh; }
        .studio-sidebar {
            width: var(--sidebar-w); flex-shrink: 0; background: var(--surface);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100;
            transition: transform .25s cubic-bezier(.4,0,.2,1);
        }
        .sidebar-brand {
            padding: 1.25rem 1.25rem 1rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: .75rem;
        }
        .sidebar-brand-logo {
            width: 32px; height: 32px; background: var(--gold); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #000; font-weight: 700;
        }
        .sidebar-brand-name { font-size: .95rem; font-weight: 600; color: var(--text); }
        .sidebar-brand-name span { color: var(--gold); }
        .sidebar-brand-badge {
            font-size: .6rem; text-transform: uppercase; letter-spacing: .1em;
            color: var(--text-3); background: var(--surface-2); padding: .15rem .4rem;
            border-radius: 99px; margin-left: auto;
        }
        .sidebar-nav { flex: 1; padding: 1rem .75rem; display: flex; flex-direction: column; gap: .15rem; }
        .sidebar-group { margin-bottom: .5rem; }
        .sidebar-group-label {
            font-size: .68rem; text-transform: uppercase; letter-spacing: .12em;
            color: var(--text-3); padding: .6rem .75rem .25rem; font-weight: 600;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: .6rem; padding: .55rem .75rem;
            border-radius: var(--radius-md); font-size: .85rem; font-weight: 500;
            color: var(--text-2); transition: background var(--transition), color var(--transition);
            text-decoration: none; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left;
        }
        .sidebar-link:hover { background: var(--surface-2); color: var(--text); }
        .sidebar-link.active { background: var(--gold-glow); color: var(--gold); }
        .sidebar-link .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
        .sidebar-link .nav-badge { margin-left: auto; font-size: .65rem; background: var(--surface-3); color: var(--text-3); padding: .1rem .4rem; border-radius: 99px; }
        .sidebar-footer { padding: 1rem .75rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: .15rem; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 99; backdrop-filter: blur(2px); }
        .sidebar-overlay.open { display: block; }
        .studio-main { flex: 1; margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
        .studio-topbar {
            height: var(--topbar-h); border-bottom: 1px solid var(--border); display: flex; align-items: center;
            justify-content: space-between; padding: 0 1.5rem; position: sticky; top: 0;
            background: rgba(13,13,15,.85); backdrop-filter: blur(12px); z-index: 50; gap: 1rem;
        }
        .topbar-left { display: flex; align-items: center; gap: .75rem; }
        .topbar-menu-btn { display: none; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: var(--radius); border: none; background: transparent; color: var(--text-2); cursor: pointer; }
        .topbar-menu-btn:hover { background: var(--surface-2); }
        .topbar-breadcrumb { display: flex; align-items: center; gap: .4rem; font-size: .85rem; }
        .topbar-breadcrumb-root { color: var(--text-3); }
        .topbar-breadcrumb-current { color: var(--text); font-weight: 600; }
        .topbar-right { display: flex; align-items: center; gap: .5rem; }
        .studio-content { flex: 1; padding: 2rem 1.75rem; max-width: 1400px; width: 100%; }
        .page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
        .page-header-left h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; color: var(--text); }
        .page-header-left p { font-size: .83rem; color: var(--text-3); margin-top: .3rem; }
        .page-header-actions { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
            padding: .5rem 1rem; border-radius: var(--radius); font-size: .85rem; font-weight: 600;
            cursor: pointer; border: none; transition: all var(--transition);
        }
        .btn-primary { background: var(--gold); color: #000; }
        .btn-primary:hover { background: #f7d060; }
        .btn-secondary { background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-2); }
        .btn-secondary:hover { background: var(--surface-3); color: var(--text); }
        .btn-danger { background: transparent; border: 1px solid rgba(240,96,96,.3); color: var(--red); }
        .btn-danger:hover { background: rgba(240,96,96,.1); }
        .btn-sm { padding: .3rem .65rem; font-size: .78rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; position: relative; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold); opacity: .3; }
        .stat-card-val { font-size: 2rem; font-weight: 700; color: var(--text); }
        .stat-card-label { font-size: .76rem; color: var(--text-3); }
        .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
        .table-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .table-search { display: flex; align-items: center; gap: .5rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: .35rem .75rem; flex: 1; max-width: 280px; }
        .table-search input { background: transparent; border: none; color: var(--text); font-size: .83rem; width: 100%; outline: none; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; font-size: .68rem; font-weight: 700; text-transform: uppercase; color: var(--text-3); padding: .75rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface-2); }
        .data-table td { padding: .85rem 1.25rem; font-size: .85rem; color: var(--text-2); border-bottom: 1px solid var(--border); }
        .data-table tbody tr:hover { background: var(--surface-2); }
        .td-actions { display: flex; gap: .4rem; align-items: center; }
        .badge { display: inline-flex; align-items: center; gap: .3rem; padding: .2rem .55rem; border-radius: 99px; font-size: .72rem; font-weight: 600; }
        .badge-published { background: rgba(80,224,144,.1); color: var(--green); }
        .badge-draft { background: var(--surface-3); color: var(--text-3); }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
        .panel-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .panel-header h2 { font-size: 1rem; font-weight: 700; }
        .panel-body { padding: 1.5rem; }
        .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        .field-full { grid-column: 1 / -1; }
        .field { display: flex; flex-direction: column; gap: .35rem; }
        .field label { font-size: .78rem; font-weight: 600; color: var(--text-2); }
        .field input, .field textarea, .field select {
            width: 100%; padding: .55rem .75rem; background: var(--surface-2);
            border: 1px solid var(--border); border-radius: var(--radius);
            color: var(--text); font-family: inherit; font-size: .85rem; outline: none;
        }
        .field input:focus, .field textarea:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px var(--gold-glow); }
        .form-actions { display: flex; align-items: center; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
        .post-editor-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; align-items: start; }
        @media (max-width: 960px) { .post-editor-layout { grid-template-columns: 1fr; } }
        .editorjs-wrap { min-height: 460px; }
        .editorjs-wrap .ql-toolbar.ql-snow { border: none; border-bottom: 1px solid var(--border); background: var(--surface-2); }
        .editorjs-wrap .ql-container.ql-snow { border: none; background: var(--surface); min-height: 380px; color: var(--text); }
        .editorjs-wrap .ql-editor { padding: 1.25rem; min-height: 380px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .gallery-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; position: relative; }
        .gallery-card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
        .gallery-card-body { padding: .65rem .75rem; }
        .toast-wrap { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: .5rem; }
        .toast { display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem; border-radius: var(--radius-md); background: var(--surface-2); border: 1px solid var(--border-2); box-shadow: var(--shadow); font-size: .85rem; animation: toastIn .2s ease; }
        .toast-success { border-left: 3px solid var(--green); }
        .toast-error { border-left: 3px solid var(--red); }
        @keyframes toastIn { from { opacity:0; transform: translateX(16px); } to { opacity:1; transform: none; } }
        .empty-state { padding: 3rem 2rem; text-align: center; color: var(--text-3); }
        @media (max-width: 860px) {
            .studio-main { margin-left: 0; }
            .studio-sidebar { transform: translateX(-100%); }
            .studio-sidebar.open { transform: none; }
            .topbar-menu-btn { display: flex; }
        }
    </style>
</head>
<body>
    <div class="studio-layout">
        <aside class="studio-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-logo">F</div>
                <div><div class="sidebar-brand-name">Frihan<span>tara</span></div></div>
                <span class="sidebar-brand-badge">Studio</span>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-group"><div class="sidebar-group-label">Overview</div>
                    <button class="sidebar-link active" data-section="dashboard"><span class="nav-icon">📊</span> Dashboard</button>
                </div>
                <div class="sidebar-group"><div class="sidebar-group-label">Content</div>
                    <button class="sidebar-link" data-section="blog"><span class="nav-icon">📝</span> Blog <span class="nav-badge" id="navCount-blog">—</span></button>
                    <button class="sidebar-link" data-section="gallery"><span class="nav-icon">🖼️</span> Gallery <span class="nav-badge" id="navCount-gallery">—</span></button>
                    <button class="sidebar-link" data-section="football"><span class="nav-icon">⚽</span> Football Clubs</button>
                    <button class="sidebar-link" data-section="f1"><span class="nav-icon">🏎️</span> F1 Drivers</button>
                    <button class="sidebar-link" data-section="watchlist"><span class="nav-icon">🎬</span> Watchlist</button>
                    <button class="sidebar-link" data-section="thoughts"><span class="nav-icon">💭</span> Thoughts</button>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a class="sidebar-link" href="/" target="_blank"><span class="nav-icon">🌐</span> View Site</a>
                <button class="sidebar-link" id="logoutBtn"><span class="nav-icon">🚪</span> Sign out</button>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <main class="studio-main">
            <div class="studio-topbar">
                <div class="topbar-left">
                    <button class="topbar-menu-btn" id="menuBtn">☰</button>
                    <div class="topbar-breadcrumb">
                        <span class="topbar-breadcrumb-root">Studio</span>
                        <span class="topbar-breadcrumb-sep">/</span>
                        <span class="topbar-breadcrumb-current" id="pageTitle">Dashboard</span>
                    </div>
                </div>
                <div class="topbar-right" id="topbarActions"></div>
            </div>
            <div class="studio-content" id="content"></div>
        </main>
    </div>
    <div class="toast-wrap" id="toastWrap"></div>

    <script>
        // ==================== SUPABASE INIT (Langsung di sini) ====================
        const SUPABASE_URL = 'https://qokvryijyknlmkxtyjex.supabase.co';   // GANTI DENGAN URL PROYEK SUPABASE ANDA
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFva3ZyeWlqeWtubG1reHR5amV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDU2MjgsImV4cCI6MjA5NjgyMTYyOH0.o_-rf_gpZbwHDjBwIJW6AywStRHyKoK7jhC6bTBxgPM';                // GANTI DENGAN ANON KEY

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Helper functions
        function escapeHtml(str) { return str?.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]) || ''; }
        function slugify(t) { return t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }
        function formatDateShort(dateStr) { if (!dateStr) return ''; const d = new Date(dateStr); return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
        function toast(msg, type = 'success') {
            const w = document.getElementById('toastWrap');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = (type === 'success' ? '✓ ' : type === 'error' ? '✕ ' : 'ℹ ') + msg;
            w.appendChild(el);
            setTimeout(() => el.remove(), 3200);
        }

        // Global state
        let currentSection = 'dashboard';
        let editorInstance = null; // Quill

        // Navigation
        const sectionTitles = { dashboard:'Dashboard', blog:'Blog', gallery:'Gallery', football:'Football Clubs', f1:'F1 Drivers', watchlist:'Watchlist', thoughts:'Thoughts' };
        async function navigate(section) { window.location.hash = section; }
        async function loadSection(section) {
            currentSection = section;
            document.querySelectorAll('.sidebar-link[data-section]').forEach(l => l.classList.remove('active'));
            const activeLink = document.querySelector(`.sidebar-link[data-section="${section}"]`);
            if (activeLink) activeLink.classList.add('active');
            document.getElementById('pageTitle').textContent = sectionTitles[section] || section;
            document.getElementById('topbarActions').innerHTML = '';
            const map = { dashboard: renderDashboard, blog: renderBlog, gallery: renderGallery, football: renderFootball, f1: renderF1, watchlist: renderWatchlist, thoughts: renderThoughts };
            if (map[section]) await map[section]();
        }

        window.addEventListener('hashchange', () => loadSection(window.location.hash.replace('#', '') || 'dashboard'));
        document.getElementById('menuBtn').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); });
        document.getElementById('sidebarOverlay').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); });
        document.querySelectorAll('.sidebar-link[data-section]').forEach(l => l.addEventListener('click', () => { navigate(l.dataset.section); if (window.innerWidth <= 860) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); } }));
        document.getElementById('logoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); location.href = '/studio/login'; });

        // Auth check
        (async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { location.href = '/studio/login'; return; }
            console.log('✅ Login sebagai:', session.user.email);
            await loadSection(window.location.hash.replace('#', '') || 'dashboard');
        })();

        // ---------- Dashboard ----------
        async function renderDashboard() {
            const tables = ['posts','gallery','football_clubs','f1_drivers','watchlist','thoughts'];
            const labels = { posts:'Blog Posts', gallery:'Gallery Images', football_clubs:'Football Clubs', f1_drivers:'F1 Drivers', watchlist:'Watchlist', thoughts:'Thoughts' };
            const icons = { posts:'📝', gallery:'🖼️', football_clubs:'⚽', f1_drivers:'🏎️', watchlist:'🎬', thoughts:'💭' };
            const stats = {};
            for (const t of tables) {
                const { count, error } = await supabase.from(t).select('*', { count: 'exact', head: true });
                if (error) console.error(t, error);
                stats[t] = count ?? 0;
            }
            document.getElementById('navCount-blog').textContent = stats.posts;
            document.getElementById('navCount-gallery').textContent = stats.gallery;
            const { data: recentPosts } = await supabase.from('posts').select('title,status,created_at').order('created_at', { ascending: false }).limit(5);
            document.getElementById('content').innerHTML = `
                <div class="page-header"><div class="page-header-left"><h1>Dashboard</h1><p>Welcome back!</p></div></div>
                <div class="stats-grid">${tables.map(t => `<div class="stat-card"><div class="stat-card-icon">${icons[t]}</div><div class="stat-card-val">${stats[t]}</div><div class="stat-card-label">${labels[t]}</div></div>`).join('')}</div>
                <div class="table-container"><div class="recent-posts-header" style="padding:1rem 1.25rem;"><h3>Recent Posts</h3><button class="btn btn-secondary btn-sm" onclick="navigate('blog')">View all</button></div>
                ${recentPosts?.length ? `<table class="data-table"><thead><tr><th>Title</th><th>Status</th><th>Date</th></tr></thead><tbody>${recentPosts.map(p => `<tr><td><strong>${escapeHtml(p.title)}</strong></td><td><span class="badge badge-${p.status}">${p.status}</span></td><td>${formatDateShort(p.created_at)}</td></tr>`).join('')}</tbody></table>` : '<div class="empty-state">No posts yet</div>'}</div>`;
        }

        // ---------- Blog ----------
        async function renderBlog() {
            const { data: posts, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (error) { toast('Error loading posts: ' + error.message, 'error'); console.error(error); }
            document.getElementById('navCount-blog').textContent = posts?.length || 0;
            document.getElementById('content').innerHTML = `
                <div class="page-header"><div class="page-header-left"><h1>Blog Posts</h1><p>${posts?.length || 0} posts</p></div><div class="page-header-actions"><button class="btn btn-primary" id="newPostBtn">+ New Post</button></div></div>
                <div id="blogListWrap"><div class="table-container"><div class="table-toolbar"><div class="table-search"><span>🔍</span><input id="blogSearch" placeholder="Search posts…" oninput="filterTable(this.value,'blogTbody')"></div></div>
                ${posts?.length ? `<table class="data-table"><thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Date</th><th style="width:130px">Actions</th></tr></thead><tbody id="blogTbody">${posts.map(p => `<tr data-search="${escapeHtml(p.title.toLowerCase())}"><td><strong>${escapeHtml(p.title)}</strong>${p.featured ? '<span style="font-size:.7rem; background:var(--gold-glow); color:var(--gold); padding:.1rem .35rem; border-radius:4px; margin-left:.4rem;">Featured</span>' : ''}</td><td>${escapeHtml(p.category || '—')}</td><td><span class="badge badge-${p.status}">${p.status}</span></td><td>${formatDateShort(p.created_at)}</td><td class="td-actions"><button class="btn btn-secondary btn-sm editPostBtn" data-id="${p.id}">Edit</button><button class="btn btn-danger btn-sm deletePostBtn" data-id="${p.id}">Delete</button></td></tr>`).join('')}</tbody></table>` : '<div class="empty-state">No posts yet</div>'}</div></div>
                <div id="blogFormWrap" style="display:none; margin-top:1.5rem;">${postFormHtml()}</div>
            `;
            document.getElementById('newPostBtn').onclick = () => showPostForm(null);
            document.querySelectorAll('.editPostBtn').forEach(btn => btn.onclick = async () => { const { data } = await supabase.from('posts').select('*').eq('id', btn.dataset.id).single(); if(data) showPostForm(data); });
            document.querySelectorAll('.deletePostBtn').forEach(btn => btn.onclick = async () => { if(confirm('Delete this post? This action cannot be undone.')) await deletePost(btn.dataset.id); });
            document.getElementById('cancelPostBtn')?.addEventListener('click', cancelPostForm);
            document.getElementById('savePostBtn')?.addEventListener('click', savePost);
        }

        function postFormHtml() { return `<div class="page-header"><div class="page-header-left"><h1 id="formHeading">New Post</h1></div><div class="page-header-actions"><button class="btn btn-secondary" id="cancelPostBtn">← Back</button><button class="btn btn-primary" id="savePostBtn">Save Post</button></div></div><input type="hidden" id="editPostId"><div class="post-editor-layout"><div class="post-editor-main"><div class="panel"><div class="panel-body"><input id="postTitle" placeholder="Post title…" style="width:100%; background:transparent; border:none; color:var(--text); font-size:1.5rem; font-weight:700; outline:none;"><div style="display:flex; gap:.4rem; margin-top:.35rem;"><span style="font-size:.75rem; color:var(--text-3);">Slug:</span><input id="postSlug" placeholder="auto" style="flex:1; background:transparent; color:var(--text-3); font-size:.78rem;"></div></div></div><div class="panel"><div id="editorjs" class="editorjs-wrap"></div></div></div><div class="post-editor-sidebar"><div class="panel"><div class="panel-header"><h2>Publish</h2></div><div class="panel-body"><select id="postStatus"><option value="draft">Draft</option><option value="published">Published</option></select><div class="field-row" style="margin-top:.75rem;"><input type="checkbox" id="postFeatured"><label>Featured</label></div></div></div><div class="panel"><div class="panel-header"><h2>Details</h2></div><div class="panel-body"><div class="field"><label>Category</label><input id="postCategory"></div><div class="field"><label>Tags (comma)</label><input id="postTags"></div><div class="field"><label>Cover Image URL</label><input id="postCover" placeholder="https://…"></div><div class="field"><label>Excerpt</label><textarea id="postExcerpt" rows="3"></textarea></div></div></div></div></div>`; }
        function cancelPostForm() { document.getElementById('blogFormWrap').style.display = 'none'; document.getElementById('blogListWrap').style.display = 'block'; if(editorInstance) { editorInstance.root.innerHTML = ''; editorInstance = null; } }
        async function deletePost(id) { 
            const btn = document.querySelector(`.deletePostBtn[data-id="${id}"]`);
            if(btn) { btn.disabled = true; btn.textContent = '…'; }
            const { error } = await supabase.from('posts').delete().eq('id', id);
            if(error) { toast('Delete failed: ' + error.message, 'error'); console.error(error); if(btn) { btn.disabled = false; btn.textContent = 'Delete'; } return; }
            toast('Post deleted ✓'); renderBlog();
        }
        function showPostForm(post) {
            document.getElementById('blogListWrap').style.display = 'none';
            document.getElementById('blogFormWrap').style.display = 'block';
            document.getElementById('formHeading').textContent = post ? 'Edit Post' : 'New Post';
            document.getElementById('editPostId').value = post?.id || '';
            document.getElementById('postTitle').value = post?.title || '';
            document.getElementById('postSlug').value = post?.slug || '';
            document.getElementById('postCategory').value = post?.category || '';
            document.getElementById('postTags').value = (post?.tags || []).join(', ');
            document.getElementById('postCover').value = post?.cover_image || '';
            document.getElementById('postExcerpt').value = post?.excerpt || '';
            document.getElementById('postStatus').value = post?.status || 'draft';
            document.getElementById('postFeatured').checked = post?.featured || false;
            if(editorInstance) { document.getElementById('editorjs').innerHTML = ''; editorInstance = null; }
            setTimeout(() => {
                editorInstance = new Quill('#editorjs', { theme: 'snow', placeholder: 'Write here...', modules: { toolbar: [[{ header: [1,2,3,false]}], ['bold','italic','underline'], ['link','image'], ['clean']] } });
                editorInstance.root.innerHTML = post?.content || '';
                editorInstance.on('text-change', () => { if(!document.getElementById('postExcerpt').dataset.manual) { const text = editorInstance.getText().trim(); const words = text.split(/\s+/).slice(0,50).join(' '); document.getElementById('postExcerpt').value = words + (text.split(/\s+/).length>50?'…':''); } });
                document.getElementById('postExcerpt').addEventListener('input', function() { this.dataset.manual = 'true'; });
            }, 10);
        }
        async function savePost() {
            const id = document.getElementById('editPostId').value;
            const title = document.getElementById('postTitle').value.trim();
            if(!title) { toast('Title required', 'error'); return; }
            const postData = {
                title, slug: document.getElementById('postSlug').value || slugify(title),
                category: document.getElementById('postCategory').value,
                tags: document.getElementById('postTags').value.split(',').map(s=>s.trim()).filter(Boolean),
                cover_image: document.getElementById('postCover').value,
                excerpt: document.getElementById('postExcerpt').value,
                content: editorInstance ? editorInstance.root.innerHTML : '',
                status: document.getElementById('postStatus').value,
                featured: document.getElementById('postFeatured').checked
            };
            let error;
            if(id) error = (await supabase.from('posts').update(postData).eq('id', id)).error;
            else error = (await supabase.from('posts').insert(postData)).error;
            if(error) { toast('Save failed: ' + error.message, 'error'); console.error(error); return; }
            toast(id ? 'Post updated ✓' : 'Post created ✓');
            if(editorInstance) editorInstance = null;
            renderBlog();
        }

        // ---------- Gallery ----------
        async function renderGallery() {
            const { data } = await supabase.from('gallery').select('*').order('created_at', { ascending: false });
            document.getElementById('navCount-gallery').textContent = data?.length || 0;
            document.getElementById('content').innerHTML = `
                <div class="page-header"><div class="page-header-left"><h1>Gallery</h1><p>${data?.length||0} images</p></div><div class="page-header-actions"><button class="btn btn-primary" id="openUploadModal">+ Add Images</button></div></div>
                <div class="gallery-grid" id="galleryGrid">${(data||[]).map(img => `<div class="gallery-card" data-id="${img.id}"><img src="${escapeHtml(img.image_url)}" class="gallery-card-img" loading="lazy"><div class="gallery-card-overlay" style="position:absolute; top:.5rem; right:.5rem;"><button class="gallery-overlay-btn deleteGalleryBtn" data-id="${img.id}" style="background:rgba(0,0,0,.7); border:none; border-radius:4px; padding:.2rem .5rem; color:white;">🗑️</button></div><div class="gallery-card-body"><div class="editable-caption" contenteditable="true" data-id="${img.id}">${escapeHtml(img.caption||'')}</div></div></div>`).join('') || '<div class="empty-state">No images yet</div>'}</div>
                <div class="modal-overlay" id="uploadModal"><div class="modal"><div class="modal-header"><span class="modal-title">Upload Image</span><button class="modal-close" id="closeUploadModal">✕</button></div><div class="modal-body"><div class="field"><label>Image URL</label><input id="modalGalleryUrl" placeholder="https://..."></div><div class="field"><label>Caption</label><input id="modalGalleryCaption"></div></div><div class="modal-footer"><button class="btn btn-secondary" id="closeUploadModal2">Cancel</button><button class="btn btn-primary" id="confirmUpload">Add</button></div></div></div>
            `;
            document.getElementById('openUploadModal').onclick = () => document.getElementById('uploadModal').classList.add('open');
            const closeModal = () => document.getElementById('uploadModal').classList.remove('open');
            document.getElementById('closeUploadModal').onclick = closeModal;
            document.getElementById('closeUploadModal2').onclick = closeModal;
            document.getElementById('confirmUpload').onclick = async () => {
                const url = document.getElementById('modalGalleryUrl').value.trim();
                if(!url) { toast('URL required', 'error'); return; }
                const caption = document.getElementById('modalGalleryCaption').value;
                const { error } = await supabase.from('gallery').insert({ image_url: url, caption });
                if(error) { toast('Add failed: ' + error.message, 'error'); return; }
                toast('Image added ✓'); closeModal(); renderGallery();
            };
            document.querySelectorAll('.deleteGalleryBtn').forEach(btn => btn.onclick = async () => { if(confirm('Delete this image?')) { const { error } = await supabase.from('gallery').delete().eq('id', btn.dataset.id); if(error) toast('Delete failed: ' + error.message, 'error'); else { toast('Deleted ✓'); renderGallery(); } } });
            document.querySelectorAll('.editable-caption').forEach(el => { el.addEventListener('blur', async () => { await supabase.from('gallery').update({ caption: el.textContent.trim() }).eq('id', el.dataset.id); }); });
        }

        // ---------- Football Clubs ----------
        async function renderFootball() { await renderSimpleTable('football_clubs', 'Football Clubs', 'club', ['name','league','league_titles','domestic_cups']); }
        async function renderF1() { await renderSimpleTable('f1_drivers', 'F1 Drivers', 'driver', ['name','team','wins','championships']); }
        async function renderWatchlist() { await renderSimpleTable('watchlist', 'Watchlist', 'watch', ['title','type','status','rating']); }
        async function renderThoughts() { await renderSimpleTable('thoughts', 'Thoughts', 'thought', ['content','tags']); }

        async function renderSimpleTable(table, title, prefix, fields) {
            const { data } = await supabase.from(table).select('*').order('created_at', { ascending: false });
            document.getElementById('content').innerHTML = `
                <div class="page-header"><div class="page-header-left"><h1>${title}</h1><p>${data?.length||0} items</p></div><div class="page-header-actions"><button class="btn btn-primary" id="newItemBtn">+ New</button></div></div>
                <div id="listWrap"><div class="table-container">${data?.length ? `<table class="data-table"><thead><tr>${fields.map(f => `<th>${f}</th>`).join('')}<th style="width:130px">Actions</th></tr></thead><tbody>${data.map(item => `<tr>${fields.map(f => `<td>${escapeHtml(String(item[f]||''))}</td>`).join('')}<td class="td-actions"><button class="btn btn-secondary btn-sm editBtn" data-id="${item.id}">Edit</button><button class="btn btn-danger btn-sm delBtn" data-id="${item.id}">Delete</button></td></tr>`).join('')}</tbody></table>` : '<div class="empty-state">No items</div>'}</div></div>
                <div id="formWrap" style="display:none; margin-top:1.5rem;"><div class="panel"><div class="panel-header"><h2 id="formTitle">New ${title}</h2></div><div class="panel-body"><input type="hidden" id="itemId">${fields.map(f => `<div class="field"><label>${f}</label><input id="field_${f}"></div>`).join('')}<div class="form-actions"><button class="btn btn-secondary" id="cancelBtn">Cancel</button><button class="btn btn-primary" id="saveBtn">Save</button></div></div></div></div>
            `;
            document.getElementById('newItemBtn').onclick = () => showForm(null);
            document.querySelectorAll('.editBtn').forEach(btn => btn.onclick = async () => { const { data } = await supabase.from(table).select('*').eq('id', btn.dataset.id).single(); if(data) showForm(data); });
            document.querySelectorAll('.delBtn').forEach(btn => btn.onclick = async () => { if(confirm('Delete?')) { const { error } = await supabase.from(table).delete().eq('id', btn.dataset.id); if(error) toast('Delete failed: ' + error.message, 'error'); else { toast('Deleted ✓'); renderSimpleTable(table, title, prefix, fields); } } });
            document.getElementById('cancelBtn').onclick = () => { document.getElementById('formWrap').style.display = 'none'; document.getElementById('listWrap').style.display = 'block'; };
            document.getElementById('saveBtn').onclick = async () => {
                const id = document.getElementById('itemId').value;
                const obj = {};
                for(const f of fields) obj[f] = document.getElementById(`field_${f}`).value;
                let error;
                if(id) error = (await supabase.from(table).update(obj).eq('id', id)).error;
                else error = (await supabase.from(table).insert(obj)).error;
                if(error) toast('Save failed: ' + error.message, 'error');
                else { toast('Saved ✓'); renderSimpleTable(table, title, prefix, fields); }
            };
            function showForm(item) {
                document.getElementById('listWrap').style.display = 'none';
                document.getElementById('formWrap').style.display = 'block';
                document.getElementById('formTitle').textContent = item ? `Edit ${title}` : `New ${title}`;
                document.getElementById('itemId').value = item?.id || '';
                for(const f of fields) document.getElementById(`field_${f}`).value = item?.[f] ?? '';
            }
        }

        window.filterTable = (query, tbodyId) => {
            const tbody = document.getElementById(tbodyId);
            if(!tbody) return;
            tbody.querySelectorAll('tr').forEach(row => { const text = row.dataset.search || row.textContent.toLowerCase(); row.style.display = text.includes(query.toLowerCase()) ? '' : 'none'; });
        };
        window.navigate = navigate;
    </script>
</body>
</html>
