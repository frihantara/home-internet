      <!-- Main -->
      <main class="admin-main">
        <div class="admin-topbar">
          <div style="display: flex; align-items: center; gap: 0.75rem">
            <button class="admin-sidebar-toggle" id="sidebar-toggle">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M4 6h16M4 12h16M4 18h16"
                />
              </svg>
            </button>
            <span class="admin-topbar-title">Dashboard</span>
          </div>
          <div class="admin-topbar-actions">
            <span
              id="admin-email"
              style="font-size: 0.78rem; color: var(--text-3)"
            ></span>
          </div>
        </div>

        <div class="admin-content">
          <div class="page-title-wrap">
            <h1 class="page-title">Welcome back</h1>
          </div>

          <!-- Stats -->
          <div class="stats-grid" id="stats-grid">
            <div
              class="skeleton"
              style="height: 90px; border-radius: 12px"
            ></div>
            <div
              class="skeleton"
              style="height: 90px; border-radius: 12px"
            ></div>
            <div
              class="skeleton"
              style="height: 90px; border-radius: 12px"
            ></div>
            <div
              class="skeleton"
              style="height: 90px; border-radius: 12px"
            ></div>
          </div>

          <!-- Quick links -->
          <div class="section-eyebrow" style="margin-bottom: 1rem">
            Quick actions
          </div>
          <div class="quick-actions" id="quick-actions"></div>

          <!-- Recent posts -->
          <div style="margin-top: 2rem">
            <div class="table-toolbar">
              <div
                style="font-size: 0.9rem; font-weight: 600; color: var(--text)"
              >
                Recent posts
              </div>
              <a href="/studio/blog" class="btn btn--ghost btn--sm"
                >Manage Blog →</a
              >
            </div>
            <div class="data-table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Category</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody id="recent-posts-tbody">
                  <tr>
                    <td
                      colspan="4"
                      style="
                        text-align: center;
                        color: var(--text-3);
                        padding: 2rem;
                      "
                    >
                      Loading…
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <style>
      .quick-actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }
      @media (max-width: 800px) {
        .quick-actions {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .quick-action-btn {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.8rem 1rem;
        font-size: 0.83rem;
        font-weight: 500;
        color: var(--text-2);
        text-align: left;
        transition: all var(--transition);
      }
      .quick-action-btn:hover {
        border-color: var(--gold-dim);
        color: var(--text);
        background: var(--surface-2);
      }
    </style>

    <script type="module">
      import { SUPABASE_URL, SUPABASE_ANON_KEY } from "../js/config.js";
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
      import { formatDateShort } from "../js/supabase.js";

      const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Auth guard
      const {
        data: { session },
      } = await sb.auth.getSession();
      if (!session) {
        window.location.href = "/studio/login";
      }
      document.getElementById("admin-email").textContent =
        session?.user?.email || "";

      // Sign out
      document
        .getElementById("signout-btn")
        .addEventListener("click", async (e) => {
          e.preventDefault();
          await sb.auth.signOut();
          window.location.href = "/studio/login";
        });

      // Sidebar mobile
      const sidebar = document.getElementById("admin-sidebar");
      const overlay = document.getElementById("sidebar-overlay");
      const toggle = document.getElementById("sidebar-toggle");
      toggle.addEventListener("click", () => {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("open");
      });
      overlay.addEventListener("click", () => {
        sidebar.classList.remove("open");
        overlay.classList.remove("open");
      });

      // Stats
      async function loadStats() {
        const tables = [
          {
            table: "posts",
            label: "Posts",
            filter: (q) => q.eq("status", "published"),
          },
          { table: "thoughts", label: "Thoughts", filter: (q) => q },
          { table: "gallery", label: "Photos", filter: (q) => q },
          { table: "watchlist", label: "Watchlist", filter: (q) => q },
        ];

        const results = await Promise.all(
          tables.map(async (t) => {
            const { count } = await t.filter(
              sb.from(t.table).select("id", { count: "exact", head: true }),
            );
            return { label: t.label, count: count ?? 0 };
          }),
        );

        document.getElementById("stats-grid").innerHTML = results
          .map(
            (r) => `
        <div class="stat-card">
          <div class="stat-card-val">${r.count}</div>
          <div class="stat-card-label">${r.label}</div>
        </div>
      `,
          )
          .join("");
      }

      // Quick actions
      function loadQuickActions() {
        const actions = [
          { href: "/studio/blog/new", label: "New post" },
          { href: "/studio/thoughts/new", label: "New thought" },
          { href: "/studio/gallery", label: "Upload photo" },
          { href: "/studio/watchlist/new", label: "Add to watchlist" },
        ];
        document.getElementById("quick-actions").innerHTML = actions
          .map(
            (a) => `
        <a href="${a.href}" class="quick-action-btn">+ ${a.label}</a>
      `,
          )
          .join("");
      }

      // Recent posts
      async function loadRecentPosts() {
        const { data } = await sb
          .from("posts")
          .select("id,title,status,category,created_at")
          .order("created_at", { ascending: false })
          .limit(6);
        const tbody = document.getElementById("recent-posts-tbody");
        if (!data?.length) {
          tbody.innerHTML =
            '<tr><td colspan="4" style="text-align:center;color:var(--text-3);padding:2rem">No posts yet</td></tr>';
          return;
        }
        tbody.innerHTML = data
          .map(
            (p) => `
        <tr>
          <td><a href="/studio/blog/edit/${p.id}" style="color:var(--text);font-weight:500;transition:color .15s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text)'">${p.title}</a></td>
          <td><span class="badge ${p.status === "published" ? "badge--green" : ""}">${p.status}</span></td>
          <td>${p.category || "—"}</td>
          <td>${formatDateShort(p.created_at)}</td>
        </tr>
      `,
          )
          .join("");
      }

      loadStats();
      loadQuickActions();
      loadRecentPosts();
    </script>
  </body>
</html>
