<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Admin</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0A0A0B; color: #E8E4DC; font-family: system-ui, sans-serif; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #111114; border-right: 1px solid #242428; padding: 1.5rem; position: fixed; height: 100vh; overflow-y: auto; }
    .main { flex: 1; margin-left: 260px; padding: 2rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #242428; }
    .nav-item { display: block; padding: 0.5rem 0.75rem; border-radius: 6px; color: #A8A4A0; cursor: pointer; margin-bottom: 0.25rem; }
    .nav-item:hover, .nav-item.active { background: #18181C; color: #E8E4DC; }
    .nav-group { margin-bottom: 1.5rem; }
    .nav-label { font-size: 0.7rem; text-transform: uppercase; color: #6B6B7A; margin-bottom: 0.5rem; }
    button, .btn { padding: 0.4rem 0.8rem; border-radius: 6px; background: #18181C; border: 1px solid #242428; color: #E8E4DC; cursor: pointer; }
    .btn-primary { background: #C8A96E; color: #000; border: none; }
    .btn-danger { background: rgba(224,82,82,0.2); color: #E05252; border-color: #E05252; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid #242428; }
    input, textarea, select { width: 100%; padding: 0.5rem; background: #18181C; border: 1px solid #242428; border-radius: 6px; color: #E8E4DC; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.25rem; font-size: 0.85rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #18181C; padding: 1rem; border-radius: 12px; text-align: center; }
    .stat-number { font-size: 2rem; font-weight: bold; color: #C8A96E; }
    @media (max-width: 700px) { .sidebar { display: none; } .main { margin-left: 0; } }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div style="font-size:1.4rem; margin-bottom:2rem;">Digital<span style="color:#C8A96E;">.</span></div>
    <div class="nav-group"><div class="nav-label">Main</div><div data-view="dashboard" class="nav-item">Dashboard</div></div>
    <div class="nav-group"><div class="nav-label">Blog</div><div data-view="blog" class="nav-item">Posts</div><div data-view="blog_new" class="nav-item">+ New Post</div></div>
    <div class="nav-group"><div class="nav-label">Gallery</div><div data-view="gallery" class="nav-item">Photos</div><div data-view="gallery_upload" class="nav-item">+ Upload</div></div>
    <div class="nav-group"><div class="nav-label">Football</div><div data-view="football" class="nav-item">Clubs</div><div data-view="football_new" class="nav-item">+ Club</div></div>
    <div class="nav-group"><div class="nav-label">F1</div><div data-view="f1" class="nav-item">Drivers</div><div data-view="f1_new" class="nav-item">+ Driver</div></div>
    <div class="nav-group"><div class="nav-label">Watchlist</div><div data-view="watchlist" class="nav-item">Items</div><div data-view="watchlist_new" class="nav-item">+ Item</div></div>
    <div class="nav-group"><div class="nav-label">Thoughts</div><div data-view="thoughts" class="nav-item">List</div><div data-view="thoughts_new" class="nav-item">+ Thought</div></div>
    <div class="nav-group"><div id="logout-btn" class="nav-item" style="color:#E05252;">Sign out</div></div>
  </div>
  <div class="main">
    <div class="header"><h1 id="page-title">Dashboard</h1><span id="user-email"></span></div>
    <div id="content"></div>
  </div>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';
  import { formatDateShort } from '/js/supabase.js';

  // Cek login
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) location.href = '/studio/login';
  document.getElementById('user-email').innerText = session.user.email;

  let currentView = null;
  const contentDiv = document.getElementById('content');

  function setActive(view) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`[data-view="${view}"]`).forEach(el => el.classList.add('active'));
    document.getElementById('page-title').innerText = view.replace(/_/g,' ').toUpperCase();
  }

  function escape(str) { return String(str ?? '').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

  // Dashboard
  async function dashboard() {
    setActive('dashboard');
    const tables = ['posts','gallery','football_clubs','f1_drivers','watchlist','thoughts'];
    let stats = {};
    for (let t of tables) {
      let { count } = await supabase.from(t).select('*', { count: 'exact', head: true });
      stats[t] = count ?? 0;
    }
    contentDiv.innerHTML = `<div class="stat-grid">
      <div class="stat-card"><div class="stat-number">${stats.posts}</div><div>Posts</div></div>
      <div class="stat-card"><div class="stat-number">${stats.gallery}</div><div>Photos</div></div>
      <div class="stat-card"><div class="stat-number">${stats.football_clubs}</div><div>Clubs</div></div>
      <div class="stat-card"><div class="stat-number">${stats.f1_drivers}</div><div>F1 Drivers</div></div>
      <div class="stat-card"><div class="stat-number">${stats.watchlist}</div><div>Watchlist</div></div>
      <div class="stat-card"><div class="stat-number">${stats.thoughts}</div><div>Thoughts</div></div>
    </div><p>Welcome back, ${escape(session.user.email)}</p>`;
  }

  // ---------------------- BLOG ----------------------
  async function blogList() {
    setActive('blog');
    let { data } = await supabase.from('posts').select('id,title,status,created_at').order('created_at',{ascending:false});
    if (!data?.length) {
      contentDiv.innerHTML = `<p>No posts. <button data-view="blog_new" class="btn btn-primary">Create post</button></p>`;
      attachNavClicks();
      return;
    }
    contentDiv.innerHTML = `
      <table><thead><tr><th>Title</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>
        ${data.map(p => `<tr><td>${escape(p.title)}</td><td>${p.status}</td><td>${formatDateShort(p.created_at)}</td><td><button data-edit="${p.id}" class="btn">Edit</button> <button data-delete="${p.id}" class="btn btn-danger">Delete</button></td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:1rem"><button data-view="blog_new" class="btn btn-primary">+ New Post</button></div>
    `;
    attachDeleteAndEdit('posts', blogList);
    attachNavClicks();
  }

  async function blogForm(id = null) {
    let post = { title:'', slug:'', excerpt:'', content:'', cover_image:'', category:'', tags:[], status:'draft', featured:false };
    if (id) {
      let { data } = await supabase.from('posts').select('*').eq('id',id).single();
      if (data) post = data;
      setActive('blog');
    } else setActive('blog_new');
    contentDiv.innerHTML = `
      <form id="itemForm">
        <div class="form-group"><label>Title</label><input id="title" value="${escape(post.title)}" required></div>
        <div class="form-group"><label>Slug</label><input id="slug" value="${post.slug}"></div>
        <div class="form-group"><label>Excerpt</label><textarea id="excerpt">${escape(post.excerpt)}</textarea></div>
        <div class="form-group"><label>Content (HTML)</label><textarea id="content" rows="8">${escape(post.content)}</textarea></div>
        <div class="form-group"><label>Cover image URL</label><input id="cover_image" value="${post.cover_image||''}"></div>
        <div class="form-group"><label>Category</label><input id="category" value="${post.category||''}"></div>
        <div class="form-group"><label>Tags (comma)</label><input id="tags" value="${(post.tags||[]).join(',')}"></div>
        <div class="form-group"><label>Status</label><select id="status"><option value="draft" ${post.status==='draft'?'selected':''}>Draft</option><option value="published" ${post.status==='published'?'selected':''}>Published</option></select></div>
        <div class="form-group"><label><input type="checkbox" id="featured" ${post.featured?'checked':''}> Featured</label></div>
        <button type="submit" class="btn btn-primary">Save</button> <button type="button" data-view="blog" class="btn">Cancel</button>
      </form>
    `;
    document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        title: document.getElementById('title').value,
        slug: document.getElementById('slug').value || slugify(document.getElementById('title').value),
        excerpt: document.getElementById('excerpt').value,
        content: document.getElementById('content').value,
        cover_image: document.getElementById('cover_image').value,
        category: document.getElementById('category').value,
        tags: document.getElementById('tags').value.split(',').map(s=>s.trim()).filter(Boolean),
        status: document.getElementById('status').value,
        featured: document.getElementById('featured').checked
      };
      if (id) await supabase.from('posts').update(data).eq('id',id);
      else await supabase.from('posts').insert(data);
      blogList();
    });
    attachNavClicks();
  }

  // ---------------------- GALLERY (upload file) ----------------------
  async function galleryList() {
    setActive('gallery');
    let { data } = await supabase.from('gallery').select('*').order('created_at',{ascending:false});
    if (!data?.length) {
      contentDiv.innerHTML = `<p>No photos. <button data-view="gallery_upload" class="btn btn-primary">Upload</button></p>`;
      attachNavClicks();
      return;
    }
    contentDiv.innerHTML = `
      <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:1rem;">
        ${data.map(p => `<div style="border:1px solid #242428; border-radius:8px; padding:0.5rem; text-align:center"><img src="${p.image_url}" style="width:100%; height:100px; object-fit:cover; border-radius:4px;"><div style="font-size:0.7rem">${escape(p.caption||'')}</div><button data-delete="${p.id}" class="btn btn-danger">Delete</button></div>`).join('')}
      </div>
      <div style="margin-top:1rem"><button data-view="gallery_upload" class="btn btn-primary">+ Upload</button></div>
    `;
    attachDeleteOnly('gallery', galleryList);
    attachNavClicks();
  }

  async function galleryUpload() {
    setActive('gallery_upload');
    contentDiv.innerHTML = `
      <form id="uploadForm">
        <div class="form-group"><label>Image file</label><input type="file" id="file" accept="image/*" required></div>
        <div class="form-group"><label>Caption</label><input id="caption"></div>
        <div class="form-group"><label>Album ID (optional)</label><input id="album_id"></div>
        <button type="submit" class="btn btn-primary">Upload</button> <button type="button" data-view="gallery" class="btn">Cancel</button>
      </form>
    `;
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = document.getElementById('file').files[0];
      if (!file) return;
      const ext = file.name.split('.').pop();
      const fileName = `${Date.now()}.${ext}`;
      const { error } = await supabase.storage.from('gallery').upload(fileName, file);
      if (error) { alert(error.message); return; }
      const { data: { publicUrl } } = supabase.storage.from('gallery').getPublicUrl(fileName);
      await supabase.from('gallery').insert({ image_url: publicUrl, caption: document.getElementById('caption').value, album_id: document.getElementById('album_id').value || null });
      galleryList();
    });
    attachNavClicks();
  }

  // ---------------------- GENERIC CRUD (Football, F1, Watchlist, Thoughts) ----------------------
  async function genericList(table, label, idField = 'id') {
    setActive(table);
    let { data } = await supabase.from(table).select('*').order('created_at',{ascending:false});
    if (!data?.length) {
      contentDiv.innerHTML = `<p>No ${label}. <button data-view="${table}_new" class="btn btn-primary">Add</button></p>`;
      attachNavClicks();
      return;
    }
    const firstKey = Object.keys(data[0]).find(k => k !== idField && typeof data[0][k] !== 'object');
    contentDiv.innerHTML = `
      <table><thead><tr><th>${firstKey}</th><th>Actions</th></tr></thead><tbody>
        ${data.map(item => `<tr><td>${escape(item[firstKey]?.toString())}</td><td><button data-edit="${item[idField]}" class="btn">Edit</button> <button data-delete="${item[idField]}" class="btn btn-danger">Delete</button></td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:1rem"><button data-view="${table}_new" class="btn btn-primary">+ Add ${label}</button></div>
    `;
    // attach edit/delete
    document.querySelectorAll('[data-edit]').forEach(btn => {
      btn.onclick = () => genericForm(table, label, btn.dataset.edit);
    });
    document.querySelectorAll('[data-delete]').forEach(btn => {
      btn.onclick = async () => { if(confirm('Delete?')){ await supabase.from(table).delete().eq(idField, btn.dataset.delete); genericList(table, label, idField); } };
    });
    attachNavClicks();
  }

  async function genericForm(table, label, id = null) {
    let item = {};
    if (id) {
      let { data } = await supabase.from(table).select('*').eq('id',id).single();
      if (data) item = data;
      setActive(table);
    } else setActive(`${table}_new`);
    // build form dynamically from first item's keys (except id, created_at, updated_at)
    const exclude = ['id','created_at','updated_at'];
    const fields = Object.keys(item).filter(k => !exclude.includes(k));
    if (fields.length === 0) {
      contentDiv.innerHTML = `<p>Cannot edit, no fields.</p><button data-view="${table}" class="btn">Back</button>`;
      attachNavClicks();
      return;
    }
    contentDiv.innerHTML = `
      <form id="genericForm">
        ${fields.map(f => `<div class="form-group"><label>${f}</label><input type="text" id="${f}" value="${escape(item[f]?.toString()??'')}"></div>`).join('')}
        <button type="submit" class="btn btn-primary">Save</button> <button type="button" data-view="${table}" class="btn">Cancel</button>
      </form>
    `;
    document.getElementById('genericForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      let data = {};
      for (let f of fields) data[f] = document.getElementById(f).value;
      if (id) await supabase.from(table).update(data).eq('id',id);
      else await supabase.from(table).insert(data);
      genericList(table, label);
    });
    attachNavClicks();
  }

  // Helper: delete for table with refresh
  function attachDeleteAndEdit(table, refreshFn) {
    document.querySelectorAll('[data-edit]').forEach(btn => {
      btn.onclick = () => { if(table==='posts') blogForm(btn.dataset.edit); };
    });
    document.querySelectorAll('[data-delete]').forEach(btn => {
      btn.onclick = async () => { if(confirm('Delete?')){ await supabase.from(table).delete().eq('id', btn.dataset.delete); refreshFn(); } };
    });
  }
  function attachDeleteOnly(table, refreshFn) {
    document.querySelectorAll('[data-delete]').forEach(btn => {
      btn.onclick = async () => { if(confirm('Delete?')){ await supabase.from(table).delete().eq('id', btn.dataset.delete); refreshFn(); } };
    });
  }

  // Navigation handler
  function attachNavClicks() {
    document.querySelectorAll('[data-view]').forEach(el => {
      el.onclick = () => {
        const v = el.dataset.view;
        if (v === 'dashboard') dashboard();
        else if (v === 'blog') blogList();
        else if (v === 'blog_new') blogForm();
        else if (v === 'gallery') galleryList();
        else if (v === 'gallery_upload') galleryUpload();
        else if (v === 'football') genericList('football_clubs','Club');
        else if (v === 'football_new') genericForm('football_clubs','Club');
        else if (v === 'f1') genericList('f1_drivers','Driver');
        else if (v === 'f1_new') genericForm('f1_drivers','Driver');
        else if (v === 'watchlist') genericList('watchlist','Item');
        else if (v === 'watchlist_new') genericForm('watchlist','Item');
        else if (v === 'thoughts') genericList('thoughts','Thought');
        else if (v === 'thoughts_new') genericForm('thoughts','Thought');
      };
    });
  }

  // Slugify
  function slugify(str) { return str.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_-]+/g, '-').replace(/^-+|-+$/g, ''); }

  // Start
  await dashboard();
  attachNavClicks();

  // Logout
  document.getElementById('logout-btn').onclick = async () => { await supabase.auth.signOut(); location.href = '/studio/login'; };
</script>
</body>
</html>
