<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio — Digital Home</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem; position: fixed; height: 100vh; overflow-y: auto; }
    .admin-main { flex: 1; margin-left: 260px; padding: 1.5rem; }
    .admin-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .admin-nav-group { margin-bottom: 1.5rem; }
    .admin-nav-group-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 0.5rem; }
    .admin-nav-link { display: block; padding: 0.5rem 0.75rem; border-radius: var(--radius); color: var(--text-2); transition: all 0.2s; margin-bottom: 0.25rem; cursor: pointer; }
    .admin-nav-link:hover, .admin-nav-link.active { background: var(--surface-2); color: var(--text); }
    .admin-content { max-width: 1200px; margin: 0 auto; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.85rem; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.6rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); }
    .btn { padding: 0.5rem 1rem; border-radius: var(--radius); background: var(--surface-2); border: 1px solid var(--border); cursor: pointer; display: inline-block; text-decoration: none; color: var(--text); }
    .btn-primary { background: var(--gold); color: #000; border: none; }
    .btn-danger { background: rgba(224,82,82,0.2); color: var(--red); border-color: var(--red); }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    .stat-card { background: var(--surface-2); padding: 1rem; border-radius: var(--radius); text-align: center; }
    .stat-val { font-size: 2rem; font-weight: bold; color: var(--gold); }
    .image-preview { max-width: 100px; max-height: 100px; object-fit: cover; border-radius: var(--radius); }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { margin-left: 0; } }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div style="margin-bottom: 2rem; font-size: 1.4rem; font-family: var(--font-display);">Digital<span style="color:var(--gold)">.</span></div>
    <div class="admin-nav-group"><div class="admin-nav-group-label">Main</div><a data-view="dashboard" class="admin-nav-link">Dashboard</a></div>
    <div class="admin-nav-group"><div class="admin-nav-group-label">Blog</div><a data-view="blog" class="admin-nav-link">Posts</a><a data-view="blog_new" class="admin-nav-link">+ New post</a></div>
    <div class="admin-nav-group"><div class="admin-nav-group-label">Gallery</div><a data-view="gallery" class="admin-nav-link">Photos</a><a data-view="gallery_upload" class="admin-nav-link">+ Upload photo</a></div>
    <div class="admin-nav-group"><div class="admin-nav-group-label">Football</div><a data-view="football" class="admin-nav-link">Clubs</a><a data-view="football_new" class="admin-nav-link">+ New club</a></div>
    <div class="admin-nav-group"><div class="admin-nav-group-label">F1</div><a data-view="f1" class="admin-nav-link">Drivers</a><a data-view="f1_new" class="admin-nav-link">+ New driver</a></div>
    <div class="admin-nav-group"><div class="admin-nav-group-label">Watchlist</div><a data-view="watchlist" class="admin-nav-link">Items</a><a data-view="watchlist_new" class="admin-nav-link">+ Add item</a></div>
    <div class="admin-nav-group"><div class="admin-nav-group-label">Thoughts</div><a data-view="thoughts" class="admin-nav-link">List</a><a data-view="thoughts_new" class="admin-nav-link">+ New thought</a></div>
    <div class="admin-nav-group"><a href="#" id="logout-btn" class="admin-nav-link">Sign out</a></div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar"><h2 id="page-title">Dashboard</h2><span id="admin-email"></span></div>
    <div id="admin-content"></div>
  </main>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';
  import { formatDateShort, emptyState } from '/js/supabase.js';

  // Auth check
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/studio/login'; }
  document.getElementById('admin-email').innerText = session.user.email;

  const contentDiv = document.getElementById('admin-content');
  const pageTitle = document.getElementById('page-title');

  function setActive(view) {
    document.querySelectorAll('.admin-nav-link').forEach(link => link.classList.remove('active'));
    document.querySelectorAll(`[data-view="${view}"]`).forEach(link => link.classList.add('active'));
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ---------------------- Dashboard ----------------------
  async function dashboard() {
    pageTitle.innerText = 'Dashboard';
    setActive('dashboard');
    const tables = ['posts', 'gallery', 'football_clubs', 'f1_drivers', 'watchlist', 'thoughts'];
    let stats = {};
    for (let t of tables) {
      let { count } = await supabase.from(t).select('*', { count: 'exact', head: true });
      stats[t] = count ?? 0;
    }
    contentDiv.innerHTML = `
      <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:1rem; margin-bottom:2rem;">
        <div class="stat-card"><div class="stat-val">${stats.posts}</div><div>Posts</div></div>
        <div class="stat-card"><div class="stat-val">${stats.gallery}</div><div>Photos</div></div>
        <div class="stat-card"><div class="stat-val">${stats.football_clubs}</div><div>Clubs</div></div>
        <div class="stat-card"><div class="stat-val">${stats.f1_drivers}</div><div>F1 Drivers</div></div>
        <div class="stat-card"><div class="stat-val">${stats.watchlist}</div><div>Watchlist</div></div>
        <div class="stat-card"><div class="stat-val">${stats.thoughts}</div><div>Thoughts</div></div>
      </div>
    `;
  }

  // ---------------------- Blog CRUD ----------------------
  async function blogList() {
    pageTitle.innerText = 'Blog Posts';
    setActive('blog');
    let { data } = await supabase.from('posts').select('id,title,status,created_at').order('created_at', { ascending: false });
    if (!data?.length) { contentDiv.innerHTML = '<p>No posts. <a data-view="blog_new" class="btn btn-primary" style="cursor:pointer">Create new post</a></p>'; attachNav(); return; }
    contentDiv.innerHTML = `
      <table><thead><tr><th>Title</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>
        ${data.map(p => `<tr><td>${escapeHtml(p.title)}</td><td>${p.status}</td><td>${formatDateShort(p.created_at)}</td><td><a data-view="blog_edit" data-id="${p.id}" style="cursor:pointer">Edit</a> | <button class="delete-blog" data-id="${p.id}">Delete</button></td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:1rem"><a data-view="blog_new" class="btn btn-primary" style="cursor:pointer">+ New Post</a></div>
    `;
    attachDelete('delete-blog', 'posts', blogList);
    attachNav();
  }

  async function blogForm(id = null) {
    let post = { title: '', slug: '', excerpt: '', content: '', cover_image: '', category: '', tags: [], status: 'draft', featured: false };
    if (id) {
      let { data } = await supabase.from('posts').select('*').eq('id', id).single();
      if (data) post = data;
      pageTitle.innerText = 'Edit Post';
      setActive('blog');
    } else { pageTitle.innerText = 'New Post'; setActive('blog_new'); }
    contentDiv.innerHTML = `
      <form id="post-form">
        <div class="form-group"><label>Title</label><input type="text" id="title" value="${escapeHtml(post.title)}" required></div>
        <div class="form-group"><label>Slug</label><input type="text" id="slug" value="${post.slug}"></div>
        <div class="form-group"><label>Excerpt</label><textarea id="excerpt">${escapeHtml(post.excerpt || '')}</textarea></div>
        <div class="form-group"><label>Content (HTML)</label><textarea id="content" rows="10">${escapeHtml(post.content || '')}</textarea></div>
        <div class="form-group"><label>Cover image URL</label><input type="text" id="cover_image" value="${post.cover_image || ''}"></div>
        <div class="form-group"><label>Category</label><input type="text" id="category" value="${post.category || ''}"></div>
        <div class="form-group"><label>Tags (comma)</label><input type="text" id="tags" value="${(post.tags || []).join(',')}"></div>
        <div class="form-group"><label>Status</label><select id="status"><option value="draft" ${post.status==='draft'?'selected':''}>Draft</option><option value="published" ${post.status==='published'?'selected':''}>Published</option></select></div>
        <div class="form-group"><label><input type="checkbox" id="featured" ${post.featured?'checked':''}> Featured</label></div>
        <button type="submit" class="btn btn-primary">Save</button> <a data-view="blog" class="btn" style="cursor:pointer">Cancel</a>
      </form>
    `;
    document.getElementById('title').addEventListener('input', () => {
      let slugField = document.getElementById('slug');
      if (!slugField.value || slugField.value === slugify(document.getElementById('title').value)) {
        slugField.value = slugify(document.getElementById('title').value);
      }
    });
    document.getElementById('post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      let newPost = {
        title: document.getElementById('title').value,
        slug: document.getElementById('slug').value || slugify(document.getElementById('title').value),
        excerpt: document.getElementById('excerpt').value,
        content: document.getElementById('content').value,
        cover_image: document.getElementById('cover_image').value,
        category: document.getElementById('category').value,
        tags: document.getElementById('tags').value.split(',').map(s=>s.trim()).filter(Boolean),
        status: document.getElementById('status').value,
        featured: document.getElementById('featured').checked
      };
      if (id) await supabase.from('posts').update(newPost).eq('id', id);
      else await supabase.from('posts').insert(newPost);
      blogList();
    });
    attachNav();
  }

  // ---------------------- Gallery CRUD (with storage) ----------------------
  async function galleryList() {
    pageTitle.innerText = 'Gallery';
    setActive('gallery');
    let { data } = await supabase.from('gallery').select('*').order('created_at', { ascending: false });
    if (!data?.length) { contentDiv.innerHTML = '<p>No photos. <a data-view="gallery_upload" style="cursor:pointer" class="btn btn-primary">Upload first photo</a></p>'; attachNav(); return; }
    contentDiv.innerHTML = `
      <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:1rem;">
        ${data.map(p => `
          <div style="border:1px solid var(--border); border-radius:8px; padding:0.5rem; text-align:center">
            <img src="${p.image_url}" class="image-preview" style="width:100%; height:120px; object-fit:cover; border-radius:4px;">
            <p style="font-size:0.7rem">${escapeHtml(p.caption || '')}</p>
            <button class="delete-gallery" data-id="${p.id}" style="background:none; border:1px solid var(--red); color:var(--red); border-radius:4px; padding:0.2rem 0.5rem; margin-top:0.5rem; cursor:pointer">Delete</button>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:1rem"><a data-view="gallery_upload" class="btn btn-primary" style="cursor:pointer">+ Upload Photo</a></div>
    `;
    attachDelete('delete-gallery', 'gallery', galleryList);
    attachNav();
  }

  async function galleryUpload() {
    pageTitle.innerText = 'Upload Photo';
    setActive('gallery_upload');
    contentDiv.innerHTML = `
      <form id="upload-form">
        <div class="form-group"><label>Photo</label><input type="file" id="file" accept="image/*" required></div>
        <div class="form-group"><label>Caption</label><input type="text" id="caption"></div>
        <div class="form-group"><label>Album ID (optional)</label><input type="text" id="album_id"></div>
        <button type="submit" class="btn btn-primary">Upload</button> <a data-view="gallery" class="btn" style="cursor:pointer">Cancel</a>
      </form>
    `;
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      let file = document.getElementById('file').files[0];
      if (!file) return;
      let fileExt = file.name.split('.').pop();
      let fileName = `${Date.now()}.${fileExt}`;
      let { data, error } = await supabase.storage.from('gallery').upload(fileName, file);
      if (error) { alert('Upload error: '+error.message); return; }
      let { data: { publicUrl } } = supabase.storage.from('gallery').getPublicUrl(fileName);
      await supabase.from('gallery').insert({
        image_url: publicUrl,
        caption: document.getElementById('caption').value,
        album_id: document.getElementById('album_id').value || null
      });
      galleryList();
    });
    attachNav();
  }

  // ---------------------- Football Clubs ----------------------
  async function footballList() {
    pageTitle.innerText = 'Football Clubs';
    setActive('football');
    let { data } = await supabase.from('football_clubs').select('*').order('sort_order');
    if (!data?.length) { contentDiv.innerHTML = '<p>No clubs. <a data-view="football_new" class="btn btn-primary" style="cursor:pointer">Add club</a></p>'; attachNav(); return; }
    contentDiv.innerHTML = `
      <table><thead><tr><th>Logo</th><th>Name</th><th>League</th><th>Titles</th><th>Actions</th></tr></thead><tbody>
        ${data.map(c => `<tr><td><img src="${c.logo_url || '/img/placeholder.svg'}" style="width:40px;height:40px;object-fit:contain;"></td><td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.league||'')}</td><td>${c.league_titles ?? '—'}</td><td><a data-view="football_edit" data-id="${c.id}" style="cursor:pointer">Edit</a> | <button class="delete-football" data-id="${c.id}">Delete</button></td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:1rem"><a data-view="football_new" class="btn btn-primary" style="cursor:pointer">+ New Club</a></div>
    `;
    attachDelete('delete-football', 'football_clubs', footballList);
    attachNav();
  }

  async function footballForm(id=null) {
    let club = { name:'', league:'', league_titles:'', domestic_cups:'', continental:'', logo_url:'', notes:'', sort_order:0 };
    if(id) { let {data}=await supabase.from('football_clubs').select('*').eq('id',id).single(); if(data) club=data; pageTitle.innerText='Edit Club'; setActive('football'); }
    else { pageTitle.innerText='New Club'; setActive('football_new'); }
    contentDiv.innerHTML = `
      <form id="club-form">
        <div class="form-group"><label>Name</label><input id="name" value="${escapeHtml(club.name)}" required></div>
        <div class="form-group"><label>League</label><input id="league" value="${escapeHtml(club.league||'')}"></div>
        <div class="form-group"><label>League titles</label><input id="league_titles" type="number" value="${club.league_titles??''}"></div>
        <div class="form-group"><label>Domestic cups</label><input id="domestic_cups" type="number" value="${club.domestic_cups??''}"></div>
        <div class="form-group"><label>Continental trophies</label><input id="continental" type="number" value="${club.continental??''}"></div>
        <div class="form-group"><label>Logo URL</label><input id="logo_url" value="${club.logo_url||''}"></div>
        <div class="form-group"><label>Notes</label><textarea id="notes">${escapeHtml(club.notes||'')}</textarea></div>
        <div class="form-group"><label>Sort order</label><input id="sort_order" type="number" value="${club.sort_order??0}"></div>
        <button type="submit" class="btn btn-primary">Save</button> <a data-view="football" class="btn" style="cursor:pointer">Cancel</a>
      </form>
    `;
    document.getElementById('club-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      let data = {
        name: document.getElementById('name').value,
        league: document.getElementById('league').value,
        league_titles: parseInt(document.getElementById('league_titles').value) || 0,
        domestic_cups: parseInt(document.getElementById('domestic_cups').value) || 0,
        continental: parseInt(document.getElementById('continental').value) || 0,
        logo_url: document.getElementById('logo_url').value,
        notes: document.getElementById('notes').value,
        sort_order: parseInt(document.getElementById('sort_order').value) || 0
      };
      if(id) await supabase.from('football_clubs').update(data).eq('id',id);
      else await supabase.from('football_clubs').insert(data);
      footballList();
    });
    attachNav();
  }

  // ---------------------- F1 Drivers ----------------------
  async function f1List() {
    pageTitle.innerText = 'F1 Drivers';
    setActive('f1');
    let { data } = await supabase.from('f1_drivers').select('*').order('sort_order');
    if (!data?.length) { contentDiv.innerHTML = '<p>No drivers. <a data-view="f1_new" class="btn btn-primary" style="cursor:pointer">Add driver</a></p>'; attachNav(); return; }
    contentDiv.innerHTML = `
      <table><thead><tr><th>Name</th><th>Team</th><th>Nationality</th><th>Wins</th><th>Actions</th></tr></thead><tbody>
        ${data.map(d => `<tr><td>${escapeHtml(d.name)}</td><td>${escapeHtml(d.team||'')}</td><td>${escapeHtml(d.nationality||'')}</td><td>${d.wins??'—'}</td><td><a data-view="f1_edit" data-id="${d.id}" style="cursor:pointer">Edit</a> | <button class="delete-f1" data-id="${d.id}">Delete</button></td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:1rem"><a data-view="f1_new" class="btn btn-primary" style="cursor:pointer">+ New Driver</a></div>
    `;
    attachDelete('delete-f1', 'f1_drivers', f1List);
    attachNav();
  }

  async function f1Form(id=null) {
    let driver = { name:'', number:'', team:'', nationality:'', championships:'', wins:'', poles:'', image_url:'', team_color:'', sort_order:0 };
    if(id) { let {data}=await supabase.from('f1_drivers').select('*').eq('id',id).single(); if(data) driver=data; pageTitle.innerText='Edit Driver'; setActive('f1'); }
    else { pageTitle.innerText='New Driver'; setActive('f1_new'); }
    contentDiv.innerHTML = `
      <form id="driver-form">
        <div class="form-group"><label>Name</label><input id="name" value="${escapeHtml(driver.name)}" required></div>
        <div class="form-group"><label>Number</label><input id="number" value="${driver.number??''}"></div>
        <div class="form-group"><label>Team</label><input id="team" value="${escapeHtml(driver.team||'')}"></div>
        <div class="form-group"><label>Nationality</label><input id="nationality" value="${escapeHtml(driver.nationality||'')}"></div>
        <div class="form-group"><label>Championships</label><input id="championships" type="number" value="${driver.championships??''}"></div>
        <div class="form-group"><label>Wins</label><input id="wins" type="number" value="${driver.wins??''}"></div>
        <div class="form-group"><label>Poles</label><input id="poles" type="number" value="${driver.poles??''}"></div>
        <div class="form-group"><label>Image URL</label><input id="image_url" value="${driver.image_url||''}"></div>
        <div class="form-group"><label>Team color (hex)</label><input id="team_color" value="${driver.team_color||''}"></div>
        <div class="form-group"><label>Sort order</label><input id="sort_order" type="number" value="${driver.sort_order??0}"></div>
        <button type="submit" class="btn btn-primary">Save</button> <a data-view="f1" class="btn" style="cursor:pointer">Cancel</a>
      </form>
    `;
    document.getElementById('driver-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      let data = {
        name: document.getElementById('name').value,
        number: parseInt(document.getElementById('number').value) || null,
        team: document.getElementById('team').value,
        nationality: document.getElementById('nationality').value,
        championships: parseInt(document.getElementById('championships').value) || 0,
        wins: parseInt(document.getElementById('wins').value) || 0,
        poles: parseInt(document.getElementById('poles').value) || 0,
        image_url: document.getElementById('image_url').value,
        team_color: document.getElementById('team_color').value,
        sort_order: parseInt(document.getElementById('sort_order').value) || 0
      };
      if(id) await supabase.from('f1_drivers').update(data).eq('id',id);
      else await supabase.from('f1_drivers').insert(data);
      f1List();
    });
    attachNav();
  }

  // ---------------------- Watchlist ----------------------
  async function watchlistList() {
    pageTitle.innerText = 'Watchlist';
    setActive('watchlist');
    let { data } = await supabase.from('watchlist').select('*').order('created_at', { ascending: false });
    if (!data?.length) { contentDiv.innerHTML = '<p>No items. <a data-view="watchlist_new" class="btn btn-primary" style="cursor:pointer">Add item</a></p>'; attachNav(); return; }
    contentDiv.innerHTML = `
      <table><thead><tr><th>Title</th><th>Type</th><th>Status</th><th>Rating</th><th>Actions</th></tr></thead><tbody>
        ${data.map(w => `<tr><td>${escapeHtml(w.title)}</td><td>${w.type||''}</td><td>${w.status||''}</td><td>${w.rating??''}</td><td><a data-view="watchlist_edit" data-id="${w.id}" style="cursor:pointer">Edit</a> | <button class="delete-watchlist" data-id="${w.id}">Delete</button></td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:1rem"><a data-view="watchlist_new" class="btn btn-primary" style="cursor:pointer">+ Add Item</a></div>
    `;
    attachDelete('delete-watchlist', 'watchlist', watchlistList);
    attachNav();
  }

  async function watchlistForm(id=null) {
    let item = { title:'', type:'movie', status:'want_to_watch', year:'', rating:'', notes:'', poster_url:'' };
    if(id) { let {data}=await supabase.from('watchlist').select('*').eq('id',id).single(); if(data) item=data; pageTitle.innerText='Edit Item'; setActive('watchlist'); }
    else { pageTitle.innerText='New Item'; setActive('watchlist_new'); }
    contentDiv.innerHTML = `
      <form id="watchlist-form">
        <div class="form-group"><label>Title</label><input id="title" value="${escapeHtml(item.title)}" required></div>
        <div class="form-group"><label>Type</label><select id="type"><option value="movie" ${item.type==='movie'?'selected':''}>Movie</option><option value="tv" ${item.type==='tv'?'selected':''}>TV Show</option><option value="anime" ${item.type==='anime'?'selected':''}>Anime</option></select></div>
        <div class="form-group"><label>Status</label><select id="status"><option value="want_to_watch" ${item.status==='want_to_watch'?'selected':''}>Want to watch</option><option value="watching" ${item.status==='watching'?'selected':''}>Watching</option><option value="watched" ${item.status==='watched'?'selected':''}>Watched</option></select></div>
        <div class="form-group"><label>Year</label><input id="year" value="${item.year||''}"></div>
        <div class="form-group"><label>Rating (1-10)</label><input id="rating" type="number" min="0" max="10" step="0.1" value="${item.rating??''}"></div>
        <div class="form-group"><label>Notes</label><textarea id="notes">${escapeHtml(item.notes||'')}</textarea></div>
        <div class="form-group"><label>Poster URL</label><input id="poster_url" value="${item.poster_url||''}"></div>
        <button type="submit" class="btn btn-primary">Save</button> <a data-view="watchlist" class="btn" style="cursor:pointer">Cancel</a>
      </form>
    `;
    document.getElementById('watchlist-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      let data = {
        title: document.getElementById('title').value,
        type: document.getElementById('type').value,
        status: document.getElementById('status').value,
        year: document.getElementById('year').value,
        rating: parseFloat(document.getElementById('rating').value) || null,
        notes: document.getElementById('notes').value,
        poster_url: document.getElementById('poster_url').value
      };
      if(id) await supabase.from('watchlist').update(data).eq('id',id);
      else await supabase.from('watchlist').insert(data);
      watchlistList();
    });
    attachNav();
  }

  // ---------------------- Thoughts ----------------------
  async function thoughtsList() {
    pageTitle.innerText = 'Thoughts';
    setActive('thoughts');
    let { data } = await supabase.from('thoughts').select('*').order('created_at', { ascending: false });
    if (!data?.length) { contentDiv.innerHTML = '<p>No thoughts. <a data-view="thoughts_new" class="btn btn-primary" style="cursor:pointer">Add thought</a></p>'; attachNav(); return; }
    contentDiv.innerHTML = `
      <table><thead><tr><th>Content</th><th>Tags</th><th>Date</th><th>Actions</th></tr></thead><tbody>
        ${data.map(t => `<tr><td>${escapeHtml(t.content.substring(0,80))}${t.content.length>80?'…':''}</td><td>${(t.tags||[]).join(', ')}</td><td>${formatDateShort(t.created_at)}</td><td><a data-view="thoughts_edit" data-id="${t.id}" style="cursor:pointer">Edit</a> | <button class="delete-thoughts" data-id="${t.id}">Delete</button></td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:1rem"><a data-view="thoughts_new" class="btn btn-primary" style="cursor:pointer">+ New Thought</a></div>
    `;
    attachDelete('delete-thoughts', 'thoughts', thoughtsList);
    attachNav();
  }

  async function thoughtsForm(id=null) {
    let thought = { content:'', tags:[] };
    if(id) { let {data}=await supabase.from('thoughts').select('*').eq('id',id).single(); if(data) thought=data; pageTitle.innerText='Edit Thought'; setActive('thoughts'); }
    else { pageTitle.innerText='New Thought'; setActive('thoughts_new'); }
    contentDiv.innerHTML = `
      <form id="thoughts-form">
        <div class="form-group"><label>Content</label><textarea id="content" rows="5" required>${escapeHtml(thought.content)}</textarea></div>
        <div class="form-group"><label>Tags (comma separated)</label><input id="tags" value="${(thought.tags||[]).join(', ')}"></div>
        <button type="submit" class="btn btn-primary">Save</button> <a data-view="thoughts" class="btn" style="cursor:pointer">Cancel</a>
      </form>
    `;
    document.getElementById('thoughts-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      let data = {
        content: document.getElementById('content').value,
        tags: document.getElementById('tags').value.split(',').map(s=>s.trim()).filter(Boolean)
      };
      if(id) await supabase.from('thoughts').update(data).eq('id',id);
      else await supabase.from('thoughts').insert(data);
      thoughtsList();
    });
    attachNav();
  }

  // Helper: slugify
  function slugify(text) {
    return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_-]+/g, '-').replace(/^-+|-+$/g, '');
  }

  // Generic delete handler
  function attachDelete(className, table, refreshFn) {
    document.querySelectorAll(`.${className}`).forEach(btn => {
      btn.removeEventListener('click', () => {});
      btn.addEventListener('click', async (e) => {
        if (confirm('Delete?')) {
          await supabase.from(table).delete().eq('id', btn.dataset.id);
          refreshFn();
        }
      });
    });
  }

  // attach navigation to dynamic elements
  function attachNav() {
    document.querySelectorAll('[data-view]').forEach(el => {
      el.removeEventListener('click', () => {});
      el.addEventListener('click', () => {
        let view = el.dataset.view;
        let id = el.dataset.id;
        if (view === 'blog') blogList();
        else if (view === 'blog_new') blogForm();
        else if (view === 'blog_edit') blogForm(id);
        else if (view === 'gallery') galleryList();
        else if (view === 'gallery_upload') galleryUpload();
        else if (view === 'football') footballList();
        else if (view === 'football_new') footballForm();
        else if (view === 'football_edit') footballForm(id);
        else if (view === 'f1') f1List();
        else if (view === 'f1_new') f1Form();
        else if (view === 'f1_edit') f1Form(id);
        else if (view === 'watchlist') watchlistList();
        else if (view === 'watchlist_new') watchlistForm();
        else if (view === 'watchlist_edit') watchlistForm(id);
        else if (view === 'thoughts') thoughtsList();
        else if (view === 'thoughts_new') thoughtsForm();
        else if (view === 'thoughts_edit') thoughtsForm(id);
        else if (view === 'dashboard') dashboard();
      });
    });
  }

  // initial route based on path?
  const path = window.location.pathname;
  if (path === '/studio' || path === '/studio/') dashboard();
  else if (path === '/studio/blog') blogList();
  else if (path === '/studio/blog/new') blogForm();
  else if (path.startsWith('/studio/blog/edit/')) blogForm(path.split('/').pop());
  else if (path === '/studio/gallery') galleryList();
  else if (path === '/studio/gallery/upload') galleryUpload();
  else if (path === '/studio/football') footballList();
  else if (path === '/studio/football/new') footballForm();
  else if (path.startsWith('/studio/football/edit/')) footballForm(path.split('/').pop());
  else if (path === '/studio/f1') f1List();
  else if (path === '/studio/f1/new') f1Form();
  else if (path.startsWith('/studio/f1/edit/')) f1Form(path.split('/').pop());
  else if (path === '/studio/watchlist') watchlistList();
  else if (path === '/studio/watchlist/new') watchlistForm();
  else if (path.startsWith('/studio/watchlist/edit/')) watchlistForm(path.split('/').pop());
  else if (path === '/studio/thoughts') thoughtsList();
  else if (path === '/studio/thoughts/new') thoughtsForm();
  else if (path.startsWith('/studio/thoughts/edit/')) thoughtsForm(path.split('/').pop());
  else dashboard();

  // Logout
  document.getElementById('logout-btn').addEventListener('click', async (e) => {
    e.preventDefault();
    await supabase.auth.signOut();
    window.location.href = '/studio/login';
  });
</script>
</body>
</html>
