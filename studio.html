<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio — Digital Home</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 1rem; }
    .admin-container { max-width: 1000px; margin: 0 auto; }
    .sidebar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
    .sidebar a { background: var(--surface); padding: 0.5rem 1rem; border-radius: 20px; text-decoration: none; color: var(--text-2); cursor: pointer; }
    .sidebar a.active { background: var(--gold); color: #000; }
    .content { background: var(--surface); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 0.5rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
    button { background: var(--gold); color: #000; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid var(--border); }
    .btn-small { padding: 0.2rem 0.5rem; font-size: 0.8rem; margin-right: 0.5rem; }
  </style>
</head>
<body>
<div class="admin-container">
  <h1>Studio</h1>
  <div class="sidebar" id="sidebar">
    <a data-section="dashboard">Dashboard</a>
    <a data-section="blog">Blog</a>
    <a data-section="gallery">Gallery</a>
    <a data-section="football">Football</a>
    <a data-section="f1">F1 Drivers</a>
    <a data-section="watchlist">Watchlist</a>
    <a data-section="thoughts">Thoughts</a>
    <a href="#" id="logout">Sign out</a>
  </div>
  <div class="content" id="content">Loading...</div>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';
  import { formatDateShort } from '/js/supabase.js';

  // Auth check
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) location.href = '/studio/login';

  let currentSection = 'dashboard';

  // Helper
  function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) || ''; }

  async function loadSection(section) {
    currentSection = section;
    document.querySelectorAll('.sidebar a[data-section]').forEach(a => a.classList.remove('active'));
    document.querySelector(`.sidebar a[data-section="${section}"]`)?.classList.add('active');
    if (section === 'dashboard') await renderDashboard();
    else if (section === 'blog') await renderBlog();
    else if (section === 'gallery') await renderGallery();
    else if (section === 'football') await renderFootball();
    else if (section === 'f1') await renderF1();
    else if (section === 'watchlist') await renderWatchlist();
    else if (section === 'thoughts') await renderThoughts();
  }

  // DASHBOARD
  async function renderDashboard() {
    const tables = ['posts','gallery','football_clubs','f1_drivers','watchlist','thoughts'];
    let stats = {};
    for (let t of tables) {
      let { count } = await supabase.from(t).select('*', { count: 'exact', head: true });
      stats[t] = count ?? 0;
    }
    document.getElementById('content').innerHTML = `
      <h2>Dashboard</h2>
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem;">
        <div>📝 Posts: ${stats.posts}</div>
        <div>🖼️ Gallery: ${stats.gallery}</div>
        <div>⚽ Clubs: ${stats.football_clubs}</div>
        <div>🏎️ F1: ${stats.f1_drivers}</div>
        <div>🎬 Watchlist: ${stats.watchlist}</div>
        <div>💭 Thoughts: ${stats.thoughts}</div>
      </div>
    `;
  }

  // BLOG CRUD
  async function renderBlog() {
    let { data } = await supabase.from('posts').select('*').order('created_at', {ascending:false});
    document.getElementById('content').innerHTML = `
      <h2>Blog Posts</h2>
      <button id="newPostBtn">+ New Post</button>
      <table><thead><tr><th>Title</th><th>Status</th><th>Actions</th></tr></thead><tbody id="blogList"></tbody></table>
      <div id="blogForm" style="display:none; margin-top:2rem; border-top:1px solid #ccc; padding-top:1rem;">
        <h3 id="formTitle">New Post</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>Title</label><input id="title"></div>
        <div class="form-group"><label>Slug</label><input id="slug"></div>
        <div class="form-group"><label>Excerpt</label><textarea id="excerpt" rows="2"></textarea></div>
        <div class="form-group"><label>Content (HTML)</label><textarea id="contentBody" rows="6"></textarea></div>
        <div class="form-group"><label>Cover URL</label><input id="cover_image"></div>
        <div class="form-group"><label>Category</label><input id="category"></div>
        <div class="form-group"><label>Tags (comma)</label><input id="tags"></div>
        <div class="form-group"><label>Status</label><select id="status"><option>draft</option><option>published</option></select></div>
        <div class="form-group"><label><input type="checkbox" id="featured"> Featured</label></div>
        <button id="savePostBtn">Save</button> <button id="cancelFormBtn">Cancel</button>
      </div>
    `;
    const tbody = document.getElementById('blogList');
    tbody.innerHTML = (data||[]).map(p => `
      <tr><td>${escapeHtml(p.title)}</td><td>${p.status}</td><td><button class="editPost" data-id="${p.id}">Edit</button> <button class="deletePost" data-id="${p.id}">Delete</button></td></tr>
    `).join('');
    document.querySelectorAll('.deletePost').forEach(btn => btn.onclick = async () => { if(confirm('Delete?')) { await supabase.from('posts').delete().eq('id', btn.dataset.id); renderBlog(); } });
    document.querySelectorAll('.editPost').forEach(btn => btn.onclick = async () => { const {data} = await supabase.from('posts').select('*').eq('id',btn.dataset.id).single(); if(data) showPostForm(data); });
    document.getElementById('newPostBtn').onclick = () => showPostForm(null);
    document.getElementById('cancelFormBtn').onclick = () => { document.getElementById('blogForm').style.display='none'; };
    document.getElementById('savePostBtn').onclick = async () => {
      const id = document.getElementById('editId').value;
      const post = {
        title: document.getElementById('title').value,
        slug: document.getElementById('slug').value || document.getElementById('title').value.toLowerCase().replace(/[^a-z0-9]+/g,'-'),
        excerpt: document.getElementById('excerpt').value,
        content: document.getElementById('contentBody').value,
        cover_image: document.getElementById('cover_image').value,
        category: document.getElementById('category').value,
        tags: document.getElementById('tags').value.split(',').map(s=>s.trim()),
        status: document.getElementById('status').value,
        featured: document.getElementById('featured').checked
      };
      if (id) await supabase.from('posts').update(post).eq('id', id);
      else await supabase.from('posts').insert(post);
      renderBlog();
    };
    function showPostForm(post) {
      document.getElementById('blogForm').style.display = 'block';
      document.getElementById('formTitle').innerText = post ? 'Edit Post' : 'New Post';
      document.getElementById('editId').value = post?.id || '';
      document.getElementById('title').value = post?.title || '';
      document.getElementById('slug').value = post?.slug || '';
      document.getElementById('excerpt').value = post?.excerpt || '';
      document.getElementById('contentBody').value = post?.content || '';
      document.getElementById('cover_image').value = post?.cover_image || '';
      document.getElementById('category').value = post?.category || '';
      document.getElementById('tags').value = (post?.tags || []).join(', ');
      document.getElementById('status').value = post?.status || 'draft';
      document.getElementById('featured').checked = post?.featured || false;
    }
  }

  // GALLERY (upload & list)
  async function renderGallery() {
    let { data } = await supabase.from('gallery').select('*').order('created_at', {ascending:false});
    document.getElementById('content').innerHTML = `
      <h2>Gallery</h2>
      <div><input type="file" id="fileInput" accept="image/*"> <button id="uploadBtn">Upload</button></div>
      <div id="galleryList" style="display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-top:1rem;"></div>
    `;
    const container = document.getElementById('galleryList');
    container.innerHTML = (data||[]).map(p => `
      <div><img src="${p.image_url}" style="width:100%; height:120px; object-fit:cover;"><p>${escapeHtml(p.caption||'')}</p><button class="delGallery" data-id="${p.id}">Delete</button></div>
    `).join('');
    document.querySelectorAll('.delGallery').forEach(btn => btn.onclick = async () => { if(confirm('Delete?')) { await supabase.from('gallery').delete().eq('id', btn.dataset.id); renderGallery(); } });
    document.getElementById('uploadBtn').onclick = async () => {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return;
      const fileName = Date.now()+'_'+file.name;
      const { error } = await supabase.storage.from('gallery').upload(fileName, file);
      if (error) return alert('Upload error');
      const { data: { publicUrl } } = supabase.storage.from('gallery').getPublicUrl(fileName);
      await supabase.from('gallery').insert({ image_url: publicUrl, caption: '' });
      renderGallery();
    };
  }

  // FOOTBALL CLUBS
  async function renderFootball() {
    let { data } = await supabase.from('football_clubs').select('*').order('sort_order');
    document.getElementById('content').innerHTML = `
      <h2>Football Clubs</h2>
      <button id="newClubBtn">+ New Club</button>
      <table><thead><tr><th>Name</th><th>League</th><th>Titles</th><th>Actions</th></tr></thead><tbody id="clubList"></tbody></table>
      <div id="clubForm" style="display:none; margin-top:2rem;"><h3>Club Form</h3><input type="hidden" id="clubId"><div class="form-group"><label>Name</label><input id="clubName"></div><div class="form-group"><label>League</label><input id="clubLeague"></div><div class="form-group"><label>League Titles</label><input id="clubLeagueTitles"></div><div class="form-group"><label>Domestic Cups</label><input id="clubDomestic"></div><div class="form-group"><label>Continental</label><input id="clubContinental"></div><div class="form-group"><label>Logo URL</label><input id="clubLogo"></div><div class="form-group"><label>Notes</label><textarea id="clubNotes"></textarea></div><button id="saveClubBtn">Save</button> <button id="cancelClubBtn">Cancel</button></div>
    `;
    const tbody = document.getElementById('clubList');
    tbody.innerHTML = (data||[]).map(c => `<tr><td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.league||'')}</td><td>${c.league_titles??0}</td><td><button class="editClub" data-id="${c.id}">Edit</button> <button class="delClub" data-id="${c.id}">Delete</button></td></tr>`).join('');
    document.querySelectorAll('.delClub').forEach(btn => btn.onclick = async () => { if(confirm('Delete?')) { await supabase.from('football_clubs').delete().eq('id', btn.dataset.id); renderFootball(); } });
    document.querySelectorAll('.editClub').forEach(btn => btn.onclick = async () => { const {data} = await supabase.from('football_clubs').select('*').eq('id',btn.dataset.id).single(); showClubForm(data); });
    document.getElementById('newClubBtn').onclick = () => showClubForm(null);
    document.getElementById('cancelClubBtn').onclick = () => document.getElementById('clubForm').style.display='none';
    document.getElementById('saveClubBtn').onclick = async () => {
      const id = document.getElementById('clubId').value;
      const club = {
        name: document.getElementById('clubName').value,
        league: document.getElementById('clubLeague').value,
        league_titles: parseInt(document.getElementById('clubLeagueTitles').value)||0,
        domestic_cups: parseInt(document.getElementById('clubDomestic').value)||0,
        continental: parseInt(document.getElementById('clubContinental').value)||0,
        logo_url: document.getElementById('clubLogo').value,
        notes: document.getElementById('clubNotes').value
      };
      if (id) await supabase.from('football_clubs').update(club).eq('id', id);
      else await supabase.from('football_clubs').insert(club);
      renderFootball();
    };
    function showClubForm(c) {
      document.getElementById('clubForm').style.display = 'block';
      document.getElementById('clubId').value = c?.id||'';
      document.getElementById('clubName').value = c?.name||'';
      document.getElementById('clubLeague').value = c?.league||'';
      document.getElementById('clubLeagueTitles').value = c?.league_titles||0;
      document.getElementById('clubDomestic').value = c?.domestic_cups||0;
      document.getElementById('clubContinental').value = c?.continental||0;
      document.getElementById('clubLogo').value = c?.logo_url||'';
      document.getElementById('clubNotes').value = c?.notes||'';
    }
  }

  // F1 DRIVERS (mirip)
  async function renderF1() {
    let { data } = await supabase.from('f1_drivers').select('*').order('sort_order');
    document.getElementById('content').innerHTML = `
      <h2>F1 Drivers</h2><button id="newDriverBtn">+ New Driver</button>
      <table><thead><tr><th>Name</th><th>Team</th><th>Wins</th><th>Actions</th></tr></thead><tbody id="driverList"></tbody></table>
      <div id="driverForm" style="display:none;"><h3>Driver Form</h3><input type="hidden" id="driverId"><div class="form-group"><label>Name</label><input id="driverName"></div><div class="form-group"><label>Number</label><input id="driverNumber"></div><div class="form-group"><label>Team</label><input id="driverTeam"></div><div class="form-group"><label>Nationality</label><input id="driverNation"></div><div class="form-group"><label>Championships</label><input id="driverChamp"></div><div class="form-group"><label>Wins</label><input id="driverWins"></div><div class="form-group"><label>Poles</label><input id="driverPoles"></div><div class="form-group"><label>Image URL</label><input id="driverImage"></div><div class="form-group"><label>Team Color</label><input id="driverColor"></div><button id="saveDriverBtn">Save</button> <button id="cancelDriverBtn">Cancel</button></div>
    `;
    const tbody = document.getElementById('driverList');
    tbody.innerHTML = (data||[]).map(d => `<tr><td>${escapeHtml(d.name)}</td><td>${escapeHtml(d.team||'')}</td><td>${d.wins??0}</td><td><button class="editDriver" data-id="${d.id}">Edit</button> <button class="delDriver" data-id="${d.id}">Delete</button></td></tr>`).join('');
    document.querySelectorAll('.delDriver').forEach(btn => btn.onclick = async () => { if(confirm('Delete?')) { await supabase.from('f1_drivers').delete().eq('id', btn.dataset.id); renderF1(); } });
    document.querySelectorAll('.editDriver').forEach(btn => btn.onclick = async () => { const {data} = await supabase.from('f1_drivers').select('*').eq('id',btn.dataset.id).single(); showDriverForm(data); });
    document.getElementById('newDriverBtn').onclick = () => showDriverForm(null);
    document.getElementById('cancelDriverBtn').onclick = () => document.getElementById('driverForm').style.display='none';
    document.getElementById('saveDriverBtn').onclick = async () => {
      const id = document.getElementById('driverId').value;
      const driver = {
        name: document.getElementById('driverName').value,
        number: parseInt(document.getElementById('driverNumber').value)||null,
        team: document.getElementById('driverTeam').value,
        nationality: document.getElementById('driverNation').value,
        championships: parseInt(document.getElementById('driverChamp').value)||0,
        wins: parseInt(document.getElementById('driverWins').value)||0,
        poles: parseInt(document.getElementById('driverPoles').value)||0,
        image_url: document.getElementById('driverImage').value,
        team_color: document.getElementById('driverColor').value
      };
      if (id) await supabase.from('f1_drivers').update(driver).eq('id', id);
      else await supabase.from('f1_drivers').insert(driver);
      renderF1();
    };
    function showDriverForm(d) {
      document.getElementById('driverForm').style.display = 'block';
      document.getElementById('driverId').value = d?.id||'';
      document.getElementById('driverName').value = d?.name||'';
      document.getElementById('driverNumber').value = d?.number||'';
      document.getElementById('driverTeam').value = d?.team||'';
      document.getElementById('driverNation').value = d?.nationality||'';
      document.getElementById('driverChamp').value = d?.championships||0;
      document.getElementById('driverWins').value = d?.wins||0;
      document.getElementById('driverPoles').value = d?.poles||0;
      document.getElementById('driverImage').value = d?.image_url||'';
      document.getElementById('driverColor').value = d?.team_color||'';
    }
  }

  // WATCHLIST
  async function renderWatchlist() {
    let { data } = await supabase.from('watchlist').select('*').order('created_at', {ascending:false});
    document.getElementById('content').innerHTML = `
      <h2>Watchlist</h2><button id="newWatchBtn">+ Add Item</button>
      <table><thead><tr><th>Title</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody id="watchList"></tbody></table>
      <div id="watchForm" style="display:none;"><h3>Item Form</h3><input type="hidden" id="watchId"><div class="form-group"><label>Title</label><input id="watchTitle"></div><div class="form-group"><label>Type</label><select id="watchType"><option>movie</option><option>tv</option><option>anime</option></select></div><div class="form-group"><label>Status</label><select id="watchStatus"><option>want_to_watch</option><option>watching</option><option>watched</option></select></div><div class="form-group"><label>Year</label><input id="watchYear"></div><div class="form-group"><label>Rating</label><input id="watchRating" type="number" step="0.1"></div><div class="form-group"><label>Notes</label><textarea id="watchNotes"></textarea></div><div class="form-group"><label>Poster URL</label><input id="watchPoster"></div><button id="saveWatchBtn">Save</button> <button id="cancelWatchBtn">Cancel</button></div>
    `;
    const tbody = document.getElementById('watchList');
    tbody.innerHTML = (data||[]).map(w => `<tr><td>${escapeHtml(w.title)}</td><td>${w.type||''}</td><td>${w.status||''}</td><td><button class="editWatch" data-id="${w.id}">Edit</button> <button class="delWatch" data-id="${w.id}">Delete</button></td></tr>`).join('');
    document.querySelectorAll('.delWatch').forEach(btn => btn.onclick = async () => { if(confirm('Delete?')) { await supabase.from('watchlist').delete().eq('id', btn.dataset.id); renderWatchlist(); } });
    document.querySelectorAll('.editWatch').forEach(btn => btn.onclick = async () => { const {data} = await supabase.from('watchlist').select('*').eq('id',btn.dataset.id).single(); showWatchForm(data); });
    document.getElementById('newWatchBtn').onclick = () => showWatchForm(null);
    document.getElementById('cancelWatchBtn').onclick = () => document.getElementById('watchForm').style.display='none';
    document.getElementById('saveWatchBtn').onclick = async () => {
      const id = document.getElementById('watchId').value;
      const item = {
        title: document.getElementById('watchTitle').value,
        type: document.getElementById('watchType').value,
        status: document.getElementById('watchStatus').value,
        year: document.getElementById('watchYear').value,
        rating: parseFloat(document.getElementById('watchRating').value)||null,
        notes: document.getElementById('watchNotes').value,
        poster_url: document.getElementById('watchPoster').value
      };
      if (id) await supabase.from('watchlist').update(item).eq('id', id);
      else await supabase.from('watchlist').insert(item);
      renderWatchlist();
    };
    function showWatchForm(w) {
      document.getElementById('watchForm').style.display = 'block';
      document.getElementById('watchId').value = w?.id||'';
      document.getElementById('watchTitle').value = w?.title||'';
      document.getElementById('watchType').value = w?.type||'movie';
      document.getElementById('watchStatus').value = w?.status||'want_to_watch';
      document.getElementById('watchYear').value = w?.year||'';
      document.getElementById('watchRating').value = w?.rating||'';
      document.getElementById('watchNotes').value = w?.notes||'';
      document.getElementById('watchPoster').value = w?.poster_url||'';
    }
  }

  // THOUGHTS
  async function renderThoughts() {
    let { data } = await supabase.from('thoughts').select('*').order('created_at', {ascending:false});
    document.getElementById('content').innerHTML = `
      <h2>Thoughts</h2><button id="newThoughtBtn">+ New Thought</button>
      <table><thead><tr><th>Content</th><th>Tags</th><th>Date</th><th>Actions</th></tr></thead><tbody id="thoughtList"></tbody></table>
      <div id="thoughtForm" style="display:none;"><h3>Thought Form</h3><input type="hidden" id="thoughtId"><div class="form-group"><label>Content</label><textarea id="thoughtContent" rows="4"></textarea></div><div class="form-group"><label>Tags (comma)</label><input id="thoughtTags"></div><button id="saveThoughtBtn">Save</button> <button id="cancelThoughtBtn">Cancel</button></div>
    `;
    const tbody = document.getElementById('thoughtList');
    tbody.innerHTML = (data||[]).map(t => `<tr><td>${escapeHtml(t.content.substring(0,80))}</td><td>${(t.tags||[]).join(', ')}</td><td>${formatDateShort(t.created_at)}</td><td><button class="editThought" data-id="${t.id}">Edit</button> <button class="delThought" data-id="${t.id}">Delete</button></td></tr>`).join('');
    document.querySelectorAll('.delThought').forEach(btn => btn.onclick = async () => { if(confirm('Delete?')) { await supabase.from('thoughts').delete().eq('id', btn.dataset.id); renderThoughts(); } });
    document.querySelectorAll('.editThought').forEach(btn => btn.onclick = async () => { const {data} = await supabase.from('thoughts').select('*').eq('id',btn.dataset.id).single(); showThoughtForm(data); });
    document.getElementById('newThoughtBtn').onclick = () => showThoughtForm(null);
    document.getElementById('cancelThoughtBtn').onclick = () => document.getElementById('thoughtForm').style.display='none';
    document.getElementById('saveThoughtBtn').onclick = async () => {
      const id = document.getElementById('thoughtId').value;
      const thought = {
        content: document.getElementById('thoughtContent').value,
        tags: document.getElementById('thoughtTags').value.split(',').map(s=>s.trim())
      };
      if (id) await supabase.from('thoughts').update(thought).eq('id', id);
      else await supabase.from('thoughts').insert(thought);
      renderThoughts();
    };
    function showThoughtForm(t) {
      document.getElementById('thoughtForm').style.display = 'block';
      document.getElementById('thoughtId').value = t?.id||'';
      document.getElementById('thoughtContent').value = t?.content||'';
      document.getElementById('thoughtTags').value = (t?.tags||[]).join(', ');
    }
  }

  // Attach sidebar
  document.querySelectorAll('.sidebar a[data-section]').forEach(a => {
    a.onclick = (e) => { e.preventDefault(); loadSection(a.dataset.section); };
  });
  document.getElementById('logout').onclick = async (e) => { e.preventDefault(); await supabase.auth.signOut(); location.href='/studio/login'; };

  // Load default
  loadSection('dashboard');
</script>
</body>
</html>
