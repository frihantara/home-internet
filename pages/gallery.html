<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Digital Home</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body class="page-body">
  <nav id="site-nav"></nav>

  <div class="container">
    <header class="page-hero">
      <p class="page-hero__eyebrow">Visual</p>
      <h1 class="page-hero__title">Gallery</h1>
      <p class="page-hero__desc">Photos, moments, and visual stories.</p>
    </header>

    <!-- Albums -->
    <section class="section">
      <div class="section-header">
        <div>
          <p class="section-eyebrow">Albums</p>
          <h2 class="section-title">Collections</h2>
        </div>
      </div>
      <div class="albums-grid" id="albums-grid">
        <div class="skeleton" style="height:180px;border-radius:12px"></div>
        <div class="skeleton" style="height:180px;border-radius:12px"></div>
        <div class="skeleton" style="height:180px;border-radius:12px"></div>
      </div>
    </section>

    <!-- All photos masonry -->
    <section class="section">
      <div class="section-header">
        <div>
          <p class="section-eyebrow">All Photos</p>
          <h2 class="section-title" id="gallery-heading">Everything</h2>
        </div>
        <button class="btn btn--ghost btn--sm" id="show-all-btn" style="display:none">Show all</button>
      </div>
      <div class="masonry-grid" id="masonry-grid">
        <!-- populated by JS -->
      </div>
    </section>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
    <div class="lightbox-caption" id="lightbox-caption" style="display:none"></div>
  </div>

  <footer id="site-footer"></footer>

  <style>
    /* style sama */
    .albums-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    @media (max-width: 900px) { .albums-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .albums-grid { grid-template-columns: repeat(2, 1fr); } }

    .album-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
      background: var(--surface-2);
      transition: transform var(--transition);
    }
    .album-card:hover { transform: scale(1.02); }
    .album-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity var(--transition);
    }
    .album-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem;
    }
    .album-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      color: #fff;
      line-height: 1.2;
    }
    .album-count {
      font-size: 0.72rem;
      color: rgba(255,255,255,.6);
      margin-top: 0.2rem;
    }
    .album-card.active { box-shadow: 0 0 0 2px var(--gold); }

    /* Masonry */
    .masonry-grid {
      columns: 3;
      column-gap: 1rem;
    }
    @media (max-width: 900px) { .masonry-grid { columns: 2; } }
    @media (max-width: 500px) { .masonry-grid { columns: 2; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      position: relative;
      cursor: pointer;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface-2);
    }
    .masonry-item img {
      width: 100%;
      display: block;
      transition: transform var(--transition-slow), opacity var(--transition);
    }
    .masonry-item:hover img { transform: scale(1.04); }
    .masonry-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.35);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .masonry-item:hover .masonry-item-overlay { opacity: 1; }
    .masonry-zoom-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      backdrop-filter: blur(4px);
    }
  </style>

  <script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from '../js/config.js';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNav, renderFooter } from '../js/nav.js';
    import { emptyState } from '../js/supabase.js';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    renderNav('/gallery');
    renderFooter(sb);

    let allPhotos = [];
    let activeAlbum = null;

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const lbCap    = document.getElementById('lightbox-caption');

    function openLightbox(src, caption) {
      lbImg.src = src;
      lbImg.alt = caption || '';
      if (caption) { lbCap.textContent = caption; lbCap.style.display = ''; }
      else { lbCap.style.display = 'none'; }
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    // Load albums
    async function loadAlbums() {
      const { data } = await sb.from('albums').select('*').order('created_at', { ascending: false });
      const grid = document.getElementById('albums-grid');
      if (!data?.length) { grid.innerHTML = ''; return; }

      grid.innerHTML = data.map(a => `
        <div class="album-card" data-id="${a.id}">
          <img src="${a.cover_image || '/img/placeholder.svg'}" alt="${a.name}" loading="lazy">
          <div class="album-overlay">
            <div class="album-name">${a.name}</div>
            <div class="album-count">${a.photo_count || ''}</div>
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('.album-card').forEach(card => {
        card.addEventListener('click', () => filterByAlbum(card.dataset.id, data.find(a => a.id == card.dataset.id)?.name));
      });
    }

    function filterByAlbum(id, name) {
      activeAlbum = id;
      document.querySelectorAll('.album-card').forEach(c => c.classList.toggle('active', c.dataset.id == id));
      document.getElementById('gallery-heading').textContent = name || 'Album';
      document.getElementById('show-all-btn').style.display = 'inline-flex';
      renderMasonry(allPhotos.filter(p => p.album_id == id));
    }

    document.getElementById('show-all-btn').addEventListener('click', () => {
      activeAlbum = null;
      document.querySelectorAll('.album-card').forEach(c => c.classList.remove('active'));
      document.getElementById('gallery-heading').textContent = 'Everything';
      document.getElementById('show-all-btn').style.display = 'none';
      renderMasonry(allPhotos);
    });

    // Load photos
    async function loadPhotos() {
      const { data } = await sb.from('gallery')
        .select('*')
        .order('created_at', { ascending: false });
      const grid = document.getElementById('masonry-grid');
      if (!data?.length) { emptyState(grid, 'No photos yet.'); return; }
      allPhotos = data;
      renderMasonry(data);
    }

    function renderMasonry(photos) {
      const grid = document.getElementById('masonry-grid');
      if (!photos.length) { emptyState(grid, 'No photos in this album.'); return; }
      grid.innerHTML = photos.map(p => `
        <div class="masonry-item" data-src="${p.image_url}" data-cap="${p.caption || ''}">
          <img src="${p.image_url}" alt="${p.caption || 'Photo'}" loading="lazy">
          <div class="masonry-item-overlay">
            <div class="masonry-zoom-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
              </svg>
            </div>
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('.masonry-item').forEach(item => {
        item.addEventListener('click', () => openLightbox(item.dataset.src, item.dataset.cap));
      });
    }

    loadAlbums();
    loadPhotos();
  </script>
</body>
</html>
