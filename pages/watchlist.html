<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist — Digital Home</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body class="page-body">
  <nav id="site-nav"></nav>

  <div class="container">
    <header class="page-hero">
      <p class="page-hero__eyebrow">Watching</p>
      <h1 class="page-hero__title">Watchlist</h1>
      <p class="page-hero__desc">Movies, shows, and anime I've watched or want to watch.</p>
    </header>

    <!-- Filter tabs -->
    <section class="section" style="padding-bottom:0">
      <div class="watch-tabs" id="watch-tabs">
        <button class="watch-tab active" data-type="">All</button>
        <button class="watch-tab" data-type="movie">Movies</button>
        <button class="watch-tab" data-type="tv">TV Shows</button>
        <button class="watch-tab" data-type="anime">Anime</button>
      </div>
      <div class="watch-status-tabs">
        <button class="status-chip active" data-status="">All</button>
        <button class="status-chip" data-status="watched">Watched</button>
        <button class="status-chip" data-status="watching">Watching</button>
        <button class="status-chip" data-status="want_to_watch">Want to Watch</button>
      </div>
    </section>

    <!-- Grid -->
    <section class="section">
      <div class="watch-grid" id="watch-grid">
        <div class="skeleton" style="height:320px;border-radius:12px"></div>
        <div class="skeleton" style="height:320px;border-radius:12px"></div>
        <div class="skeleton" style="height:320px;border-radius:12px"></div>
        <div class="skeleton" style="height:320px;border-radius:12px"></div>
        <div class="skeleton" style="height:320px;border-radius:12px"></div>
        <div class="skeleton" style="height:320px;border-radius:12px"></div>
      </div>
    </section>
  </div>

  <footer id="site-footer"></footer>

  <style>
    /* style sama */
    .watch-tabs {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .watch-tab {
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius);
      color: var(--text-3);
      transition: all var(--transition);
    }
    .watch-tab:hover { background: var(--surface-2); color: var(--text); }
    .watch-tab.active { background: var(--surface-2); color: var(--text); }

    .watch-status-tabs {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .status-chip {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-3);
      cursor: pointer;
      transition: all var(--transition);
    }
    .status-chip:hover { border-color: var(--border-2); color: var(--text); }
    .status-chip.active { background: var(--gold-glow); border-color: rgba(200,169,110,.3); color: var(--gold); }

    .watch-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
    }
    @media (max-width: 900px) { .watch-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .watch-grid { grid-template-columns: repeat(2, 1fr); } }

    .watch-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
    }
    .watch-card:hover { border-color: var(--border-2); transform: translateY(-2px); }
    .watch-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: var(--surface-2);
    }
    .watch-info { padding: 0.9rem; }
    .watch-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }
    .watch-year {
      font-size: 0.75rem;
      color: var(--text-3);
    }
    .watch-rating {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: var(--gold);
    }
    .watch-status-badge {
      display: inline-block;
      margin-top: 0.5rem;
    }
  </style>

  <script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from '../js/config.js';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNav, renderFooter } from '../js/nav.js';
    import { emptyState } from '../js/supabase.js';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    renderNav('/watchlist');
    renderFooter(sb);

    let activeType = '';
    let activeStatus = '';

    async function loadItems() {
      let query = sb.from('watchlist')
        .select('*')
        .order('created_at', { ascending: false });
      if (activeType)   query = query.eq('type', activeType);
      if (activeStatus) query = query.eq('status', activeStatus);

      const { data } = await query;
      const grid = document.getElementById('watch-grid');
      if (!data?.length) { emptyState(grid, 'Nothing here yet.'); return; }

      const statusLabel = { watched: 'Watched', watching: 'Watching', want_to_watch: 'Want to watch' };
      const statusColor = { watched: 'badge--green', watching: 'badge--gold', want_to_watch: '' };

      grid.innerHTML = data.map(item => `
        <div class="watch-card">
          <img class="watch-poster" src="${item.poster_url || '/img/placeholder.svg'}" alt="${item.title}" loading="lazy">
          <div class="watch-info">
            <div class="watch-title">${item.title}</div>
            <div class="watch-year">${item.year || ''}</div>
            ${item.rating ? `<div class="watch-rating">★ ${item.rating}/10</div>` : ''}
            ${item.status ? `<span class="badge ${statusColor[item.status] || ''} watch-status-badge">${statusLabel[item.status] || item.status}</span>` : ''}
            ${item.notes ? `<p style="font-size:.75rem;color:var(--text-3);margin-top:.5rem;line-height:1.5">${item.notes}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    // Tabs
    document.querySelectorAll('.watch-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeType = btn.dataset.type;
        document.querySelectorAll('.watch-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadItems();
      });
    });

    document.querySelectorAll('.status-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        activeStatus = btn.dataset.status;
        document.querySelectorAll('.status-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadItems();
      });
    });

    loadItems();
  </script>
</body>
</html>
