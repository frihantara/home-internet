<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Digital Home</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body class="page-body">
  <nav id="site-nav"></nav>

  <div class="container">
    <header class="page-hero">
      <p class="page-hero__eyebrow">Writing</p>
      <h1 class="page-hero__title">Blog</h1>
      <p class="page-hero__desc">Articles, essays, and longer pieces on things I care about.</p>
    </header>

    <!-- Featured post -->
    <section class="section" id="featured-section" style="display:none">
      <div class="section-header">
        <div>
          <p class="section-eyebrow">Featured</p>
        </div>
      </div>
      <a href="#" id="featured-post" class="featured-post-card card"></a>
    </section>

    <!-- Filters -->
    <section class="section">
      <div class="blog-toolbar">
        <div class="search-bar" style="flex:1;max-width:340px">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
          <input type="text" class="input" id="search-input" placeholder="Search posts…">
        </div>
        <div class="blog-categories" id="blog-categories">
          <button class="category-chip active" data-cat="">All</button>
        </div>
      </div>

      <div class="grid-3" id="posts-grid" style="margin-top:2rem">
        <div class="skeleton" style="height:260px;border-radius:12px"></div>
        <div class="skeleton" style="height:260px;border-radius:12px"></div>
        <div class="skeleton" style="height:260px;border-radius:12px"></div>
        <div class="skeleton" style="height:260px;border-radius:12px"></div>
        <div class="skeleton" style="height:260px;border-radius:12px"></div>
        <div class="skeleton" style="height:260px;border-radius:12px"></div>
      </div>

      <div class="load-more-wrap" id="load-more-wrap" style="display:none">
        <button class="btn btn--outline" id="load-more">Load more</button>
      </div>
    </section>
  </div>

  <footer id="site-footer"></footer>

  <style>
    /* (style sama seperti semula, tidak perlu diubah) */
    .featured-post-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 340px;
    }
    .featured-post-card img {
      height: 100%;
      width: 100%;
      object-fit: cover;
    }
    .featured-post-body {
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .featured-post-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 500;
      color: var(--text);
      margin: 0.75rem 0 1rem;
      line-height: 1.25;
    }
    .featured-post-excerpt {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .featured-post-meta {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-3);
      display: flex;
      gap: 0.75rem;
    }
    @media (max-width: 700px) {
      .featured-post-card { grid-template-columns: 1fr; }
      .featured-post-card img { height: 200px; }
      .featured-post-body { padding: 1.5rem; }
    }

    .blog-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .blog-categories {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .category-chip {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-3);
      transition: all var(--transition);
    }
    .category-chip:hover { border-color: var(--border-2); color: var(--text); }
    .category-chip.active {
      background: var(--gold-glow);
      border-color: rgba(200,169,110,.3);
      color: var(--gold);
    }
    .load-more-wrap {
      text-align: center;
      margin-top: 2.5rem;
    }
    .post-card-link { display: block; }
  </style>

  <script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from '../js/config.js';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNav, renderFooter } from '../js/nav.js';
    import { formatDateShort, readingTime, debounce, emptyState } from '../js/supabase.js';

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    renderNav('/blog');
    renderFooter(sb);

    const PAGE_SIZE = 9;
    let currentPage = 0;
    let currentCat = '';
    let currentSearch = '';
    let totalCount = 0;

    // Load categories
    async function loadCategories() {
      const { data } = await sb.from('posts')
        .select('category')
        .eq('status','published')
        .not('category','is',null);
      if (!data) return;
      const cats = [...new Set(data.map(r => r.category).filter(Boolean))];
      const bar = document.getElementById('blog-categories');
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-chip';
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.addEventListener('click', () => setCategory(cat));
        bar.appendChild(btn);
      });
      bar.querySelectorAll('.category-chip').forEach(b => {
        b.addEventListener('click', () => setCategory(b.dataset.cat));
      });
    }

    function setCategory(cat) {
      currentCat = cat;
      currentPage = 0;
      document.querySelectorAll('.category-chip').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === cat);
      });
      loadPosts(true);
    }

    // Load featured post
    async function loadFeatured() {
      const { data } = await sb.from('posts')
        .select('id,title,slug,cover_image,category,created_at,excerpt,content')
        .eq('status','published')
        .eq('featured',true)
        .limit(1)
        .maybeSingle();
      if (!data) return;
      document.getElementById('featured-section').style.display = '';
      const el = document.getElementById('featured-post');
      el.href = `/blog/${data.slug}`;
      const rt = readingTime(data.content || '');
      el.innerHTML = `
        <img src="${data.cover_image || '/img/placeholder.svg'}" alt="${data.title}">
        <div class="featured-post-body">
          ${data.category ? `<span class="card-tag">${data.category}</span>` : ''}
          <h2 class="featured-post-title">${data.title}</h2>
          ${data.excerpt ? `<p class="featured-post-excerpt">${data.excerpt}</p>` : ''}
          <div class="featured-post-meta">
            <span>${formatDateShort(data.created_at)}</span>
            <span>·</span>
            <span>${rt}</span>
          </div>
        </div>
      `;
    }

    // Load posts
    async function loadPosts(reset = false) {
      if (reset) {
        currentPage = 0;
        document.getElementById('posts-grid').innerHTML = [1,2,3,4,5,6].map(() =>
          `<div class="skeleton" style="height:260px;border-radius:12px"></div>`
        ).join('');
      }

      let query = sb.from('posts')
        .select('id,title,slug,cover_image,category,created_at,excerpt,content,tags', { count: 'exact' })
        .eq('status','published')
        .order('created_at', { ascending: false })
        .range(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE - 1);

      if (currentCat) query = query.eq('category', currentCat);
      if (currentSearch) query = query.ilike('title', `%${currentSearch}%`);

      const { data, count } = await query;
      totalCount = count || 0;

      const grid = document.getElementById('posts-grid');
      if (reset) grid.innerHTML = '';

      if (!data?.length && reset) {
        emptyState(grid, 'No posts found.');
        document.getElementById('load-more-wrap').style.display = 'none';
        return;
      }

      data?.forEach(p => {
        const rt = readingTime(p.content || '');
        const a = document.createElement('a');
        a.href = `/blog/${p.slug}`;
        a.className = 'card post-card-link';
        a.innerHTML = `
          <img class="card-img" src="${p.cover_image || '/img/placeholder.svg'}" alt="${p.title}" loading="lazy">
          <div class="card-body">
            ${p.category ? `<span class="card-tag">${p.category}</span>` : ''}
            <h3 class="card-title">${p.title}</h3>
            ${p.excerpt ? `<p style="font-size:.82rem;color:var(--text-3);margin-top:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${p.excerpt}</p>` : ''}
            <div class="card-meta">
              <span>${formatDateShort(p.created_at)}</span>
              <span>·</span>
              <span>${rt}</span>
            </div>
          </div>
        `;
        grid.appendChild(a);
      });

      currentPage++;
      const hasMore = currentPage * PAGE_SIZE < totalCount;
      document.getElementById('load-more-wrap').style.display = hasMore ? 'block' : 'none';
    }

    // Search
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', debounce(e => {
      currentSearch = e.target.value.trim();
      loadPosts(true);
    }, 400));

    document.getElementById('load-more').addEventListener('click', () => loadPosts(false));

    loadCategories();
    loadFeatured();
    loadPosts(true);
  </script>
</body>
</html>
